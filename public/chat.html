<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>トーキャリ・ルーム チャット</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="config.js"></script>
</head>
<body class="chat-body">
<div class="chat-layout">
  <!-- ヘッダー -->
  <header class="header chat-header">
    <button class="btn-back" onclick="goBack()" aria-label="戻る">‹</button>
    <div id="chat-header-center" class="chat-header-center">
      <span class="chat-header-name">読み込み中...</span>
    </div>
    <div class="header-spacer"></div>
  </header>

  <!-- メッセージエリア -->
  <div id="chat-messages" class="chat-messages">
    <div class="chat-disclosure">🤖 AIによるOB・OG訪問シミュレーションです</div>
  </div>

  <!-- 入力エリア -->
  <div class="chat-input-area">
    <textarea id="chat-input" class="chat-input" placeholder="気になることを聞いてみよう..." rows="1"></textarea>
    <button id="chat-send-btn" class="chat-send-btn" disabled aria-label="送信">➤</button>
  </div>
</div>

<script>
const CFG       = window.TOKYARI || {};
const LIFF_ID   = CFG.LIFF_ROOM || '2010075487-d4TJ2xZc';
const API_BASE  = CFG.API_BASE  || 'https://10koma-shukatsu-api.oscar-dodds.workers.dev';

const ROLE_COLORS = {
  R1: '#2d8659', R2: '#2f6fb0', R3: '#7d3c98',
  R4: '#c77d1a', R5: '#0f8a8a', R6: '#c0392b',
};
function roleColor(code) {
  return ROLE_COLORS[String(code || '').toUpperCase()] || '#4a6b8a';
}

function goBack() {
  const params   = new URLSearchParams(location.search);
  const company  = params.get('company') ?? '';
  const industry = params.get('industry') ?? '';
  let url = 'room.html';
  if (company)  url += `?company=${encodeURIComponent(company)}`;
  if (industry) url += `${company ? '&' : '?'}industry=${encodeURIComponent(industry)}`;
  location.href = url;
}

let lineUserId = null;
let personaId = null;
let persona = null;
let conversationId = null;
let isSending = false;

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escText(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 写真が無い人格用：役割色＋頭文字アバター（room.htmlと統一）
function avatarSmall(cls) {
  const initial = esc((persona?.display_name || '？').trim().charAt(0));
  const col = roleColor(persona?.role_code);
  if (persona && persona.image_url) {
    return `<span class="${cls}" style="--rc:${col}">
      <img src="${esc(persona.image_url)}" alt="" width="76" height="76" decoding="async" fetchpriority="high" onerror="this.parentElement.classList.add('noimg');this.remove();">
      <b>${initial}</b></span>`;
  }
  return `<span class="${cls} noimg" style="--rc:${col}"><b>${initial}</b></span>`;
}

function buildMsgHtml(role, content) {
  if (role === 'user') {
    return `<div class="chat-msg-row user">
      <div class="chat-bubble-wrap">
        <div class="chat-bubble user">${escText(content)}</div>
      </div>
    </div>`;
  }
  // TTS➤は voice_config がある人格だけ表示(無ければ押して失敗を防ぐ=非表示)。写真/音声は後から上乗せで自動復活。
  const ttsBtn = (persona && persona.voice_config)
    ? `<button class="chat-tts-btn" data-state="idle" data-text="${esc(content)}" onclick="playTts(this)" aria-label="音声再生">▶</button>`
    : '';
  return `<div class="chat-msg-row assistant">
    ${avatarSmall('chat-msg-avatar')}
    <div class="chat-bubble-wrap">
      <div class="chat-bubble-with-audio">
        <div class="chat-bubble assistant">${escText(content)}</div>
        ${ttsBtn}
      </div>
    </div>
  </div>`;
}

function typingHtml() {
  return `<div class="chat-msg-row assistant" id="chat-typing">
    ${avatarSmall('chat-msg-avatar')}
    <div class="chat-typing-dots">
      <span></span><span></span><span></span>
    </div>
  </div>`;
}

function scrollBottom() {
  const el = document.getElementById('chat-messages');
  el.scrollTop = el.scrollHeight;
}

function appendMsg(role, content) {
  const el = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.innerHTML = buildMsgHtml(role, content);
  el.appendChild(div.firstElementChild);
  scrollBottom();
}

function showTyping() {
  const el = document.getElementById('chat-messages');
  if (document.getElementById('chat-typing')) return;
  const div = document.createElement('div');
  div.innerHTML = typingHtml();
  el.appendChild(div.firstElementChild);
  scrollBottom();
}

function hideTyping() {
  const t = document.getElementById('chat-typing');
  if (t) t.remove();
}

async function playTts(btn) {
  const state = btn.dataset.state;

  if (state === 'playing') {
    if (btn._audio) { btn._audio.pause(); btn._audio.currentTime = 0; btn._audio = null; }
    btn.dataset.state = 'idle';
    btn.textContent = '▶';
    btn.classList.remove('active');
    return;
  }

  if (state === 'loading') return;

  const text = btn.dataset.text;
  const voiceConfig = persona?.voice_config ? JSON.parse(persona.voice_config) : null;

  btn.dataset.state = 'loading';
  btn.textContent = '⏳';
  btn.classList.remove('active');

  try {
    const res = await fetch(`${API_BASE}/api/room/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, voice_config: voiceConfig }),
    });
    if (!res.ok) throw new Error('TTS failed');
    const { audio_base64 } = await res.json();
    const audio = new Audio(`data:audio/mpeg;base64,${audio_base64}`);
    btn._audio = audio;
    btn.dataset.state = 'playing';
    btn.textContent = '⏸';
    btn.classList.add('active');
    audio.play();
    const reset = () => {
      btn._audio = null;
      btn.dataset.state = 'idle';
      btn.textContent = '▶';
      btn.classList.remove('active');
    };
    audio.onended = reset;
    audio.onerror = reset;
  } catch (e) {
    console.error('TTS error:', e);
    btn.dataset.state = 'idle';
    btn.textContent = '▶';
    btn.classList.remove('active');
  }
}

async function sendMessage(content) {
  if (isSending || !content.trim()) return;
  isSending = true;

  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send-btn');
  input.value = '';
  input.style.height = '';
  sendBtn.disabled = true;

  appendMsg('user', content);
  showTyping();

  try {
    const res = await fetch(`${API_BASE}/api/room/message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        conversation_id: conversationId,
        line_user_id: lineUserId,
        persona_id: personaId,
        content: content.trim(),
      }),
    });
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const data = await res.json();
    hideTyping();
    appendMsg('assistant', data.content);
  } catch (e) {
    hideTyping();
    appendMsg('assistant', '⚠️ エラーが発生しました。もう一度お試しください。');
    console.error(e);
  } finally {
    isSending = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

function setupInput() {
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send-btn');

  input.addEventListener('input', () => {
    sendBtn.disabled = !input.value.trim() || isSending;
    input.style.height = '';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage(input.value);
    }
  });

  sendBtn.addEventListener('click', () => {
    if (!sendBtn.disabled) sendMessage(input.value);
  });
}

async function main() {
  personaId = new URLSearchParams(location.search).get('persona_id');
  if (!personaId) { location.href = 'room.html'; return; }

  setupInput();

  try {
    // LIFF: 本番(LINE内)は従来どおりログイン。外部ブラウザ(プレビュー)はゲストとして通す。
    lineUserId = 'guest-preview';
    try {
      await liff.init({ liffId: LIFF_ID });
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        lineUserId = profile.userId;
      } else if (liff.isInClient()) {
        liff.login(); return;
      }
    } catch (e) {
      console.warn('LIFF init skipped (preview/external browser):', e);
    }

    // ペルソナ情報取得(company=slug でその社の人格一覧を引く・三井は mitsui-bussan→mitsui_corp 写像・未指定は三井)
    const _cp = new URLSearchParams(location.search).get('company') || '';
    const chatCompany = (_cp && _cp !== 'mitsui-bussan') ? _cp : 'mitsui_corp';
    const personasRes = await fetch(`${API_BASE}/api/room/personas/${encodeURIComponent(chatCompany)}`);
    const personas = await personasRes.json();
    persona = personas.find(p => p.persona_id === personaId);
    if (!persona) { location.href = 'room.html'; return; }

    // ヘッダー更新（アバター＋氏名＋役割）
    document.getElementById('chat-header-center').innerHTML = `
      ${avatarSmall('chat-header-avatar')}
      <span class="chat-header-text">
        <span class="chat-header-name">${esc(persona.display_name)}</span>
        ${persona.position ? `<span class="chat-header-role">${esc(persona.position)}</span>` : ''}
      </span>`;
    document.title = `${persona.display_name} | トーキャリ・ルーム`;

    // 会話取得・作成
    const convRes = await fetch(
      `${API_BASE}/api/room/conversation?line_user_id=${encodeURIComponent(lineUserId)}&persona_id=${encodeURIComponent(personaId)}`
    );
    const convData = await convRes.json();
    conversationId = convData.conversation.conversation_id;

    // 過去メッセージ表示
    const messagesEl = document.getElementById('chat-messages');
    if (convData.messages.length > 0) {
      convData.messages.forEach(m => {
        const div = document.createElement('div');
        div.innerHTML = buildMsgHtml(m.role, m.content);
        messagesEl.appendChild(div.firstElementChild);
      });
      scrollBottom();
    } else {
      // 初回挨拶
      showTyping();
      try {
        const initRes = await fetch(`${API_BASE}/api/room/init`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ conversation_id: conversationId, persona_id: personaId }),
        });
        const initData = await initRes.json();
        hideTyping();
        if (!initData.skipped) {
          appendMsg('assistant', initData.content);
        }
      } catch (e) {
        hideTyping();
        console.error('init error:', e);
      }
    }

    document.getElementById('chat-send-btn').disabled = false;
  } catch (err) {
    document.getElementById('chat-messages').innerHTML =
      `<p class="error-text" style="padding:20px">エラー: ${esc(err.message)}</p>`;
    console.error(err);
  }
}

main();
</script>
</body>
</html>
