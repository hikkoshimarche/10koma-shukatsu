<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>お気に入り | 10コマ就活</title>
  <link rel="stylesheet" href="shared.css">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<div class="page-wrapper">
  <header class="header">
    <button class="btn-back" onclick="history.back()" aria-label="戻る">←</button>
    <h1 class="header-title">お気に入り</h1>
    <div class="header-spacer"></div>
  </header>
  <div id="app">
    <div class="loading-wrap">
      <p class="loading-text">読み込み中</p>
      <div>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
    </div>
  </div>
</div>

<script>
const LIFF_ID = '2010075487-89AJxZnA';
const API_BASE = 'https://10koma-shukatsu-api.oscar-dodds.workers.dev';
let currentUserId = null;

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function initLiff() {
  await liff.init({ liffId: LIFF_ID });
  if (!liff.isLoggedIn()) { liff.login(); return null; }
  const profile = await liff.getProfile();
  fetch(`${API_BASE}/api/users/upsert`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      line_user_id: profile.userId,
      display_name: profile.displayName,
      picture_url: profile.pictureUrl
    })
  }).catch(() => {});
  return profile;
}

async function main() {
  const app = document.getElementById('app');
  try {
    const profile = await initLiff();
    if (!profile) return;
    currentUserId = profile.userId;

    fetch(`${API_BASE}/api/log-view`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ line_user_id: currentUserId, content_type: 'bookmarks_page', content_id: 'index' })
    }).catch(() => {});

    const res = await fetch(`${API_BASE}/api/bookmarks?user_id=${encodeURIComponent(currentUserId)}`);
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const bookmarks = await res.json();

    if (bookmarks.length === 0) {
      app.innerHTML = `
        <div class="industry-detail">
          <p class="industry-detail-name">お気に入り</p>
          <p class="industry-detail-desc">保存した企業を見る</p>
        </div>
        <div class="empty-state">
          <div class="empty-icon">☆</div>
          <p class="empty-title">まだ保存した企業はありません</p>
          <p class="empty-sub">気になる企業を読んで<br>「ポケットに保存」ボタンを押してみよう</p>
          <a href="index.html" class="empty-cta">業界を探しに行く →</a>
        </div>
      `;
      return;
    }

    const cardsHtml = bookmarks.map(b => `
      <a href="company.html?id=${encodeURIComponent(b.id)}" class="bookmark-card">
        <div class="bookmark-star">★</div>
        <div class="bookmark-info">
          <div class="bookmark-name">${esc(b.name)}</div>
          ${b.description ? `<div class="bookmark-desc">${esc(b.description)}</div>` : ''}
        </div>
        <div class="bookmark-arrow">▶</div>
      </a>
    `).join('');

    // 2社以上なら「選んで比較」導線(お気に入りを事前セットして比較画面へ)
    const compareHtml = bookmarks.length >= 2 ? `
      <a href="compare.html?pick=${encodeURIComponent(bookmarks.map(b => b.id).join(','))}" class="compare-cta">⚖️ 選んで比較する</a>
    ` : '';

    app.innerHTML = `
      <div class="industry-detail">
        <p class="industry-detail-name">お気に入り</p>
        <p class="industry-detail-desc">保存した企業 ${bookmarks.length}件</p>
      </div>
      <div class="content">
        ${compareHtml}
        <div class="bookmark-list">${cardsHtml}</div>
      </div>
    `;
  } catch (err) {
    app.innerHTML = `<p class="error-text">エラー: ${esc(err.message)}</p>`;
    console.error(err);
  }
}

main();
</script>

<style>
  .compare-cta {
    display: block;
    text-align: center;
    background: #e0a52a;
    color: #3a2c05;
    font-weight: 800;
    text-decoration: none;
    border-radius: 12px;
    padding: 13px;
    margin-bottom: 14px;
  }
  .compare-cta:active { opacity: 0.85; }
  .bookmark-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .bookmark-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fff;
    border: 2.5px solid var(--ink);
    border-radius: 6px;
    padding: 14px 16px;
    box-shadow: var(--shadow-sm);
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .bookmark-card:active {
    transform: translate(2px, 2px);
    box-shadow: none;
  }
  .bookmark-star {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    background: var(--bookmark-y);
    border: 2.5px solid var(--ink);
    border-radius: 50%;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }
  .bookmark-info {
    flex: 1;
    min-width: 0;
  }
  .bookmark-name {
    font-family: "Kaisei Decol", sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 3px;
    line-height: 1.3;
  }
  .bookmark-desc {
    font-size: 12px;
    color: var(--ink-mute);
    line-height: 1.5;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .bookmark-arrow {
    flex-shrink: 0;
    color: var(--ink-mute);
    font-size: 14px;
  }

  /* 空状態 */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
  }
  .empty-icon {
    font-size: 72px;
    color: var(--paper-dark);
    margin-bottom: 12px;
  }
  .empty-title {
    font-family: "Kaisei Decol", sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .empty-sub {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.7;
    margin-bottom: 24px;
  }
  .empty-cta {
    display: inline-block;
    background: var(--ink);
    color: var(--paper);
    text-decoration: none;
    padding: 12px 24px;
    border-radius: 999px;
    font-family: "Kaisei Decol", sans-serif;
    font-size: 14px;
    font-weight: 700;
    box-shadow: var(--shadow-sm);
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .empty-cta:active {
    transform: translate(2px, 2px);
    box-shadow: none;
  }
</style>

</body>
</html>
