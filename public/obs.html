<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>OB・内定者 | 10コマ就活</title>
  <link rel="stylesheet" href="shared.css">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<div class="page-wrapper">
  <header class="header">
    <button class="btn-back" onclick="history.back()" aria-label="戻る">←</button>
    <h1 class="header-title">OB・内定者</h1>
    <div class="header-spacer"></div>
  </header>
  <div id="app">
    <div class="loading-wrap">
      <p class="loading-text">読み込み中</p>
      <div>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
    </div>
  </div>
  <div id="toast" class="toast"></div>
</div>

<script>
const LIFF_ID = '2010075487-89AJxZnA';
const API_BASE = 'https://10koma-shukatsu-api.oscar-dodds.workers.dev';
const INTERN_URL = 'https://01intern.com/corporation/2430';
let currentUserId = null;

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('show'), 1800);
}

async function initLiff() {
  await liff.init({ liffId: LIFF_ID });
  if (!liff.isLoggedIn()) { liff.login(); return null; }
  const profile = await liff.getProfile();
  fetch(`${API_BASE}/api/users/upsert`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      line_user_id: profile.userId,
      display_name: profile.displayName,
      picture_url: profile.pictureUrl
    })
  }).catch(() => {});
  return profile;
}

function openExternal(url) {
  try {
    if (liff && liff.openWindow) {
      liff.openWindow({ url, external: true });
      return;
    }
  } catch (e) { console.warn(e); }
  window.open(url, '_blank');
}

function openLineFriend(lineId) {
  const url = `https://line.me/R/ti/p/@${encodeURIComponent(lineId)}`;
  fetch(`${API_BASE}/api/share-log`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ line_user_id: currentUserId, content_type: 'ob_contact', content_id: lineId })
  }).catch(() => {});
  openExternal(url);
}

function renderAuthScreen(errorMsg = '') {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-lock">🔒</div>
        <h2 class="auth-title">OSDインターン生<br>限定サービス</h2>
        <p class="auth-sub">OB・内定者と直接話せる<br>プレミアム機能</p>

        <div class="auth-form">
          <input type="password"
                 id="password-input"
                 class="auth-input"
                 placeholder="パスワード"
                 autocomplete="off"
                 inputmode="text">
          <button class="auth-submit" id="btn-auth">認証する</button>
          ${errorMsg ? `<p class="auth-error">${esc(errorMsg)}</p>` : ''}
        </div>
      </div>

      <div class="auth-divider">
        <span class="auth-divider-text">パスワードをお持ちでない方</span>
      </div>

      <div class="intern-card">
        <div class="intern-label">▶ INTERN</div>
        <h3 class="intern-title">OSDのインターンになって<br>OB・内定者と話そう</h3>
        <p class="intern-desc">
          株式会社OSDは六本木の急成長スタートアップ。<br>
          総合商社・コンサル・金融など第一線で活躍する<br>
          OB・内定者ネットワークに参加できます。
        </p>
        <button class="intern-btn" id="btn-intern">
          OSDインターンに応募する
          <span class="intern-arrow">→</span>
        </button>
      </div>
    </div>
  `;

  document.getElementById('btn-auth').addEventListener('click', handleAuth);
  document.getElementById('password-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleAuth();
  });
  document.getElementById('btn-intern').addEventListener('click', () => {
    fetch(`${API_BASE}/api/share-log`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ line_user_id: currentUserId, content_type: 'intern_click', content_id: '01intern_2430' })
    }).catch(() => {});
    openExternal(INTERN_URL);
  });
}

async function handleAuth() {
  const input = document.getElementById('password-input');
  const btn = document.getElementById('btn-auth');
  const password = input.value.trim();

  if (!password) {
    showToast('パスワードを入力してください');
    return;
  }

  btn.disabled = true;
  btn.textContent = '認証中...';

  try {
    const res = await fetch(`${API_BASE}/api/ob/auth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password, line_user_id: currentUserId })
    });
    const data = await res.json();

    if (data.ok) {
      sessionStorage.setItem('ob_password', password);
      await renderObList(password);
    } else {
      btn.disabled = false;
      btn.textContent = '認証する';
      renderAuthScreen('パスワードが違います');
    }
  } catch (e) {
    console.error(e);
    btn.disabled = false;
    btn.textContent = '認証する';
    showToast('通信エラー');
  }
}

async function renderObList(password) {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="loading-wrap">
      <p class="loading-text">読み込み中</p>
      <div>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
    </div>
  `;

  try {
    const res = await fetch(`${API_BASE}/api/ob/list`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    if (!res.ok) {
      sessionStorage.removeItem('ob_password');
      renderAuthScreen('セッションが無効です。再度パスワードを入力してください。');
      return;
    }
    const obs = await res.json();

    if (obs.length === 0) {
      app.innerHTML = `
        <div class="industry-detail">
          <p class="industry-detail-name">OB・内定者</p>
          <p class="industry-detail-desc">OSDの先輩に相談</p>
        </div>
        <p class="empty-text">登録されているOB・内定者がいません。</p>
      `;
      return;
    }

    const cardsHtml = obs.map(o => {
      const universityLine = o.graduation_year
        ? `${esc(o.university)} ${o.graduation_year}年卒`
        : `${esc(o.university)}卒`;

      return `
        <div class="ob-card">
          <div class="ob-card-head">
            <div class="ob-avatar">${esc(o.name.charAt(0))}</div>
            <div class="ob-info">
              <div class="ob-name">${esc(o.name)}</div>
              <div class="ob-meta">${universityLine}</div>
            </div>
          </div>
          <div class="ob-affiliation">
            <span class="ob-affil-label">所属</span>
            <span class="ob-affil-name">${esc(o.affiliation)}</span>
          </div>
          <button class="ob-contact-btn" data-lineid="${esc(o.line_id)}">
            <span class="ob-line-icon">L</span>
            LINEで連絡する
          </button>
        </div>
      `;
    }).join('');

    app.innerHTML = `
      <div class="industry-detail">
        <p class="industry-detail-name">OB・内定者</p>
        <p class="industry-detail-desc">OSDの先輩に相談しよう</p>
      </div>
      <div class="ob-notice">
        <span class="ob-notice-icon">!</span>
        <p>連絡時は必ず「OSDインターン生です」とお伝えください</p>
      </div>
      <div class="content">
        <div class="ob-list">${cardsHtml}</div>
      </div>
    `;

    document.querySelectorAll('.ob-contact-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        openLineFriend(e.currentTarget.dataset.lineid);
      });
    });
  } catch (e) {
    console.error(e);
    app.innerHTML = `<p class="error-text">エラー: ${esc(e.message)}</p>`;
  }
}

async function main() {
  try {
    const profile = await initLiff();
    if (!profile) return;
    currentUserId = profile.userId;

    fetch(`${API_BASE}/api/log-view`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ line_user_id: currentUserId, content_type: 'obs_page', content_id: 'index' })
    }).catch(() => {});

    const savedPassword = sessionStorage.getItem('ob_password');
    if (savedPassword) {
      await renderObList(savedPassword);
    } else {
      renderAuthScreen();
    }
  } catch (err) {
    document.getElementById('app').innerHTML = `<p class="error-text">エラー: ${esc(err.message)}</p>`;
    console.error(err);
  }
}

main();
</script>

  }

</body>
</html>
