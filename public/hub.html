<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>コンテンツ | トーキャリ</title>
  <link rel="stylesheet" href="entry.css">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="entry.js"></script>
</head>
<body>
<div class="e-wrap">
  <header class="e-header has-back">
    <button class="e-back" id="btn-back" aria-label="戻る">‹</button>
    <p class="e-kicker">STEP 3 ／ コンテンツをえらぶ</p>
    <h1 class="e-company" id="company-name">読み込み中…</h1>
    <div id="guide"></div>
  </header>

  <div class="hub-list" id="hub-cards">
    <div class="e-skel"></div><div class="e-skel"></div><div class="e-skel"></div><div class="e-skel"></div>
  </div>

  <footer class="e-footer">
    <span class="wm">トーキャリ</span>
    <span class="tag">TALK CAREER</span>
  </footer>
</div>

<script>
const LIFF_ID = '2010075487-89AJxZnA';
const ORDER = ['10koma', 'room', 'video', 'kessan'];

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function buildContents(c, industry, from) {
  const ind = encodeURIComponent(industry ?? '');
  const fr  = encodeURIComponent(from ?? '');
  return {
    '10koma': { label: '10コマで知る', icon: '📱', sub: 'マンガ10コマで会社をサクッと体感',
      url: `https://liff.line.me/${c.jukoma_liff_id}?company=${c.id}&industry=${ind}&from=${fr}`, type: 'liff', active: true },
    'room':   { label: 'AI OB訪問ルーム', icon: '🚪', sub: '社員AI（OB・OG）に直接、何でも質問',
      url: c.room_liff_id ? `https://liff.line.me/${c.room_liff_id}?company=${c.id}&industry=${ind}&name=${encodeURIComponent(c.name)}` : null, type: 'liff', active: !!c.room_liff_id },
    'video':  { label: '企業動画を見る', icon: '📺', sub: '働く人と事業のリアルを動画で',
      url: c.video_url, type: 'youtube', active: !!c.video_url },
    'kessan': { label: '決算書を3分で', icon: '📊', sub: '数字の読み方まで動画でやさしく',
      url: c.kessan_url, type: 'youtube', active: !!c.kessan_url },
  };
}

function navigate(url, type) {
  try {
    if (typeof liff !== 'undefined' && liff.openWindow) {
      liff.openWindow({ url, external: type !== 'liff' });
      return;
    }
  } catch (e) { /* fallback */ }
  window.location.href = url;
}

function cardHTML(key, c) {
  if (!c) return '';
  if (!c.active) {
    return `<div class="hub-card soon">
      <span class="hub-ic">${c.icon}</span>
      <span class="hub-body"><span class="hub-label">${c.label}</span><span class="hub-sub">${c.sub}</span></span>
      <span class="hub-soon-tag">近日公開</span>
    </div>`;
  }
  if (key === 'room') {
    return `<button class="hub-card hero" data-url="${c.url}" data-type="${c.type}">
      <span class="hub-badge">イチオシ</span>
      <span class="hub-ic">${c.icon}</span>
      <span class="hub-body"><span class="hub-label">${c.label}</span><span class="hub-sub">${c.sub}</span></span>
      <span class="hub-arrow">›</span>
    </button>`;
  }
  return `<button class="hub-card" data-url="${c.url}" data-type="${c.type}">
    <span class="hub-ic">${c.icon}</span>
    <span class="hub-body"><span class="hub-label">${c.label}</span><span class="hub-sub">${c.sub}</span></span>
    <span class="hub-arrow">›</span>
  </button>`;
}

function renderCards(contents) {
  const cardsEl = document.getElementById('hub-cards');
  cardsEl.innerHTML = ORDER.map(key => cardHTML(key, contents[key])).join('');
  cardsEl.addEventListener('click', e => {
    const card = e.target.closest('.hub-card:not(.soon)');
    if (card && card.dataset.url) navigate(card.dataset.url, card.dataset.type);
  });
}

async function main() {
  mountGuide('気になるものから<br>タップ！');

  const params = new URLSearchParams(location.search);
  const companyId = params.get('company');
  const from = params.get('from') ?? '';
  const industry = params.get('industry') ?? '';

  document.getElementById('btn-back').addEventListener('click', () => {
    if (industry) {
      location.href = `/company-list?industry=${encodeURIComponent(industry)}&from=${encodeURIComponent(from)}`;
    } else {
      location.href = '/industry';
    }
  });

  if (!companyId) {
    document.getElementById('company-name').textContent = '企業が指定されていません';
    document.getElementById('hub-cards').innerHTML = '';
    return;
  }

  try {
    const res = await fetch('/companies.json');
    if (!res.ok) throw new Error(`fetch error ${res.status}`);
    const data = await res.json();

    let company = null;
    for (const list of Object.values(data)) {
      company = list.find(c => c.id === companyId);
      if (company) break;
    }

    if (!company) {
      document.getElementById('company-name').textContent = '企業が見つかりません';
      document.getElementById('hub-cards').innerHTML = '';
      return;
    }

    document.getElementById('company-name').textContent = company.name;
    document.title = `${company.name} | トーキャリ`;

    renderCards(buildContents(company, industry, from));
  } catch (err) {
    document.getElementById('company-name').textContent = 'エラーが発生しました';
    document.getElementById('hub-cards').innerHTML = `<p class="error-text">${esc(err.message)}</p>`;
    console.error(err);
  }

  try { await liff.init({ liffId: LIFF_ID }); }
  catch (e) { console.warn('LIFF init skipped (non-LINE browser):', e.message); }
}

main();
</script>
</body>
</html>
