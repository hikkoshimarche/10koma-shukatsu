<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>企業ハブ | トーキャリ</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #003F7D;
      min-height: 100vh;
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    .hub-header {
      padding: 48px 24px 24px;
      position: relative;
      text-align: center;
    }

    .btn-back {
      position: absolute;
      top: 48px;
      left: 16px;
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .hub-company-name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.3;
    }

    .hub-subtitle {
      margin-top: 8px;
      font-size: 14px;
      opacity: 0.75;
    }

    .hub-cards {
      flex: 1;
      padding: 8px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .hub-card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 12px;
      display: flex;
      align-items: center;
      padding: 18px 20px;
      color: #003F7D;
      cursor: pointer;
      transition: transform 0.12s, opacity 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .hub-card:active {
      transform: scale(0.97);
      opacity: 0.85;
    }

    .hub-card.primary {
      background: #D4AF37;
      color: #1a1200;
      box-shadow: 0 4px 16px rgba(212, 175, 55, 0.45);
    }

    .hub-card.inactive {
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }

    .hub-card-icon {
      font-size: 28px;
      margin-right: 16px;
      line-height: 1;
      flex-shrink: 0;
    }

    .hub-card-label {
      flex: 1;
      font-size: 17px;
      font-weight: 600;
    }

    .hub-card-arrow {
      font-size: 20px;
      opacity: 0.6;
      flex-shrink: 0;
    }

    .hub-card.primary .hub-card-arrow {
      opacity: 0.8;
    }

    .hub-card-soon {
      font-size: 11px;
      font-weight: 600;
      background: rgba(0,0,0,0.15);
      padding: 3px 10px;
      border-radius: 99px;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .hub-footer {
      padding: 20px 24px env(safe-area-inset-bottom, 16px);
      text-align: center;
      font-size: 12px;
      opacity: 0.5;
      letter-spacing: 0.1em;
    }

    .error-text {
      color: rgba(255,255,255,0.75);
      text-align: center;
      padding: 24px;
    }
  </style>
</head>
<body>

<div class="hub-header">
  <button class="btn-back" id="btn-back" aria-label="戻る">←</button>
  <h1 class="hub-company-name" id="company-name">読み込み中…</h1>
  <p class="hub-subtitle">学習コンテンツを選んでください</p>
</div>

<div class="hub-cards" id="hub-cards"></div>

<div class="hub-footer">トーキャリ TALK CAREER</div>

<script>
const LIFF_ID = '2010075487-89AJxZnA';
const LEARNING_ORDER = ['10koma', 'video', 'kessan', 'room'];

function buildContents(c, industry, from) {
  const ind = encodeURIComponent(industry ?? '');
  const fr  = encodeURIComponent(from ?? '');
  return {
    '10koma': { label: '10コマで知る',            icon: '📱', url: `https://liff.line.me/${c.jukoma_liff_id}?company=${c.id}&industry=${ind}&from=${fr}`, type: 'liff',    active: true },
    'video':  { label: '企業動画を見る',          icon: '📺', url: c.video_url,                                                                            type: 'youtube', active: !!c.video_url },
    'kessan': { label: '決算書動画を見る',        icon: '📊', url: c.kessan_url,                                                                           type: 'youtube', active: !!c.kessan_url },
    'room':   { label: 'トーキャリ・ルーム（AI OB訪問）に入る', icon: '🚪', url: c.room_liff_id ? `https://liff.line.me/${c.room_liff_id}?company=${c.id}&industry=${ind}&name=${encodeURIComponent(c.name)}` : null, type: 'liff', active: !!c.room_liff_id }
  };
}

function navigate(url, type) {
  try {
    if (typeof liff !== 'undefined' && liff.openWindow) {
      liff.openWindow({ url, external: type !== 'liff' });
      return;
    }
  } catch (e) { /* fallback */ }
  window.location.href = url;
}

function renderCards(contents, from) {
  const keys = [...LEARNING_ORDER];
  if (from && keys.includes(from)) {
    keys.splice(keys.indexOf(from), 1);
    keys.unshift(from);
  }

  const cardsEl = document.getElementById('hub-cards');
  cardsEl.innerHTML = keys.map(key => {
    const c = contents[key];
    if (!c) return '';
    const isPrimary = key === from && c.active;
    const cls = ['hub-card', isPrimary ? 'primary' : '', !c.active ? 'inactive' : ''].filter(Boolean).join(' ');
    const right = c.active
      ? '<span class="hub-card-arrow">›</span>'
      : '<span class="hub-card-soon">準備中</span>';
    const attrs = c.active ? `data-url="${c.url}" data-type="${c.type}"` : '';
    return `
      <div class="${cls}" ${attrs}>
        <span class="hub-card-icon">${c.icon}</span>
        <span class="hub-card-label">${c.label}</span>
        ${right}
      </div>`;
  }).join('');

  cardsEl.addEventListener('click', e => {
    const card = e.target.closest('.hub-card:not(.inactive)');
    if (card && card.dataset.url) navigate(card.dataset.url, card.dataset.type);
  });
}

async function main() {
  const params = new URLSearchParams(location.search);
  const companyId = params.get('company');
  const from = params.get('from') ?? '';
  const industry = params.get('industry') ?? '';

  document.getElementById('btn-back').addEventListener('click', () => {
    if (industry) {
      location.href = `/company-list?industry=${encodeURIComponent(industry)}&from=${encodeURIComponent(from)}`;
    } else {
      location.href = '/industry';
    }
  });

  if (!companyId) {
    document.getElementById('company-name').textContent = '企業が指定されていません';
    return;
  }

  try {
    const res = await fetch('/companies.json');
    if (!res.ok) throw new Error(`fetch error ${res.status}`);
    const data = await res.json();

    let company = null;
    for (const list of Object.values(data)) {
      company = list.find(c => c.id === companyId);
      if (company) break;
    }

    if (!company) {
      document.getElementById('company-name').textContent = '企業が見つかりません';
      document.getElementById('hub-cards').innerHTML = '';
      return;
    }

    document.getElementById('company-name').textContent = company.name;
    document.title = `${company.name} | トーキャリ`;

    renderCards(buildContents(company, industry, from), from);
  } catch (err) {
    document.getElementById('company-name').textContent = 'エラーが発生しました';
    document.getElementById('hub-cards').innerHTML = `<p class="error-text">${err.message}</p>`;
    console.error(err);
  }

  try {
    await liff.init({ liffId: LIFF_ID });
  } catch (e) {
    console.warn('LIFF init failed (non-LINE browser):', e.message);
  }
}

main();
</script>
</body>
</html>
