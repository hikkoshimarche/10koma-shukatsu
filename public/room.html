<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>トーキャリ・ルーム</title>
  <link rel="stylesheet" href="shared.css">
  <!-- アバターCDN(jsDelivr)への接続を先出し(LCP短縮) -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="config.js"></script>
</head>
<body>
<div class="page-wrapper">
  <header class="header">
    <button class="btn-back" id="btn-back" aria-label="戻る">‹</button>
    <h1 class="header-title brand">
      <a href="/home.html" class="header-brand-panel" aria-label="ホームへ"><img class="header-brand-logo" src="/images/brand/tokyari_logo_wide.png" alt="トーキャリ"></a>
      <span class="header-suffix">ルーム</span>
    </h1>
    <div class="header-spacer"></div>
  </header>
  <div id="app">
    <div class="room-skeleton">
      <div class="sk-hero"></div>
      <div class="sk-card"></div><div class="sk-card"></div><div class="sk-card"></div>
    </div>
  </div>
</div>

<script>
const CFG       = window.TOKYARI || {};
const LIFF_ID   = CFG.LIFF_ROOM || '2010075487-d4TJ2xZc';
const API_BASE  = CFG.API_BASE  || 'https://10koma-shukatsu-api.oscar-dodds.workers.dev';

// 役割ごとの色（役割ひと目・アバター無し時のプレースホルダにも使う）
const ROLE_COLORS = {
  R1: '#2d8659', R2: '#2f6fb0', R3: '#7d3c98',
  R4: '#c77d1a', R5: '#0f8a8a', R6: '#c0392b',
};
function roleColor(code) {
  return ROLE_COLORS[String(code || '').toUpperCase()] || '#4a6b8a';
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 写真が無い人格でも魅力的に見せる：役割色グラデ＋頭文字のアバター
// idx: 先頭2枚(ファーストビュー)は eager+高優先度、以降は lazy でスクロール時に読み込む
function avatarHtml(p, idx) {
  const initial = esc((p.display_name || '？').trim().charAt(0));
  const col = roleColor(p.role_code);
  if (p.image_url) {
    const load = idx < 2 ? 'loading="eager" fetchpriority="high"' : 'loading="lazy"';
    return `<div class="room-card-av" style="--rc:${col}">
      <img class="room-card-av-img" src="${esc(p.image_url)}" alt="${esc(p.display_name)}"
           width="124" height="124" ${load} decoding="async"
           onerror="this.parentElement.classList.add('noimg');this.remove();">
      <span class="room-card-av-fallback">${initial}</span>
    </div>`;
  }
  return `<div class="room-card-av noimg" style="--rc:${col}">
    <span class="room-card-av-fallback">${initial}</span>
  </div>`;
}

// メタ行（年齢・部署は在るときだけ）
function metaLine(p) {
  const bits = [];
  if (p.age) bits.push(`${esc(p.age)}歳`);
  if (p.department) bits.push(esc(p.department));
  return bits.length ? `<p class="room-card-meta">${bits.join(' ・ ')}</p>` : '';
}

function cardHtml(p, idx) {
  const col = roleColor(p.role_code);
  return `
    <button class="room-card" data-persona-id="${esc(p.persona_id)}" style="--rc:${col}">
      ${avatarHtml(p, idx)}
      <div class="room-card-body">
        <span class="room-card-role">${esc(p.position || '社員')}</span>
        <p class="room-card-name">${esc(p.display_name)}</p>
        ${metaLine(p)}
        <p class="room-card-desc">${esc(p.short_description ?? '')}</p>
      </div>
      <span class="room-card-go" aria-hidden="true">話す<b>›</b></span>
    </button>`;
}

async function main() {
  const params   = new URLSearchParams(location.search);
  const company  = params.get('company') ?? '';
  const industry = params.get('industry') ?? '';
  // ライブ室のcompany_id。三井GOLDのみ id=mitsui-bussan → personas=mitsui_corp に写像。
  // v3社は companies.json id(slug) == personas.company_id。company未指定も三井(後方互換)。
  const companyId = (company && company !== 'mitsui-bussan') ? company : 'mitsui_corp';
  const companyName = params.get('name') || (companyId === 'mitsui_corp' ? '三井物産' : company);

  document.getElementById('btn-back').addEventListener('click', () => {
    if (company) {
      location.href = `/hub?company=${encodeURIComponent(company)}&industry=${encodeURIComponent(industry)}&from=room`;
    } else {
      location.href = '/industry';
    }
  });

  const app = document.getElementById('app');

  // LIFF: 本番(LINE内・ログイン済)は従来どおり。外部ブラウザ(プレビュー)はログインを強制せず表示だけ通す。
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn() && liff.isInClient()) { liff.login(); return; }
  } catch (e) {
    console.warn('LIFF init skipped (preview/external browser):', e);
  }

  try {
    const res = await fetch(`${API_BASE}/api/room/personas/${encodeURIComponent(companyId)}`);
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const personas = await res.json();

    // 先頭アバター(LCP候補)を最優先プリロード
    if (personas[0]?.image_url) {
      const l = document.createElement('link');
      l.rel = 'preload'; l.as = 'image'; l.href = personas[0].image_url;
      l.setAttribute('fetchpriority', 'high');
      document.head.appendChild(l);
    }

    if (!personas.length) {
      app.innerHTML = `<p class="empty-text">この会社のAI OB・OG訪問は<br>現在ご利用いただけません。</p>`;
      return;
    }

    app.innerHTML = `
      <div class="room-hero">
        <p class="room-hero-company">${esc(companyName)}</p>
        <p class="room-hero-title">会いに行くOB・OGを選ぼう</p>
        <p class="room-hero-note">🤖 公開情報をもとにした<b>AIのOB・OG訪問シミュレーション</b>です。気軽に何でも聞いてみてください。</p>
      </div>
      <div class="room-list">
        ${personas.map((p, i) => cardHtml(p, i)).join('')}
      </div>`;

    app.querySelector('.room-list').addEventListener('click', e => {
      const card = e.target.closest('.room-card');
      if (!card) return;
      let url = `chat.html?persona_id=${encodeURIComponent(card.dataset.personaId)}`;
      if (company)  url += `&company=${encodeURIComponent(company)}`;
      if (industry) url += `&industry=${encodeURIComponent(industry)}`;
      location.href = url;
    });
  } catch (err) {
    app.innerHTML = `<p class="error-text">エラー: ${esc(err.message)}</p>`;
    console.error(err);
  }
}

main();
</script>
</body>
</html>
