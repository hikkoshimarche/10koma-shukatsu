<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>トーキャリ</title>
  <link rel="stylesheet" href="entry.css">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<div class="e-wrap">
  <div class="splash">
    <span class="brand-circle"><img src="/images/brand/tokyari_logo_mark.jpg" alt="トーキャリ"></span>
    <div class="sub" id="status">読み込み中…</div>
    <div class="spinner" id="spinner"></div>
  </div>
  <footer class="e-footer">
    <span class="brand-panel"><img class="brand-logo" src="/images/brand/tokyari_logo_wide.png" alt="トーキャリ"></span>
  </footer>
</div>

<script>
const LIFF_ID = '2010075487-89AJxZnA';
const API_BASE = 'https://10koma-shukatsu-api.oscar-dodds.workers.dev';

function routeOnward() {
  const params = new URLSearchParams(location.search);
  const companyId = params.get('company');
  if (companyId) {
    const industry = params.get('industry') ?? '';
    const from     = params.get('from') ?? '';
    let dest = `/company.html?id=${encodeURIComponent(companyId)}`;
    if (industry) dest += `&industry=${encodeURIComponent(industry)}`;
    if (from)     dest += `&from=${encodeURIComponent(from)}`;
    location.href = dest;
  } else {
    // リッチメニュー枠1 から直接開いた場合: 業界選択フローへ
    location.href = '/industry?from=10koma';
  }
}

async function main() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (liff.isLoggedIn()) {
      const profile = await liff.getProfile();
      fetch(`${API_BASE}/api/users/upsert`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          line_user_id: profile.userId,
          display_name: profile.displayName,
          picture_url: profile.pictureUrl
        })
      }).catch(() => {});
    } else if (liff.isInClient()) {
      liff.login();
      return;
    }
    // 外部ブラウザ(プレビュー等)は未ログインでもフローを進める
    routeOnward();
  } catch (err) {
    // LIFF不可(非LINE環境)でも入口フローは見られるように前進
    console.warn('LIFF init skipped:', err && err.message);
    routeOnward();
  }
}

main();
</script>
</body>
</html>
