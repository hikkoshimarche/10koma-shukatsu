<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>10コマ就活</title>
  <link rel="stylesheet" href="shared.css">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<div class="page-wrapper">
  <header class="header">
    <div class="header-spacer"></div>
    <h1 class="header-title">10コマ就活</h1>
    <div class="header-spacer"></div>
  </header>
  <div id="app">
    <div class="loading-wrap"><p class="loading-text">読み込み中...</p></div>
  </div>
</div>

<script>
const LIFF_ID = '2010075487-89AJxZnA';
const API_BASE = 'https://10koma-shukatsu-api.oscar-dodds.workers.dev';
let currentUserId = null;

function esc(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function initLiff() {
  await liff.init({ liffId: LIFF_ID });
  if (!liff.isLoggedIn()) { liff.login(); return null; }
  const profile = await liff.getProfile();
  fetch(`${API_BASE}/api/users/upsert`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      line_user_id: profile.userId,
      display_name: profile.displayName,
      picture_url: profile.pictureUrl
    })
  }).catch(() => {});
  return profile;
}

async function handleLike(btn) {
  if (!currentUserId || btn.disabled) return;
  btn.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/api/like`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        line_user_id: currentUserId,
        content_type: btn.dataset.type,
        content_id: btn.dataset.id
      })
    });
    const { liked } = await res.json();
    btn.classList.toggle('liked', liked);
    btn.querySelector('.btn-icon').textContent = liked ? '♥' : '♡';
  } catch (e) {
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

async function main() {
  const app = document.getElementById('app');
  try {
    const profile = await initLiff();
    if (!profile) return;
    currentUserId = profile.userId;

    const res = await fetch(`${API_BASE}/api/industries`);
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const industries = await res.json();

    const cardsHtml = industries.length === 0
      ? '<p class="empty-text">業界データはまだありません</p>'
      : industries.map(ind => `
          <div class="card" data-id="${esc(ind.id)}">
            <p class="card-title">${esc(ind.name)}</p>
            ${ind.description ? `<p class="card-desc">${esc(ind.description)}</p>` : ''}
            <div class="card-footer">
              <button class="btn-like" data-type="industry" data-id="${esc(ind.id)}" aria-label="いいね">
                <span class="btn-icon">♡</span>
              </button>
            </div>
          </div>`).join('');

    app.innerHTML = `
      <div class="profile-badge">
        <img class="profile-avatar" src="${esc(profile.pictureUrl)}" alt="" onerror="this.style.display='none'">
        <span class="profile-name">${esc(profile.displayName)}さん</span>
      </div>
      <div class="content">${cardsHtml}</div>`;

    app.addEventListener('click', e => {
      const likeBtn = e.target.closest('.btn-like');
      if (likeBtn) { e.stopPropagation(); handleLike(likeBtn); return; }
      const card = e.target.closest('.card');
      if (card) location.href = `industry.html?id=${encodeURIComponent(card.dataset.id)}`;
    });
  } catch (err) {
    app.innerHTML = `<p class="error-text">エラー: ${esc(err.message)}</p>`;
    console.error(err);
  }
}

main();
</script>
</body>
</html>
