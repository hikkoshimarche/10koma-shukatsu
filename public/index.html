<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10コマ就活</title>
  <link rel="stylesheet" href="style.css">
  <!-- LIFF SDK v2 -->
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div id="app">
    <p class="loading">読み込み中...</p>
  </div>

  <script>
    const LIFF_ID = "2010075487-89AJxZnA";
    const API_BASE = "https://10koma-shukatsu-api.oscar-dodds.workers.dev";

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();

        // APIから業界一覧を取得
        const res = await fetch(`${API_BASE}/api/industries`);
        const industries = await res.json();

        // 業界をリスト表示
        const industriesHtml = industries.length > 0
          ? industries.map(ind => `<li>${ind.name}</li>`).join("")
          : "<li>業界データはまだありません</li>";

        document.getElementById("app").innerHTML = `
          <img src="${profile.pictureUrl}" alt="プロフィール画像" style="width:80px;border-radius:50%;">
          <h1>こんにちは、${profile.displayName}さん！</h1>
          <p>10コマ就活へようこそ</p>
          <h2>業界一覧</h2>
          <ul>${industriesHtml}</ul>
        `;
      } catch (err) {
        document.getElementById("app").innerHTML =
          `<p class="error">エラー: ${err.message}</p>`;
        console.error(err);
      }
    }

    main();
  </script>
</body>
</html>
