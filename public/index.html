<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10コマ就活</title>
  <link rel="stylesheet" href="style.css">
  <!-- LIFF SDK v2 -->
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div id="app">
    <p class="loading">読み込み中...</p>
  </div>

  <script>
    // LIFF ID: LINE Developersコンソールの「LIFFアプリ」から確認できる
    const LIFF_ID = "2010075487-89AJxZnA";

    async function main() {
      try {
        // LIFFを初期化（LINEアプリとの通信を開始）
        await liff.init({ liffId: LIFF_ID });

        // LINEにログインしていなければログイン画面へリダイレクト
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        // LINEプロフィール（名前・アイコン）を取得
        const profile = await liff.getProfile();

        document.getElementById("app").innerHTML = `
          <img src="${profile.pictureUrl}" alt="プロフィール画像">
          <h1>こんにちは、${profile.displayName}さん！</h1>
          <p>10コマ就活へようこそ</p>
        `;
      } catch (err) {
        // エラー内容を画面に表示（開発中のデバッグ用）
        document.getElementById("app").innerHTML =
          `<p class="error">エラー: ${err.message}</p>`;
        console.error(err);
      }
    }

    main();
  </script>
</body>
</html>
