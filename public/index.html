<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>10コマ就活</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #003F7D;
      min-height: 100vh;
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-text {
      font-size: 16px;
      opacity: 0.75;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <p class="loading-text" id="status">読み込み中…</p>

<script>
const LIFF_ID = '2010075487-89AJxZnA';
const API_BASE = 'https://10koma-shukatsu-api.oscar-dodds.workers.dev';

async function main() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const profile = await liff.getProfile();
    fetch(`${API_BASE}/api/users/upsert`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        line_user_id: profile.userId,
        display_name: profile.displayName,
        picture_url: profile.pictureUrl
      })
    }).catch(() => {});

    const params = new URLSearchParams(location.search);
    const companyId = params.get('company');

    if (companyId) {
      // hub.html から「10コマで知る」でLIFFを開いた場合: 直接company.htmlへ
      location.href = `/company.html?id=${encodeURIComponent(companyId)}`;
    } else {
      // リッチメニュー枠1 から直接開いた場合: 業界選択フローへ
      location.href = '/industry?from=10koma';
    }
  } catch (err) {
    document.getElementById('status').textContent = 'エラー: ' + err.message;
    console.error(err);
  }
}

main();
</script>
</body>
</html>
