<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>理解度クイズ | トーキャリ</title>
  <link rel="stylesheet" href="entry.css">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="config.js"></script>
  <script src="nav.js"></script>
  <script src="entry.js"></script>
  <style>
    /* === クイズ専用 === */
    .quiz-tabs { display:flex; gap:8px; padding:4px 16px 10px; }
    .quiz-tab {
      flex:1; text-align:center; padding:10px; border-radius:12px;
      font-weight:700; font-size:14px; cursor:pointer;
      background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.75);
      border:1.5px solid transparent; -webkit-tap-highlight-color:transparent;
    }
    .quiz-tab.active { background:#fff; color:var(--navy); box-shadow:0 3px 10px rgba(0,0,0,0.2); }

    .quiz-play { padding:14px 16px 24px; }
    .quiz-progress-wrap { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .quiz-bar { flex:1; height:8px; border-radius:99px; background:rgba(255,255,255,0.18); overflow:hidden; }
    .quiz-bar-fill { height:100%; background:var(--gold); border-radius:99px; transition:width .3s; }
    .quiz-count { font-size:12px; font-weight:700; color:rgba(255,255,255,0.85); flex-shrink:0; }

    .quiz-card { background:#fff; color:var(--ink); border-radius:16px; padding:18px 16px; box-shadow:0 4px 16px rgba(0,0,0,0.2); }
    .quiz-cat { display:inline-block; font-size:11px; font-weight:700; color:#fff; background:var(--nana); padding:2px 10px; border-radius:999px; margin-bottom:10px; }
    .quiz-sample-tag { display:inline-block; font-size:10px; font-weight:700; color:#8a6d00; background:#ffe9a8; padding:2px 8px; border-radius:999px; margin-left:6px; }
    .quiz-q { font-size:17px; font-weight:700; line-height:1.55; margin-bottom:16px; }

    .quiz-opts { display:flex; flex-direction:column; gap:10px; }
    .quiz-opt {
      display:flex; align-items:center; gap:11px; width:100%; text-align:left;
      background:#f4f7fb; border:2px solid #e2e8f0; border-radius:12px; padding:13px 14px;
      font-size:15px; font-weight:600; color:var(--ink); cursor:pointer; font-family:inherit;
      -webkit-tap-highlight-color:transparent; transition:transform .08s;
    }
    .quiz-opt:active { transform:scale(0.99); }
    .quiz-opt .mark {
      flex-shrink:0; width:26px; height:26px; border-radius:50%; background:#fff;
      border:2px solid #cbd5e1; display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:800; color:#64748b;
    }
    .quiz-opt.correct { background:#e7f7ee; border-color:#28a45c; }
    .quiz-opt.correct .mark { background:#28a45c; border-color:#28a45c; color:#fff; }
    .quiz-opt.wrong { background:#fdecec; border-color:#d64545; }
    .quiz-opt.wrong .mark { background:#d64545; border-color:#d64545; color:#fff; }
    .quiz-opt.locked { cursor:default; }
    .quiz-opt.dim { opacity:0.55; }

    .quiz-feedback { margin-top:14px; border-top:1px dashed #d7dee7; padding-top:13px; display:none; }
    .quiz-feedback.show { display:block; }
    .quiz-verdict { font-size:15px; font-weight:800; margin-bottom:6px; }
    .quiz-verdict.ok { color:#1f8a4c; }
    .quiz-verdict.ng { color:#c0392b; }
    .quiz-exp { font-size:13.5px; line-height:1.65; color:var(--ink); }
    .quiz-src { display:inline-block; margin-top:9px; font-size:12.5px; font-weight:700; color:var(--nana); text-decoration:none; }
    .quiz-src::after { content:" ↗"; }

    .quiz-next {
      width:100%; margin-top:14px; padding:14px; border:none; border-radius:12px;
      background:var(--gold); color:#2a1c00; font-size:15px; font-weight:800; cursor:pointer;
      font-family:inherit; -webkit-tap-highlight-color:transparent; display:none;
      box-shadow:0 4px 12px rgba(231,184,75,0.4);
    }
    .quiz-next.show { display:block; }

    /* 結果 */
    .quiz-result { text-align:center; padding:8px 16px 24px; }
    .quiz-result-emoji { font-size:60px; }
    .quiz-score { font-family:"Reggae One",sans-serif; font-size:40px; color:#fff; text-shadow:0 2px 12px rgba(0,0,0,0.3); margin:6px 0 2px; }
    .quiz-score small { font-size:20px; opacity:0.7; }
    .quiz-result-msg { font-size:14px; color:rgba(255,255,255,0.85); margin-bottom:22px; }
    .quiz-actions { display:flex; flex-direction:column; gap:10px; }
    .quiz-btn {
      padding:14px; border-radius:12px; font-size:15px; font-weight:800; cursor:pointer;
      font-family:inherit; -webkit-tap-highlight-color:transparent; border:none;
    }
    .quiz-btn.primary { background:var(--gold); color:#2a1c00; box-shadow:0 4px 12px rgba(231,184,75,0.4); }
    .quiz-btn.ghost { background:rgba(255,255,255,0.12); color:#fff; border:1.5px solid rgba(255,255,255,0.25); }

    /* === レベルはしご（Lv1→Lv4 段階解放） === */
    .lv-intro { padding:2px 16px 6px; font-size:13px; color:rgba(255,255,255,0.82); line-height:1.6; }
    .lv-ladder { padding:10px 16px 24px; display:flex; flex-direction:column; gap:11px; }
    .lv-card {
      display:flex; align-items:center; gap:13px; width:100%; text-align:left; font-family:inherit;
      background:#fff; border-radius:16px; padding:15px 15px; border:2px solid transparent;
      box-shadow:0 4px 14px rgba(0,0,0,0.16); cursor:pointer; -webkit-tap-highlight-color:transparent;
      transition:transform .08s;
    }
    .lv-card:active { transform:scale(0.99); }
    .lv-card.locked, .lv-card.empty { background:rgba(255,255,255,0.10); box-shadow:none; cursor:default; }
    .lv-num {
      flex-shrink:0; width:48px; height:48px; border-radius:14px; color:#fff;
      display:flex; flex-direction:column; align-items:center; justify-content:center; line-height:1;
    }
    .lv-num b { font-size:19px; font-weight:800; }
    .lv-num span { font-size:9px; font-weight:700; opacity:0.9; margin-top:2px; }
    .lv-card.locked .lv-num, .lv-card.empty .lv-num { background:#8a96a6 !important; }
    .lv-body { flex:1; min-width:0; }
    .lv-name { display:block; font-size:15px; font-weight:800; color:var(--ink); }
    .lv-card.locked .lv-name, .lv-card.empty .lv-name { color:rgba(255,255,255,0.72); }
    .lv-sub { display:block; font-size:11.5px; color:#64748b; margin-top:3px; line-height:1.5; }
    .lv-card.locked .lv-sub, .lv-card.empty .lv-sub { color:rgba(255,255,255,0.6); }
    .lv-meta { flex-shrink:0; text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
    .lv-chip { font-size:11px; font-weight:800; padding:3px 9px; border-radius:999px; }
    .lv-chip.pass { background:#e7f7ee; color:#1f8a4c; }
    .lv-chip.try  { background:#fff3d6; color:#8a6d00; }
    .lv-chip.go   { background:var(--navy); color:#fff; }
    .lv-lockic { font-size:19px; }
    .lv-arrow { flex-shrink:0; font-size:22px; color:#c0ccda; }
    .lv-rate  { font-size:11px; color:#64748b; }

    /* 級バッジ（出題中ヘッダ） */
    .lv-badge { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:800; color:#fff; padding:4px 11px; border-radius:999px; }
    /* XP／解放演出 */
    .xp-pop { display:inline-block; margin-top:6px; font-size:14px; font-weight:800; color:var(--gold); }
    .unlock-burst { background:linear-gradient(135deg,#fff6df,#ffe9a8); color:#7a5a00; border-radius:16px; padding:14px 16px; margin:2px 0 14px; font-weight:800; font-size:15px; box-shadow:0 4px 14px rgba(231,184,75,0.4); }
  </style>

<script>
const CFG      = window.TOKYARI || {};
const LIFF_ID  = CFG.LIFF_HUB || '2010075487-89AJxZnA';
const API_BASE = CFG.API_BASE  || 'https://10koma-shukatsu-api.oscar-dodds.workers.dev';
const N_PER_SET = 10; // 1セッションの出題数
// 難易度4段階（difficulty 1..4）。色・重みはAPI(QUIZ_LV_WEIGHT)と一致。
const LEVELS = [
  { lv:1, name:'入門', sub:'10コマを見れば解ける基本', color:'#28a45c', weight:10 },
  { lv:2, name:'基礎', sub:'主力製品・人物・沿革',     color:'#2f6fb0', weight:20 },
  { lv:3, name:'応用', sub:'「正しい説明はどれ」',       color:'#7d3c98', weight:40 },
  { lv:4, name:'実践', sub:'決算・数字で勝負',           color:'#d17d00', weight:80 },
];
const LV = lv => LEVELS[(lv||1)-1] || LEVELS[1];
const PASS_RATE = 0.8, PASS_MIN = 8; // API側 QUIZ_PASS_RATE / QUIZ_PASS_MIN と一致

// プレビュー用サンプル(本番はAPIから取得)
const SAMPLE = [
  {"category":"会社概要","q_text":"MSCI ESGのレーティングでSAPはどの評価を受けていますか？","options":["AAA","AA","A","BBB"],"correct":0,"explanation":"SAPはMSCI ESGのレーティングでAAAを受けています。","source_url":"https://www.sap.com/japan/about/company.html"},
  {"category":"会社概要","q_text":"SAPはS&P ESGスコアでどの位置にランクされていますか？","options":["上位5%","上位10%","上位15%","上位20%"],"correct":0,"explanation":"SAPはS&P ESGスコアで上位5%にランクされています。","source_url":"https://www.sap.com/japan/about/company.html"},
  {"category":"沿革","q_text":"SAPは何人の起業家プログラマーによって設立されましたか？","options":["5人","3人","7人","10人"],"correct":0,"explanation":"SAPは5人の起業家プログラマーによって設立されました。","source_url":"https://www.sap.com/japan/about/company.html"},
  {"category":"事業セグメント","q_text":"SAPはどのような役割を担っていますか？","options":["ビジネスとテクノロジーをつなぐ","金融サービスを提供","製造業に特化","教育サービスを提供"],"correct":0,"explanation":"SAPはエンタープライズアプリケーションやビジネスAIのグローバルリーダーとして、ビジネスとテクノロジーをつなぐ役割を担っています。","source_url":"https://www.sap.com/japan/about/company.html"}
];

const IND_ICON = {
  '総合商社':'🌐','自動車・モビリティ':'🚗','電機・精密・重工':'⚙️','鉄鋼・素材・化学':'🏭',
  '製薬・ヘルスケア':'💊','銀行・証券・保険':'🏦','IT・通信・SaaS':'💻','ゲーム・エンタメ':'🎮',
  'コンサル':'📈','専門商社':'📦','インフラ・エネルギー':'⚡','不動産・建設':'🏗️','小売・流通':'🛍️',
  '食品・飲料':'🍽️','日用品・化粧品':'🧴','航空・運輸・物流':'✈️','広告・メディア':'📣','その他（外資・新興等）':'🌱',
};
const PAL = ['#2f6fb0','#c0392b','#7d3c98','#16a085','#d17d00','#2d8659','#c0448a','#3b5bdb','#b8823a','#2f8fbf'];
function hue(id){let h=0;for(const c of String(id))h=(h*31+c.charCodeAt(0))>>>0;return PAL[h%PAL.length];}

// 業界別クイズ = 業界10コマと同じ16業界タクソノミー(ハイフンslug)。gyokai.html と一致。
const GYOKAI_INDUSTRIES = [
  {slug:'sogo-shosha',name:'総合商社',icon:'🌐'},{slug:'senmon-shosha',name:'専門商社',icon:'📦'},
  {slug:'finance',name:'銀行・証券・保険',icon:'🏦'},{slug:'it-ai-saas-game',name:'IT・AI・SaaS・ゲーム',icon:'💻'},
  {slug:'consulting',name:'コンサル',icon:'📈'},{slug:'manufacturer',name:'メーカー',icon:'🏭'},
  {slug:'ad-media',name:'広告・メディア',icon:'📣'},{slug:'infra-energy',name:'インフラ・エネルギー',icon:'⚡'},
  {slug:'realestate-construction',name:'不動産・建設',icon:'🏗️'},{slug:'retail',name:'小売・流通',icon:'🛍️'},
  {slug:'food-beverage',name:'食品・飲料',icon:'🍽️'},{slug:'medical-healthcare',name:'医療・ヘルスケア',icon:'💊'},
  {slug:'transport-logistics',name:'航空・運輸・物流',icon:'✈️'},{slug:'education-hr',name:'教育・人材',icon:'🎓'},
  {slug:'startup',name:'スタートアップ',icon:'🚀'},{slug:'deeptech-space-ai',name:'ディープテック・宇宙・AI',icon:'🛰️'},
];

// 復習モード(ルールベース・user_quiz_progress集計をAPIで返す)
const REVIEW_MODES = [
  { mode:'recent',        icon:'🕒', name:'直近で間違えた問題', sub:'最近の誤答からおさらい' },
  { mode:'frequent',      icon:'🔁', name:'よく間違える問題',   sub:'誤答回数の多い順' },
  { mode:'weak_category', icon:'🎯', name:'苦手カテゴリ優先',   sub:'弱点カテゴリから重点出題' },
];

let COMPANIES = null;
let lineUserId = 'guest-preview';
let DEEP = false;  // 企業/業界から直リンクで開かれたか(戻る=呼び出し元へ / 内部select経由なら選択画面へ)
function qbLabel(){ if(!DEEP) return 'クイズ選択';
  const p=new URLSearchParams(location.search);
  return (p.get('company')||p.get('industry'))?'企業ページ':'ホーム'; }
function setBack(fn,label){ const b=document.getElementById('btn-back'); if(b){ b.onclick=fn; b.textContent='‹ '+label; } }
function quizBack(){
  if(DEEP){ const p=new URLSearchParams(location.search);
    if(p.get('company')) tkBack('/company.html?id='+encodeURIComponent(p.get('company')));
    else if(p.get('industry')) tkBack('/company.html?industry='+encodeURIComponent(p.get('industry')));
    else tkBack('/home.html');
  } else renderSelect();
}
let mode = 'company';           // 'company' | 'industry'
let QSET = [], qi = 0, score = 0, curLabel = '', curSetType = '', curSetId = '';
let curApiSetId = '';           // 保存/照会用のset_id（業界は industry__<slug>）
let curLevel = 1;               // 出題中のレベル
let curUnlock = null;           // /api/quiz/unlock の最新状態
let pendingWrites = [];         // recordAnswer のPOST完了待ち（unlock再取得前にawait）
function datasheetHref(){ return (curSetType==='company' && curSetId) ? `datasheet.html?id=${encodeURIComponent(curSetId)}&name=${encodeURIComponent(curLabel||'')}` : ''; }

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
const app = () => document.getElementById('app');

async function loadCompanies(){ if(!COMPANIES) COMPANIES = await (await fetch('/companies.json')).json(); return COMPANIES; }

// 選択肢シャッフル(正解が常にAにならないよう)
function shuffled(q){
  const idx = q.options.map((_,i)=>i);
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  return {...q, options: idx.map(i=>q.options[i]), correct: idx.indexOf(q.correct)};
}

/* ---------- 選択画面 ---------- */
async function renderSelect(){
  mountGuide('どのクイズに<br>挑戦する？');
  document.getElementById('quiz-title').textContent = 'クイズで腕試し';
  const data = await loadCompanies();
  const tabs = `
    <div class="quiz-tabs">
      <div class="quiz-tab ${mode==='company'?'active':''}" data-mode="company">会社別</div>
      <div class="quiz-tab ${mode==='industry'?'active':''}" data-mode="industry">業界別</div>
      <div class="quiz-tab ${mode==='review'?'active':''}" data-mode="review">復習</div>
    </div>`;
  let list;
  if (mode==='review') {
    // 復習(user_quiz_progressベース・ルールベース)
    list = REVIEW_MODES.map(r=>`
      <button class="e-card" data-rmode="${r.mode}" style="--acc:#d17d00">
        <span class="e-icon">${r.icon}</span>
        <span class="e-card-body"><span class="e-card-label">${r.name}</span><span class="e-card-sub">${r.sub}</span></span>
        <span class="e-card-arrow">›</span></button>`).join('');
  } else if (mode==='industry') {
    // 業界別 = 16業界タクソノミー(slug)。業界クイズは industry__<slug> に対応。
    list = GYOKAI_INDUSTRIES.map(ind=>`
      <button class="e-card" data-slug="${esc(ind.slug)}" data-name="${esc(ind.name)}" style="--acc:#2f6fb0">
        <span class="e-icon">${ind.icon}</span>
        <span class="e-card-body"><span class="e-card-label">${esc(ind.name)}</span><span class="e-card-sub">業界クイズに挑戦</span></span>
        <span class="e-card-arrow">›</span></button>`).join('');
  } else {
    // 会社別 = 企業タクソノミー(companies.json)で業界→会社へドリル
    list = Object.keys(data).map(name=>`
      <button class="e-card" data-ind="${esc(name)}" style="--acc:#2f6fb0">
        <span class="e-icon">${IND_ICON[name]||'🏢'}</span>
        <span class="e-card-body"><span class="e-card-label">${esc(name)}</span><span class="e-card-sub">${(data[name]||[]).length}社から選ぶ</span></span>
        <span class="e-card-arrow">›</span></button>`).join('');
  }
  app().innerHTML = tabs + `<div class="e-list" id="sel-list">${list}</div>`;

  app().querySelectorAll('.quiz-tab').forEach(t=>t.onclick=()=>{ mode=t.dataset.mode; renderSelect(); });
  document.getElementById('sel-list').onclick = e=>{
    const c = e.target.closest('.e-card'); if(!c) return;
    if(mode==='review') startReview(c.dataset.rmode);
    else if(mode==='industry') startQuiz('industry', c.dataset.slug, c.dataset.name);
    else renderCompanyList(c.dataset.ind);
  };
}

async function renderCompanyList(industry){
  mountGuide('会社を選んで<br>スタート！');
  const data = await loadCompanies();
  const comps = data[industry]||[];
  const list = comps.map(c=>`
    <button class="e-card" data-id="${esc(c.id)}" data-name="${esc(c.name)}" style="--acc:${hue(c.id)}">
      <span class="e-badge">${esc(String(c.name||'？').charAt(0))}</span>
      <span class="e-card-body"><span class="e-card-label">${esc(c.name)}</span><span class="e-card-sub">クイズに挑戦</span></span>
      <span class="e-card-arrow">›</span></button>`).join('');
  app().innerHTML = `<div class="e-list">${list}</div>`;
  app().querySelector('.e-list').onclick = e=>{
    const c = e.target.closest('.e-card'); if(!c) return;
    startQuiz('company', c.dataset.id, c.dataset.name);
  };
  setBack(()=>quizBack(), qbLabel());
}

/* ---------- クイズ本体（レベル制） ---------- */
async function startQuiz(setType, setId, label){
  curLabel = label; curSetType = setType; curSetId = setId;
  // クイズセットID正規化: 業界は industry__<slug>（会社は company_id そのまま）
  curApiSetId = setType==='industry' ? `industry__${setId}` : setId;
  document.getElementById('quiz-title').textContent = label;
  document.getElementById('guide').innerHTML = '';
  setBack(()=>quizBack(), qbLabel());
  app().innerHTML = `<div class="e-list"><div class="e-skel"></div><div class="e-skel"></div><div class="e-skel"></div></div>`;
  curUnlock = await fetchUnlock();
  renderLevelLadder();
}

async function fetchUnlock(){
  try {
    const r = await fetch(`${API_BASE}/api/quiz/unlock?user_id=${encodeURIComponent(lineUserId)}&set_type=${encodeURIComponent(curSetType)}&set_id=${encodeURIComponent(curApiSetId)}`);
    if (r.ok) return await r.json();
  } catch(e){ /* API未実装 */ }
  // フォールバック: Lv1のみ解放（実在問数は不明→0扱いにせずundefinedで「準備中」判定を避ける）
  return { unlocked_max:1, by_level:{} };
}

// レベルはしご: Lv1→Lv4 の解放状況を表示
function renderLevelLadder(){
  document.getElementById('quiz-title').textContent = curLabel;
  const bl = (curUnlock && curUnlock.by_level) || {};
  const hasData = Object.keys(bl).length > 0;
  const cards = LEVELS.map(m=>{
    const st = bl[String(m.lv)] || { available:undefined, answered:0, correct:0, passed:false, unlocked:m.lv===1 };
    const available = st.available;         // undefined=不明(APIフォールバック時)
    const empty = available === 0;          // 実在0問=準備中
    const unlocked = !!st.unlocked;
    const passed = !!st.passed && !empty;
    const pct = st.answered ? Math.round((st.correct/st.answered)*100) : null;
    const need = Math.min(PASS_MIN, available || PASS_MIN);
    let cls='lv-card', meta='', tap=false;
    if (empty) { cls+=' empty'; meta = `<span class="lv-rate">問題準備中</span>`; }
    else if (!unlocked) {
      cls+=' locked';
      meta = `<span class="lv-lockic">🔒</span><span class="lv-rate">Lv${m.lv-1}を80%クリアで解放</span>`;
    } else {
      tap=true;
      const chip = passed ? `<span class="lv-chip pass">✓ 合格</span>`
                          : (st.answered>0 ? `<span class="lv-chip try">再挑戦</span>` : `<span class="lv-chip go">挑戦</span>`);
      const rate = pct!=null ? `<span class="lv-rate">正答率 ${pct}%（合格80%）</span>`
                             : (available!=null ? `<span class="lv-rate">${available}問｜正答率80%で解放</span>` : '');
      meta = chip + rate;
    }
    const arrow = tap ? `<span class="lv-arrow">›</span>` : '';
    const inner = `
      <span class="lv-num" style="background:${m.color}"><b>Lv${m.lv}</b><span>${esc(m.name)}</span></span>
      <span class="lv-body"><span class="lv-name">Lv${m.lv} ${esc(m.name)}</span><span class="lv-sub">${esc(m.sub)}</span></span>
      <span class="lv-meta">${meta}</span>${arrow}`;
    return tap
      ? `<button class="${cls}" data-lv="${m.lv}">${inner}</button>`
      : `<div class="${cls}">${inner}</div>`;
  }).join('');
  app().innerHTML = `
    <p class="lv-intro">Lv1から挑戦！ そのレベルの<b>正答率80%</b>で次のレベルが解放されます。</p>
    <div class="lv-ladder">${cards}</div>`;
  app().querySelectorAll('.lv-card[data-lv]').forEach(b=> b.onclick = ()=> startLevel(parseInt(b.dataset.lv,10)) );
  setBack(()=>quizBack(), qbLabel());
}

async function startLevel(level){
  curLevel = level;
  document.getElementById('guide').innerHTML = '';
  app().innerHTML = `<div class="e-list"><div class="e-skel"></div><div class="e-skel"></div></div>`;
  let qs = null, isSample = false;
  try {
    const r = await fetch(`${API_BASE}/api/quiz?set_type=${encodeURIComponent(curSetType)}&set_id=${encodeURIComponent(curApiSetId)}&level=${level}`);
    if (r.ok) { const d = await r.json(); qs = Array.isArray(d) ? d : (d.questions || []); }
  } catch(e){ /* API未実装 → サンプル */ }
  if (!qs || !qs.length) { qs = SAMPLE.map(s=>({...s, difficulty:level})); isSample = true; }
  QSET = qs.slice(0, N_PER_SET).map(shuffled);
  qi = 0; score = 0; pendingWrites = [];
  setBack(()=>renderLevelLadder(), 'レベル一覧');
  renderQuestion(isSample);
}

// 復習: user_quiz_progress をルールで集計するAPIから出題
async function startReview(rmode){
  const LBL = { recent:'直近の間違い', frequent:'よく間違える', weak_category:'苦手カテゴリ' };
  curLabel = `復習：${LBL[rmode] || ''}`; curSetType = 'review'; curSetId = ''; curApiSetId = '';
  document.getElementById('quiz-title').textContent = '復習';
  document.getElementById('guide').innerHTML = '';
  app().innerHTML = `<div class="e-list"><div class="e-skel"></div><div class="e-skel"></div></div>`;
  setBack(()=>quizBack(), qbLabel());

  let qs = null, apiOk = false;
  try {
    const r = await fetch(`${API_BASE}/api/quiz/review?user_id=${encodeURIComponent(lineUserId)}&mode=${encodeURIComponent(rmode)}`);
    if (r.ok) { apiOk = true; const d = await r.json(); qs = Array.isArray(d) ? d : (d.questions || []); }
  } catch(e){ /* API未実装 */ }

  // APIが応答して記録ゼロ → 空状態。API未実装(404/err) → プレビュー用サンプル。
  if (apiOk && (!qs || !qs.length)) {
    app().innerHTML = `<div class="quiz-result" style="padding-top:30px">
      <div class="quiz-result-emoji">🗒️</div>
      <p class="quiz-result-msg" style="margin-top:8px">まだ復習できる問題がありません。<br>クイズに挑戦すると、間違えた問題がここに集まります。</p>
      <div class="quiz-actions"><button class="quiz-btn primary" id="go-quiz">クイズを選ぶ</button></div>
    </div>`;
    document.getElementById('go-quiz').onclick = ()=>{ mode='company'; renderSelect(); };
    return;
  }
  let isSample = false;
  if (!qs || !qs.length) { qs = SAMPLE; isSample = true; }
  QSET = qs.slice(0, N_PER_SET).map(shuffled); qi = 0; score = 0;
  renderQuestion(isSample);
}

function renderQuestion(isSample){
  const q = QSET[qi];
  const pct = Math.round((qi)/QSET.length*100);
  const opts = q.options.map((o,i)=>`
    <button class="quiz-opt" data-i="${i}">
      <span class="mark">${'ABCD'[i]}</span><span>${esc(o)}</span>
    </button>`).join('');
  const m = LV(curLevel);
  const levelBadge = curSetType!=='review'
    ? `<div style="margin-bottom:10px"><span class="lv-badge" style="background:${m.color}">Lv${m.lv} ${esc(m.name)}</span> <span style="font-size:11.5px;color:rgba(255,255,255,0.72)">${esc(m.sub)}</span></div>`
    : '';
  app().innerHTML = `
    <div class="quiz-play">
      ${levelBadge}
      <div class="quiz-progress-wrap">
        <div class="quiz-bar"><div class="quiz-bar-fill" style="width:${pct}%"></div></div>
        <span class="quiz-count">Q ${qi+1} / ${QSET.length}</span>
      </div>
      ${(qi===0 && datasheetHref())?`<a class="quiz-src" style="display:block;margin:-2px 0 10px" href="${datasheetHref()}">📖 まず学んでから挑戦する（データシート）</a>`:''}
      <div class="quiz-card">
        <span class="quiz-cat">${esc(q.category||'クイズ')}</span>${isSample?'<span class="quiz-sample-tag">サンプル</span>':''}
        <p class="quiz-q">${esc(q.q_text)}</p>
        <div class="quiz-opts" id="opts">${opts}</div>
        <div class="quiz-feedback" id="fb"></div>
        <button class="quiz-next" id="next">${qi+1<QSET.length?'次の問題へ':'結果を見る'}</button>
      </div>
    </div>`;
  document.getElementById('opts').addEventListener('click', e=>{
    const b = e.target.closest('.quiz-opt'); if(!b) return;
    answer(parseInt(b.dataset.i,10));
  }, { once:false });
}

function answer(chosen){
  try{ localStorage.setItem('tk_quiz_answered','1'); }catch(e){} // ホームの就活ロードマップ用フラグ
  const q = QSET[qi];
  const optsEl = document.getElementById('opts');
  [...optsEl.children].forEach((b,i)=>{
    b.classList.add('locked');
    if (i===q.correct) b.classList.add('correct');
    else if (i===chosen) b.classList.add('wrong');
    else b.classList.add('dim');
    b.onclick = null;
  });
  const ok = chosen===q.correct;
  if (ok) score++;
  const fb = document.getElementById('fb');
  fb.innerHTML = `
    <p class="quiz-verdict ${ok?'ok':'ng'}">${ok?'正解！':'惜しい…'}</p>
    <p class="quiz-exp">${esc(q.explanation||'')}</p>
    ${q.source_url?`<a class="quiz-src" href="${esc(q.source_url)}" target="_blank" rel="noopener">出典を見る</a>`:''}
    ${datasheetHref()?`<a class="quiz-src" style="margin-left:14px" href="${datasheetHref()}">📖 データシートで復習</a>`:''}`;
  fb.classList.add('show');
  const nx = document.getElementById('next'); nx.classList.add('show');
  nx.onclick = ()=>{ qi++; (qi<QSET.length)?renderQuestion():renderResult(); };
  recordAnswer(q, chosen, ok);
}

async function renderResult(){
  const total = QSET.length, pct = Math.round(score/total*100);
  // 復習モードは従来どおり（レベル無し）
  if (curSetType==='review'){
    const emoji = pct>=80?'🏆':pct>=50?'👍':'📚';
    const msg = pct>=80?'素晴らしい！バッチリ。':pct>=50?'いい調子！もう一歩。':'復習して再挑戦しよう！';
    app().innerHTML = `
      <div class="quiz-result">
        <div class="quiz-result-emoji">${emoji}</div>
        <p class="quiz-score">${score}<small> / ${total}</small></p>
        <p class="quiz-result-msg">${esc(curLabel)}｜${msg}</p>
        <div class="quiz-actions">
          <button class="quiz-btn primary" id="retry">もう一度挑戦</button>
          <button class="quiz-btn ghost" id="other">ほかのクイズを選ぶ</button>
        </div>
      </div>`;
    document.getElementById('retry').onclick = ()=>{ QSET=QSET.map(shuffled); qi=0; score=0; renderQuestion(); };
    document.getElementById('other').onclick = ()=>renderSelect();
    return;
  }

  // レベルモード: サーバ集計を正として解放を再判定
  const m = LV(curLevel);
  app().innerHTML = `<div class="quiz-result" style="padding-top:34px"><div class="quiz-result-emoji">⏳</div><p class="quiz-result-msg">結果を集計中…</p></div>`;
  const prevPassed = !!(curUnlock && curUnlock.by_level && curUnlock.by_level[String(curLevel)] && curUnlock.by_level[String(curLevel)].passed);
  await Promise.allSettled(pendingWrites); pendingWrites = [];
  curUnlock = await fetchUnlock();
  const nowPassed = !!(curUnlock.by_level && curUnlock.by_level[String(curLevel)] && curUnlock.by_level[String(curLevel)].passed);
  const newlyPassed = nowPassed && !prevPassed;
  const nextLv = curLevel + 1;
  const nextSt = curUnlock.by_level && curUnlock.by_level[String(nextLv)];
  const nextPlayable = nextLv<=4 && nextSt && nextSt.unlocked && (nextSt.available==null || nextSt.available>0);
  const isSample = QSET.length && !QSET[0].id;

  // 今回の獲得XP（正解×難易度重み ＋ 新規解放ボーナス）※マイページ総XPはサーバ集計が正
  let earned = score * m.weight;
  if (newlyPassed) { earned += 100; if (curLevel===4) earned += 300; }

  const emoji = pct>=80?'🏆':pct>=50?'👍':'📚';
  const msg = nowPassed ? `Lv${m.lv} 合格！` : (pct>=50?'もう一歩で合格（80%）！':'復習して再挑戦しよう！');
  const burst = newlyPassed
    ? (curLevel===4 ? `<div class="unlock-burst">🎉 実践マスター達成！ この企業は完全制覇です</div>`
                    : `<div class="unlock-burst">🎊 Lv${nextLv} ${esc(LV(nextLv).name)} 解放！</div>`)
    : '';
  const xpLine = (!isSample && earned>0) ? `<p class="xp-pop">＋${earned} XP 獲得！</p>` : '';

  let actions = '';
  if (nextPlayable && nowPassed) actions += `<button class="quiz-btn primary" id="nextlv">Lv${nextLv} ${esc(LV(nextLv).name)}へ進む</button>`;
  if (!nowPassed) actions += `<button class="quiz-btn primary" id="retry">このレベルをもう一度</button>`;
  actions += `<button class="quiz-btn ghost" id="ladder">レベル一覧へ</button>`;
  if (datasheetHref()) actions += `<a class="quiz-btn ghost" href="${datasheetHref()}" style="text-decoration:none;text-align:center;display:block">📖 データシートで復習</a>`;
  actions += `<button class="quiz-btn ghost" id="other">ほかのクイズを選ぶ</button>`;

  app().innerHTML = `
    <div class="quiz-result">
      <div class="quiz-result-emoji">${emoji}</div>
      <p class="quiz-score">${score}<small> / ${total}</small></p>
      <p class="quiz-result-msg">${esc(curLabel)}｜Lv${m.lv} ${esc(m.name)}｜${msg}</p>
      ${xpLine}
      ${burst}
      <div class="quiz-actions" style="margin-top:14px">${actions}</div>
    </div>`;
  const nx = document.getElementById('nextlv'); if (nx) nx.onclick = ()=>startLevel(nextLv);
  const rt = document.getElementById('retry'); if (rt) rt.onclick = ()=>startLevel(curLevel);
  document.getElementById('ladder').onclick = ()=>renderLevelLadder();
  document.getElementById('other').onclick = ()=>renderSelect();
}

// 進捗記録(API未実装なら黙って失敗)。set_type/set_id を必ず送る（NOT NULL・Lv集計/解放/XPの元）。
// 復習・サンプルは記録しない（question_idが実DBに無い／set未確定のため）。
function recordAnswer(q, chosen, ok){
  if (curSetType==='review' || !q.id || !curApiSetId) return;
  try {
    const p = fetch(`${API_BASE}/api/quiz/answer`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ line_user_id: lineUserId, question_id: q.id, chosen, is_correct: ok?1:0,
        set_type: curSetType, set_id: curApiSetId })
    }).catch(()=>{});
    pendingWrites.push(p);
  } catch(e){}
}

async function main(){
  setBack(()=>tkBack('/home.html'), (window.tkBackDest?tkBackDest('/home.html').label:'ホーム'));
  // LIFF: 本番はログイン、外部ブラウザ(プレビュー)はゲスト
  try {
    await liff.init({ liffId: LIFF_ID });
    if (liff.isLoggedIn()) { const p = await liff.getProfile(); lineUserId = p.userId; }
    else if (liff.isInClient()) { liff.login(); return; }
  } catch(e){ console.warn('LIFF skipped (preview):', e && e.message); }

  const params = new URLSearchParams(location.search);
  const company = params.get('company'), industry = params.get('industry');
  const name = params.get('name') || company || industry;
  if (company) { DEEP=true; startQuiz('company', company, name); }
  else if (industry) { DEEP=true; startQuiz('industry', industry, name); }
  else renderSelect();
}
main();
</script>
