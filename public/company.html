<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>企業詳細 | トーキャリ</title>
  <!-- コマ画像CDN(jsDelivr)への接続を先出し(LCP短縮) -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="nav.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Reggae+One&family=Kaisei+Decol:wght@400;500;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #003F7D;
      --navy-dark: #002D5C;
      --gold:      #D4AF37;
      --white:     #fff;
      --white-dim: rgba(255,255,255,0.75);
      --white-faint: rgba(255,255,255,0.15);
      --ink:       #1a1a1a;
      --nana-blue: #4a90d9;
      --haruki-grn:#2d8659;
      --both-purple:#7d3c98;
      --ob-orange: #d97a1f;  /* OB先輩 等の第三者キャラ (ハルキ緑/二人紫と明確に区別できるオレンジ系) */
      --like-red:  #e63946;
      --bookmark-y:#f39c12;
    }

    html, body {
      background: var(--navy);
      min-height: 100vh;
      font-family: "Kaisei Decol", -apple-system, 'Hiragino Sans', sans-serif;
      color: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    .page-wrapper {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--navy);
    }

    /* === Header === */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navy-dark);
      display: flex;
      align-items: center;
      padding: 0 12px;
      height: 56px;
      border-bottom: 1px solid var(--white-faint);
    }

    .header-title {
      flex: 1;
      text-align: center;
      font-family: "Reggae One", sans-serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--white);
      letter-spacing: 0.08em;
    }

    .btn-back {
      background: none;
      border: 1.5px solid var(--white-faint);
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      width: 36px;
      height: 36px;
      color: var(--white);
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-header-bookmark {
      background: none;
      border: none;
      cursor: pointer;
      min-width: 36px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: var(--white-dim);
      -webkit-tap-highlight-color: transparent;
      padding: 0;
      transition: transform 0.15s;
    }

    .btn-header-bookmark:active { transform: scale(0.85); }
    .btn-header-bookmark.bookmarked { color: var(--bookmark-y); }
    .btn-header-bookmark:disabled { opacity: 0.4; cursor: default; }

    /* === Loading / Error === */
    .loading-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 240px;
      flex-direction: column;
      gap: 12px;
    }

    .loading-text {
      color: var(--white-dim);
      font-size: 14px;
      letter-spacing: 0.1em;
    }

    .loading-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      margin: 0 3px;
      animation: bounce 0.8s infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.15s; }
    .loading-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .error-text {
      color: #ff8a80;
      font-size: 14px;
      padding: 24px 16px;
      text-align: center;
      line-height: 1.6;
    }

    .empty-text {
      color: var(--white-dim);
      font-size: 14px;
      text-align: center;
      padding: 40px 16px;
    }

    /* === Company header === */
    .company-detail {
      padding: 24px 20px 20px;
      text-align: center;
      border-bottom: 1px solid var(--white-faint);
    }

    .company-detail-name {
      font-family: "Reggae One", sans-serif;
      font-size: 24px;
      color: var(--white);
      letter-spacing: 0.06em;
    }

    .company-detail-desc {
      font-size: 13px;
      color: var(--white-dim);
      line-height: 1.7;
      margin-top: 10px;
    }

    /* === この会社でできること (コンパクト入口メニュー) === */
    .co-menu {
      display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch;
      padding: 12px 14px 4px; scrollbar-width: none;
    }
    .co-menu::-webkit-scrollbar { display: none; }
    .co-chip {
      flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 4px;
      width: 66px; padding: 9px 4px; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16); border-radius: 12px;
      color: var(--white); font-size: 10.5px; font-weight: 700; text-decoration: none;
      cursor: pointer; -webkit-tap-highlight-color: transparent; text-align: center; line-height: 1.25;
    }
    .co-chip:active { background: rgba(255,255,255,0.18); }
    .co-chip .cm-ic { font-size: 20px; line-height: 1; }
    .co-menu-t { padding: 14px 16px 2px; font-size: 12px; font-weight: 800; color: var(--white-dim); letter-spacing: 0.04em; }

    /* === Panels === */
    .panels-section {
      padding: 20px 16px 28px;
    }

    .panel {
      margin-bottom: 32px;
    }

    .panel-num {
      display: inline-block;
      font-family: "Reggae One", sans-serif;
      font-size: 12px;
      color: var(--navy);
      background: var(--white);
      padding: 3px 14px 3px 10px;
      margin-bottom: 10px;
      letter-spacing: 0.08em;
      border-radius: 2px;
      clip-path: polygon(0 0, 100% 0, calc(100% - 8px) 50%, 100% 100%, 0 100%);
    }

    .panel-image-wrap {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .panel-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #fff;
    }

    /* === Speech bubble === */
    .speech-bubble {
      position: relative;
      background: #fff;
      border-radius: 16px;
      padding: 26px 16px 12px;
      font-size: 15px;
      line-height: 1.7;
      color: var(--ink);
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }

    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -13px; left: 28px;
      border: 13px solid transparent;
      border-top-color: #fff;
      border-right-width: 0;
    }

    .speech-bubble.haruki::before { left: auto; right: 28px; border-right-width: 0; border-left-width: 0; border-top-color: #fff; border: 13px solid transparent; border-top-color: #fff; right: 28px; left: auto; }
    .speech-bubble.haruki::before { left: auto; right: 28px; width: 0; height: 0; border-top: 13px solid #fff; border-left: 13px solid transparent; border-right: 0; border-bottom: 0; }
    .speech-bubble.both::before   { left: 50%; transform: translateX(-50%); }
    /* OB先輩は中央寄りで尻尾を出す (ハルキ右・ナナ左と区別、二人とは色で区別) */
    .speech-bubble.ob::before     { left: 50%; transform: translateX(-50%); }

    .char-tag {
      position: absolute;
      top: 0; left: 14px;
      transform: translateY(-50%);
      font-family: "Kaisei Decol", sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      background: var(--nana-blue);
      border-radius: 20px;
      padding: 3px 12px;
      z-index: 2;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .char-tag.haruki  { background: var(--haruki-grn); left: auto; right: 14px; }
    .char-tag.both    { background: var(--both-purple); left: 50%; transform: translateX(-50%) translateY(-50%); }
    .char-tag.ob      { background: var(--ob-orange); left: 50%; transform: translateX(-50%) translateY(-50%); }

    .bubble-text { font-size: 14px; line-height: 1.7; color: var(--ink); }

    /* === v3.6: 複数吹き出し (script_json から生成) === */
    .bubble-stack {
      display: flex;
      flex-direction: column;
      gap: 18px;  /* 14→18 に拡大: 尻尾(12px)が次の吹き出しと干渉しないよう余裕を確保 */
    }
    .bubble-stack .speech-bubble { margin: 0; }
    /* nana は左寄り・haruki は右寄り・both は中央でストーリー性を出す (画面幅の85%) */
    .bubble-stack .speech-bubble.nana   { margin-right: 15%; }
    .bubble-stack .speech-bubble.haruki { margin-left: 15%; }
    .bubble-stack .speech-bubble.both   { margin-left: 5%; margin-right: 5%; }
    .bubble-stack .speech-bubble.ob     { margin-left: 8%; margin-right: 8%; background: #fff5ec; }  /* OB先輩は薄いオレンジ背景で他と区別 */

    /* === v3.6: bubble-stack 内の尻尾(三角)を左右対称化 ===
       既存の単一吹き出し (三井物産等) は外側スコープのため無変化。
       下向き三角・白塗り・10px ベース幅 × 12px 高さで統一。 */
    .bubble-stack .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -10px;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 12px solid #fff;   /* 吹き出し背景色と一致 */
      border-bottom: 0;
      transform: none;
    }
    .bubble-stack .speech-bubble.nana::before   { left: 28px; right: auto; }
    .bubble-stack .speech-bubble.haruki::before { left: auto; right: 28px; }
    .bubble-stack .speech-bubble.both::before   { left: 50%; right: auto; transform: translateX(-50%); }
    .bubble-stack .speech-bubble.ob::before     { left: 50%; right: auto; transform: translateX(-50%); border-top-color: #fff5ec; }

    /* === v3.6: 画像上 main_copy オーバーレイ === */
    .panel-image-wrap { position: relative; }
    .panel-overlay {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 28px 14px 14px;
      background: linear-gradient(to top,
        rgba(0,0,0,0.78) 0%,
        rgba(0,0,0,0.45) 60%,
        rgba(0,0,0,0) 100%);
      color: #fff;
      font-family: "Reggae One", "Kaisei Decol", sans-serif;
      letter-spacing: 0.02em;
      line-height: 1.25;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      pointer-events: none;  /* タッチ操作を画像側に通す */
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
    }
    .panel-overlay .overlay-main {
      display: block;
      font-size: 22px;
      font-weight: 700;
    }
    .panel-overlay .overlay-sub {
      display: block;
      font-size: 12px;
      margin-top: 6px;
      opacity: 0.88;
      font-family: "Kaisei Decol", sans-serif;
      letter-spacing: 0.03em;
      font-weight: 400;
    }

    /* === Panel actions === */
    .panel-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
      padding: 0 4px;
    }

    .panel-btn {
      background: rgba(255,255,255,0.15);
      border: 1.5px solid var(--white-faint);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
      min-height: 34px;
    }

    .panel-btn:active  { background: rgba(255,255,255,0.25); }
    .panel-btn:disabled { opacity: 0.4; cursor: default; }
    .panel-btn.liked   { background: var(--like-red); border-color: var(--like-red); }
    .panel-btn .icon   { font-size: 15px; line-height: 1; }

    /* === YouTube CTA === */
    .cta-section { padding: 0 16px 24px; }

    .cta-youtube {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid var(--white-faint);
      border-radius: 12px;
      padding: 18px 20px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s;
      width: 100%;
      text-align: left;
    }

    .cta-youtube:active { background: rgba(255,255,255,0.2); }

    .cta-icon {
      font-size: 28px;
      flex-shrink: 0;
    }

    .cta-main {
      display: block;
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
    }

    .cta-sub {
      display: block;
      font-size: 12px;
      color: var(--white-dim);
      margin-top: 3px;
    }

    /* === Recommends === */
    .recommend-section {
      padding: 20px 16px 28px;
      border-top: 1px solid var(--white-faint);
    }

    .recommend-title {
      font-family: "Reggae One", sans-serif;
      font-size: 15px;
      color: var(--white-dim);
      margin-bottom: 14px;
      letter-spacing: 0.06em;
    }

    .recommend-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .recommend-card {
      background: rgba(255,255,255,0.1);
      border: 1.5px solid var(--white-faint);
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      display: block;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }

    .recommend-card:active { background: rgba(255,255,255,0.2); }

    .recommend-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.4;
    }

    .recommend-desc {
      font-size: 11px;
      color: var(--white-dim);
      margin-top: 4px;
      line-height: 1.4;
    }

    /* === Verification footer === */
    .verification-footer {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(0,0,0,0.2);
      border-top: 1px dashed rgba(255,255,255,0.2);
      font-size: 11px;
      color: var(--white-dim);
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .badge-stale      { background: rgba(255,165,0,0.2); color: #ffa500; }
    .badge-unverified { background: rgba(255,100,100,0.2); color: #ff8080; }
    .badge-verified   { background: rgba(100,220,100,0.2); color: #90ee90; }

    /* === Toast === */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }
  </style>
</head>

<script>
const LIFF_ID = '2010075487-89AJxZnA';
const API_BASE = 'https://10koma-shukatsu-api.oscar-dodds.workers.dev';

// D1のindustry_id → 業界ハブ(gyokai)の16分類slug。該当なし(others等)は null=チップ非表示。
const IND2GYOKAI = {
  sogo_shosha:'sogo-shosha', specialty_trading:'senmon-shosha', banking_insurance:'finance',
  it_ai_saas:'it-ai-saas-game', it_ai_saas_game:'it-ai-saas-game', game_entertainment:'it-ai-saas-game',
  consulting:'consulting', manufacturer:'manufacturer', manufacturer_maker:'manufacturer',
  electronics_precision:'manufacturer', materials_chemical:'manufacturer', consumer_goods:'manufacturer',
  advertising_media:'ad-media', infra_energy:'infra-energy', real_estate:'realestate-construction',
  retail:'retail', food_beverage:'food-beverage', pharma_healthcare:'medical-healthcare',
  transport_logistics:'transport-logistics', education_hr:'education-hr', startup:'startup',
  deeptech_space_ai:'deeptech-space-ai',
};
function gyokaiSlugFor(industryId){ return IND2GYOKAI[industryId] || null; }

function goBack() {
  // ?from= を正とする(nav.js)。無ければモード別の親: 業界mode→業界研究 / 企業mode→企業一覧
  const params = new URLSearchParams(location.search);
  const industryMode = params.get('industry') && !params.get('id');
  tkBack(industryMode ? '/gyokai.html' : '/industry.html');
}
let currentUserId = null;
let currentCompanyId = null;
let currentCompanyName = '';
let isBookmarked = false;

const CHAR_LABEL = { nana: 'ナナ', haruki: 'ハルキ', both: '二人' };
const KNOWN_SPEAKERS = new Set(['nana', 'haruki', 'both']);

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// セリフ(dialogue / script_json)に紛れた Markdown 太字記号 ** を除去 (再発防止の二重ガード)。
// main_copy / sub_copy は対象外 (意図的な記号が入る余地を残す)。
function stripMd(s) {
  return String(s ?? '').replace(/\*\*/g, '');
}

/**
 * script_json (string) を配列にパース。無効/空なら null。
 * 旧データ (script_json なし) は null を返してフォールバックさせる。
 */
function parseScriptJson(raw) {
  if (!raw || typeof raw !== 'string') return null;
  try {
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr) || arr.length === 0) return null;
    return arr.filter(s => typeof s === 'string' && s.trim().length > 0);
  } catch { return null; }
}

/**
 * "[nana] セリフ" → { cssSpeaker:'nana', label:'ナナ', text:'セリフ' }
 * 未知タグ "[OB先輩] ..." → cssSpeaker:'haruki' (CSS色フォールバック), label:'OB先輩' (表示はそのまま)
 * タグなし行 → cssSpeaker:'haruki', label:'ハルキ' (デフォルト)
 */
function splitSpeakerLine(line) {
  const m = String(line).match(/^\[([^\]]+)\]\s*(.*)$/);
  if (!m) return { cssSpeaker: 'haruki', label: CHAR_LABEL.haruki, text: String(line).trim() };
  const rawTag = m[1];
  const lc = rawTag.toLowerCase();
  // 既知主役 (nana/haruki/both) はそのままCSSクラス
  if (KNOWN_SPEAKERS.has(lc)) {
    return { cssSpeaker: lc, label: CHAR_LABEL[lc] || rawTag, text: m[2].trim() };
  }
  // 第三者 (OB先輩・先生・タカシ先輩 等) は ob カテゴリ (オレンジ系、薄背景で主役と区別)
  return { cssSpeaker: 'ob', label: rawTag, text: m[2].trim() };
}

/**
 * Panel オブジェクトから「シェア用クリーンテキスト」を作る。
 * 旧データは dialogue をそのまま、新データは script_json から [tag] を剥がしたもの。
 */
function panelCleanDialogue(p) {
  const arr = parseScriptJson(p.script_json);
  if (!arr) return stripMd(String(p.dialogue ?? ''));
  return arr.map(l => stripMd(splitSpeakerLine(l).text)).join('\n');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('show'), 1800);
}

function buildVerificationFooter(lastVerifiedAt) {
  if (!lastVerifiedAt) {
    return `<div class="verification-footer"><span class="badge badge-unverified">⚠ 未検証</span></div>`;
  }
  const dateStr = String(lastVerifiedAt).slice(0, 10);
  const stale = (Date.now() - new Date(lastVerifiedAt).getTime()) > 180 * 24 * 60 * 60 * 1000;
  return `
    <div class="verification-footer">
      <span class="verification-date">最終確認日：${esc(dateStr)}</span>
      ${stale
        ? '<span class="badge badge-stale">⚠ 情報が古い可能性があります</span>'
        : '<span class="badge badge-verified">✓ 検証済み</span>'}
    </div>`;
}

async function initLiff() {
  // 開発用: localhost ではLIFF初期化をスキップして mock profile を返す
  // (本番 pages.dev / LIFF 経由ではこの分岐に入らないため挙動は無変化)
  if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
    console.info('[dev] localhost detected → LIFF bypass (preview mode)');
    return { userId: 'localhost-preview', displayName: 'Preview', pictureUrl: '' };
  }
  await liff.init({ liffId: LIFF_ID });
  if (!liff.isLoggedIn()) { liff.login(); return null; }
  const profile = await liff.getProfile();
  fetch(`${API_BASE}/api/users/upsert`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      line_user_id: profile.userId,
      display_name: profile.displayName,
      picture_url: profile.pictureUrl
    })
  }).catch(() => {});
  return profile;
}

function updateBookmarkUI() {
  const btn = document.getElementById('btn-header-bookmark');
  const icon = document.getElementById('header-bookmark-icon');
  if (btn) {
    btn.classList.toggle('bookmarked', isBookmarked);
    icon.textContent = isBookmarked ? '★' : '☆';
  }
}

async function toggleBookmark() {
  if (!currentUserId) return;
  const btn = document.getElementById('btn-header-bookmark');
  btn.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/api/bookmark`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ line_user_id: currentUserId, company_id: currentCompanyId })
    });
    const { bookmarked } = await res.json();
    isBookmarked = bookmarked;
    updateBookmarkUI();
    showToast(bookmarked ? '★ お気に入りに追加しました' : '☆ お気に入りから削除しました');
  } catch (e) {
    console.error(e);
    showToast('エラーが発生しました');
  } finally {
    btn.disabled = false;
  }
}

async function togglePanelLike(btn, panelNum) {
  if (!currentUserId || btn.disabled) return;
  btn.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/api/like`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        line_user_id: currentUserId,
        content_type: 'panel',
        content_id: `${currentCompanyId}:${panelNum}`
      })
    });
    const { liked } = await res.json();
    btn.classList.toggle('liked', liked);
    btn.querySelector('.icon').textContent = liked ? '♥' : '♡';
  } catch (e) {
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

async function sharePanel(panelNum, dialogue) {
  fetch(`${API_BASE}/api/share-log`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      line_user_id: currentUserId,
      content_type: 'panel_share',
      content_id: `${currentCompanyId}:${panelNum}`
    })
  }).catch(() => {});

  try {
    if (liff && liff.isApiAvailable && liff.isApiAvailable('shareTargetPicker')) {
      await liff.shareTargetPicker([{
        type: 'text',
        text: `「${dialogue}」\n\nトーキャリで${currentCompanyName || 'この企業'}を読んでます！`
      }]);
      return;
    }
  } catch (e) { console.warn(e); }
  showToast('シェア機能はLINE内でのみ利用できます');
}

function openYoutube(url) {
  fetch(`${API_BASE}/api/share-log`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      line_user_id: currentUserId,
      content_type: 'video_click',
      content_id: currentCompanyId
    })
  }).catch(() => {});
  try {
    if (liff && liff.openWindow) { liff.openWindow({ url, external: true }); return; }
  } catch (e) { console.warn(e); }
  window.open(url, '_blank');
}

// === 業界研究モード: 10コマビューアを業界slugで再利用（企業モードとは独立） ===
async function renderIndustry(slug, name) {
  const app = document.getElementById('app');
  const bm = document.getElementById('btn-header-bookmark'); if (bm) bm.style.display = 'none';
  document.getElementById('header-title').textContent = name || '業界研究';
  // 業界mode: from=無しの戻り先は業界研究TOP（goBackもそう遷移する）。ラベルを合わせる。
  const _bb = document.getElementById('btn-back');
  if (_bb && !new URLSearchParams(location.search).get('from')) _bb.textContent = '‹ 業界研究TOP';
  document.title = `${name || '業界'}｜業界研究｜トーキャリ`;
  try { await liff.init({ liffId: LIFF_ID }); } catch (e) { /* プレビュー(外部ブラウザ)はゲスト */ }

  // 業界10コマは D1反映フェーズ(タブE)で有効化。未反映のうちは panels 空 → クイズ導線を表示。
  let panels = [];
  try {
    const r = await fetch(`${API_BASE}/api/industries/${encodeURIComponent(slug)}`);
    if (r.ok) { const d = await r.json(); panels = d.panels || []; }
  } catch (e) { /* 未反映 */ }

  if (panels[0]?.image_url) {
    const l = document.createElement('link');
    l.rel = 'preload'; l.as = 'image'; l.href = panels[0].image_url; l.setAttribute('fetchpriority', 'high');
    document.head.appendChild(l);
  }

  const panelsHtml = panels.map((p, idx) => {
    const scriptArr = parseScriptJson(p.script_json);
    let bubbleHtml;
    if (scriptArr) {
      bubbleHtml = `<div class="bubble-stack">${scriptArr.map(line => {
        const { cssSpeaker, label, text } = splitSpeakerLine(line);
        return `<div class="speech-bubble ${cssSpeaker}"><span class="char-tag ${cssSpeaker}">${esc(label)}</span><p class="bubble-text">${esc(stripMd(text))}</p></div>`;
      }).join('')}</div>`;
    } else {
      bubbleHtml = `<div class="speech-bubble ${esc(p.character || '')}"><span class="char-tag ${esc(p.character || '')}">${esc(CHAR_LABEL[p.character] ?? (p.character || ''))}</span><p class="bubble-text">${esc(stripMd(p.dialogue || ''))}</p></div>`;
    }
    const overlayHtml = p.main_copy
      ? `<div class="panel-overlay"><span class="overlay-main">${esc(p.main_copy)}</span>${p.sub_copy ? `<span class="overlay-sub">${esc(p.sub_copy)}</span>` : ''}</div>`
      : '';
    return `<div class="panel"><div class="panel-num">${String(p.panel_num).padStart(2, '0')} / ${String(panels.length).padStart(2, '0')}</div><div class="panel-image-wrap"><img src="${esc(p.image_url)}" alt="コマ${p.panel_num}" width="900" height="1200" ${idx === 0 ? 'loading="eager" fetchpriority="high"' : 'loading="lazy"'} decoding="async" onerror="this.style.display='none'">${overlayHtml}</div>${bubbleHtml}</div>`;
  }).join('');

  const quizCta = `<div class="cta-section">
    <button class="cta-youtube" id="ind-quiz">
      <span class="cta-icon">🧠</span>
      <span class="cta-text"><span class="cta-main">この業界のクイズに挑戦</span><span class="cta-sub">理解度をチェック</span></span>
    </button></div>`;

  app.innerHTML = `
    <div class="company-detail">
      <p class="company-detail-name">${esc(name || '業界研究')}</p>
      <p class="company-detail-desc">${panels.length ? '業界を10コマで研究しよう' : '業界クイズで理解度をチェックしよう'}</p>
    </div>
    ${panels.length ? `<div class="panels-section">${panelsHtml}</div>` : ''}
    ${quizCta}`;
  document.getElementById('ind-quiz').onclick = () => {
    location.href = `quiz.html?industry=${encodeURIComponent(slug)}&name=${encodeURIComponent(name || '')}`;
  };
}

async function main() {
  const app = document.getElementById('app');
  const params = new URLSearchParams(location.search);
  const companyId = params.get('id');

  // 業界研究モード（?industry=<slug> かつ id無し）は企業モードに一切触れず早期リターン
  const industrySlug = params.get('industry');
  if (industrySlug && !companyId) { return renderIndustry(industrySlug, params.get('name') || ''); }

  if (!companyId) {
    app.innerHTML = '<p class="error-text">企業IDが指定されていません</p>';
    return;
  }
  currentCompanyId = companyId;

  try {
    const profile = await initLiff();
    if (!profile) return;
    currentUserId = profile.userId;

    const res = await fetch(`${API_BASE}/api/companies/${encodeURIComponent(companyId)}?user_id=${encodeURIComponent(currentUserId)}`);
    if (res.status === 404) { app.innerHTML = '<p class="error-text">企業が見つかりません</p>'; return; }
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const company = await res.json();

    fetch(`${API_BASE}/api/log-view`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ line_user_id: currentUserId, content_type: 'company', content_id: companyId })
    }).catch(() => {});

    currentCompanyName = company.name || '';
    document.getElementById('header-title').textContent = company.name;
    document.title = `${company.name} | トーキャリ`;
    isBookmarked = !!company.bookmarked;
    updateBookmarkUI();

    const panels = company.panels ?? [];
    const panelLikes = company.panel_likes ?? {};
    const recommends = company.recommends ?? [];

    // 1コマ目(LCP候補)を最優先プリロード（残りコマは lazy でスクロール時に読み込む）
    if (panels[0]?.image_url) {
      const l = document.createElement('link');
      l.rel = 'preload'; l.as = 'image'; l.href = panels[0].image_url;
      l.setAttribute('fetchpriority', 'high');
      document.head.appendChild(l);
    }

    const panelsHtml = panels.length === 0
      ? '<p class="empty-text">パネルデータはまだありません</p>'
      : panels.map((p, idx) => {
          const liked = !!panelLikes[p.panel_num];
          const scriptArr = parseScriptJson(p.script_json);

          // === 吹き出し: 新方式 (script_json から複数生成) または 旧方式 (dialogue 単発) ===
          let bubbleHtml;
          if (scriptArr) {
            const innerBubbles = scriptArr.map(line => {
              const { cssSpeaker, label, text } = splitSpeakerLine(line);
              return `
                <div class="speech-bubble ${cssSpeaker}">
                  <span class="char-tag ${cssSpeaker}">${esc(label)}</span>
                  <p class="bubble-text">${esc(stripMd(text))}</p>
                </div>`;
            }).join('');
            bubbleHtml = `<div class="bubble-stack">${innerBubbles}</div>`;
          } else {
            // 旧データ (三井物産等) は従来通り 単一吹き出し
            const bubbleClass = `speech-bubble ${esc(p.character)}`;
            bubbleHtml = `
              <div class="${bubbleClass}">
                <span class="char-tag ${esc(p.character)}">${esc(CHAR_LABEL[p.character] ?? p.character)}</span>
                <p class="bubble-text">${esc(stripMd(p.dialogue))}</p>
              </div>`;
          }

          // === 画像上 main_copy オーバーレイ (新方式のみ、無ければ表示しない) ===
          const overlayHtml = p.main_copy
            ? `<div class="panel-overlay">
                <span class="overlay-main">${esc(p.main_copy)}</span>
                ${p.sub_copy ? `<span class="overlay-sub">${esc(p.sub_copy)}</span>` : ''}
              </div>`
            : '';

          const shareDialogue = panelCleanDialogue(p);
          return `
            <div class="panel">
              <div class="panel-num">${String(p.panel_num).padStart(2, '0')} / ${String(panels.length).padStart(2, '0')}</div>
              <div class="panel-image-wrap">
                <img src="${esc(p.image_url)}" alt="コマ${p.panel_num}" width="900" height="1200"
                     ${idx === 0 ? 'loading="eager" fetchpriority="high"' : 'loading="lazy"'} decoding="async"
                     onerror="this.style.display='none'">
                ${overlayHtml}
              </div>
              ${bubbleHtml}
              <div class="panel-actions">
                <button class="panel-btn panel-like ${liked ? 'liked' : ''}" data-panel="${p.panel_num}" aria-label="いいね">
                  <span class="icon">${liked ? '♥' : '♡'}</span>
                  <span class="label">いいね</span>
                </button>
                <button class="panel-btn panel-share" data-panel="${p.panel_num}" data-dialogue="${esc(shareDialogue)}" aria-label="シェア">
                  <span class="icon">↗</span>
                  <span class="label">シェア</span>
                </button>
              </div>
            </div>`;
        }).join('');

    const videoHtml = company.video_url ? `
      <div class="cta-section">
        <button class="cta-youtube" data-url="${esc(company.video_url)}">
          <span class="cta-icon">▶</span>
          <span class="cta-text">
            <span class="cta-main">動画で詳しく見る</span>
            <span class="cta-sub">動画で深掘り解説</span>
          </span>
        </button>
      </div>` : '';

    const recommendsHtml = recommends.length === 0 ? '' : `
      <div class="recommend-section">
        <p class="recommend-title">▼ 次の企業を読む</p>
        <div class="recommend-grid">
          ${recommends.map(r => `
            <a href="company.html?id=${encodeURIComponent(r.id)}&from=company&fromId=${encodeURIComponent(companyId)}" class="recommend-card">
              <div class="recommend-name">${esc(r.name)}</div>
              ${r.description ? `<div class="recommend-desc">${esc(r.description).slice(0, 50)}…</div>` : ''}
            </a>`).join('')}
        </div>
      </div>`;

    const quizCtaHtml = `
      <div class="cta-section">
        <button class="cta-youtube" id="company-datasheet">
          <span class="cta-icon">📖</span>
          <span class="cta-text"><span class="cta-main">データシートで学ぶ</span><span class="cta-sub">事業・財務・社風・沿革（出典付き）</span></span>
        </button>
        <button class="cta-youtube" id="company-quiz" style="margin-top:10px">
          <span class="cta-icon">🧠</span>
          <span class="cta-text"><span class="cta-main">この企業のクイズに挑戦</span><span class="cta-sub">理解度をチェック</span></span>
        </button>
        <button class="cta-youtube" id="company-compare" style="margin-top:10px">
          <span class="cta-icon">⚖️</span>
          <span class="cta-text"><span class="cta-main">比較リストに追加</span><span class="cta-sub">他社と横並びで見る（一次情報）</span></span>
        </button>
        <button class="cta-youtube" id="company-eskit" style="margin-top:10px">
          <span class="cta-icon">🧰</span>
          <span class="cta-text"><span class="cta-main">ES・面接対策キット</span><span class="cta-sub">志望動機の材料・想定質問</span></span>
        </button></div>`;

    // 「この会社でできること」= 既存の遷移先を整理したコンパクト入口（複製CTAでなく導線集約・追加fetchなし）
    const menuItems = [];
    if (panels.length) menuItems.push({ ic: '📱', l: '10コマ', act: 'scroll' });
    // この業界を知る → 業界ハブ(該当slugを自動展開)。industry_id が16分類に対応する社のみ表示。
    const gyokaiSlug = gyokaiSlugFor(company.industry_id);
    if (gyokaiSlug) menuItems.push({ ic: '🌐', l: '業界を知る', href: `/gyokai.html?open=${encodeURIComponent(gyokaiSlug)}&from=company&fromId=${encodeURIComponent(companyId)}` });
    if (company.video_url) menuItems.push({ ic: '🎬', l: '企業動画', act: 'video' });
    if (company.kessan_url) menuItems.push({ ic: '💹', l: '決算書動画', act: 'kessan' });
    menuItems.push({ ic: '📊', l: 'データシート', href: `datasheet.html?id=${encodeURIComponent(companyId)}&name=${encodeURIComponent(company.name)}` });
    menuItems.push({ ic: '🧠', l: 'クイズ', href: `quiz.html?company=${encodeURIComponent(companyId)}&name=${encodeURIComponent(company.name)}` });
    menuItems.push({ ic: '🧰', l: 'ESキット', href: `es_kit.html?id=${encodeURIComponent(companyId)}` });
    menuItems.push({ ic: '⚖️', l: '比較に追加', href: `compare.html?add=${encodeURIComponent(companyId)}` });
    menuItems.push({ ic: '🚪', l: 'AI OB訪問', href: `room.html?company=${encodeURIComponent(companyId)}&name=${encodeURIComponent(company.name)}&from=company&fromId=${encodeURIComponent(companyId)}` });
    const menuHtml = `
      <p class="co-menu-t">この会社でできること</p>
      <div class="co-menu">${menuItems.map((m, i) => `
        <div class="co-chip" data-i="${i}"><span class="cm-ic">${m.ic}</span><span>${esc(m.l)}</span></div>`).join('')}</div>`;

    app.innerHTML = `
      <div class="company-detail">
        <p class="company-detail-name">${esc(company.name)}</p>
        ${company.description ? `<p class="company-detail-desc">${esc(company.description)}</p>` : ''}
      </div>
      ${menuHtml}
      <div class="panels-section" id="panels">${panelsHtml}</div>
      ${quizCtaHtml}
      ${videoHtml}
      ${recommendsHtml}
      ${buildVerificationFooter(company.last_verified_at)}`;

    document.querySelectorAll('.co-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const m = menuItems[parseInt(chip.dataset.i, 10)];
        if (!m) return;
        if (m.act === 'scroll') { const el = document.getElementById('panels'); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
        else if (m.act === 'video') { openYoutube(company.video_url); }
        else if (m.act === 'kessan') { openYoutube(company.kessan_url); }
        else if (m.href) { location.href = m.href; }
      });
    });

    const cq = document.getElementById('company-quiz');
    const F = `&from=company&fromId=${encodeURIComponent(companyId)}`;  // 各機能から企業ページへ戻す
    if (cq) cq.onclick = () => { location.href = `quiz.html?company=${encodeURIComponent(companyId)}&name=${encodeURIComponent(company.name)}${F}`; };
    const cc = document.getElementById('company-compare');
    if (cc) cc.onclick = () => { location.href = `compare.html?add=${encodeURIComponent(companyId)}${F}`; };
    const ck = document.getElementById('company-eskit');
    if (ck) ck.onclick = () => { location.href = `es_kit.html?id=${encodeURIComponent(companyId)}${F}`; };
    const cds = document.getElementById('company-datasheet');
    if (cds) cds.onclick = () => { location.href = `datasheet.html?id=${encodeURIComponent(companyId)}&name=${encodeURIComponent(company.name)}${F}`; };

    document.querySelectorAll('.panel-like').forEach(btn => {
      btn.addEventListener('click', e => {
        const panelNum = parseInt(e.currentTarget.dataset.panel, 10);
        togglePanelLike(e.currentTarget, panelNum);
      });
    });
    document.querySelectorAll('.panel-share').forEach(btn => {
      btn.addEventListener('click', e => {
        const panelNum = parseInt(e.currentTarget.dataset.panel, 10);
        const dialogue = e.currentTarget.dataset.dialogue;
        sharePanel(panelNum, dialogue);
      });
    });

    const youtubeBtn = document.querySelector('.cta-youtube');
    if (youtubeBtn) {
      youtubeBtn.addEventListener('click', e => {
        openYoutube(e.currentTarget.dataset.url);
      });
    }
  } catch (err) {
    app.innerHTML = `<p class="error-text">エラー: ${esc(err.message)}</p>`;
    console.error(err);
  }
}

document.getElementById('btn-header-bookmark').addEventListener('click', toggleBookmark);

main();
</script>
