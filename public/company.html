<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>企業詳細 | 10コマ就活</title>
  <link rel="stylesheet" href="shared.css">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<div class="page-wrapper">
  <header class="header">
    <button class="btn-back" onclick="history.back()" aria-label="戻る">←</button>
    <h1 class="header-title" id="header-title">企業詳細</h1>
    <button class="btn-header-bookmark" id="btn-header-bookmark" aria-label="お気に入り保存">
      <span id="header-bookmark-icon">☆</span>
    </button>
  </header>
  <div id="app">
    <div class="loading-wrap">
      <p class="loading-text">読み込み中</p>
      <div>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
    </div>
  </div>
  <div id="toast" class="toast"></div>
</div>

<script>
const LIFF_ID = '2010075487-89AJxZnA';
const API_BASE = 'https://10koma-shukatsu-api.oscar-dodds.workers.dev';
let currentUserId = null;
let currentCompanyId = null;
let isBookmarked = false;

const CHAR_LABEL = { nana: 'ナナ', haruki: 'ハルキ', both: '二人' };

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('show'), 1800);
}

function buildVerificationFooter(lastVerifiedAt) {
  if (!lastVerifiedAt) {
    return `<div class="verification-footer"><span class="badge badge-unverified">⚠ 未検証</span></div>`;
  }
  const dateStr = String(lastVerifiedAt).slice(0, 10);
  const stale = (Date.now() - new Date(lastVerifiedAt).getTime()) > 180 * 24 * 60 * 60 * 1000;
  return `
    <div class="verification-footer">
      <span class="verification-date">最終確認日：${esc(dateStr)}</span>
      ${stale
        ? '<span class="badge badge-stale">⚠ 情報が古い可能性があります</span>'
        : '<span class="badge badge-verified">✓ 検証済み</span>'}
    </div>`;
}

async function initLiff() {
  await liff.init({ liffId: LIFF_ID });
  if (!liff.isLoggedIn()) { liff.login(); return null; }
  const profile = await liff.getProfile();
  fetch(`${API_BASE}/api/users/upsert`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      line_user_id: profile.userId,
      display_name: profile.displayName,
      picture_url: profile.pictureUrl
    })
  }).catch(() => {});
  return profile;
}

function updateBookmarkUI() {
  const headerBtn = document.getElementById('btn-header-bookmark');
  const headerIcon = document.getElementById('header-bookmark-icon');
  if (headerBtn) {
    headerBtn.classList.toggle('bookmarked', isBookmarked);
    headerIcon.textContent = isBookmarked ? '★' : '☆';
  }
}

async function toggleBookmark() {
  if (!currentUserId) return;
  const headerBtn = document.getElementById('btn-header-bookmark');
  headerBtn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/api/bookmark`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ line_user_id: currentUserId, company_id: currentCompanyId })
    });
    const { bookmarked } = await res.json();
    isBookmarked = bookmarked;
    updateBookmarkUI();
    showToast(bookmarked ? '★ お気に入りに追加しました' : '☆ お気に入りから削除しました');
  } catch (e) {
    console.error(e);
    showToast('エラーが発生しました');
  } finally {
    headerBtn.disabled = false;
  }
}

async function togglePanelLike(btn, panelNum) {
  if (!currentUserId || btn.disabled) return;
  btn.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/api/like`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        line_user_id: currentUserId,
        content_type: 'panel',
        content_id: `${currentCompanyId}:${panelNum}`
      })
    });
    const { liked } = await res.json();
    btn.classList.toggle('liked', liked);
    btn.querySelector('.icon').textContent = liked ? '♥' : '♡';
  } catch (e) {
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

async function sharePanel(panelNum, dialogue) {
  fetch(`${API_BASE}/api/share-log`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      line_user_id: currentUserId,
      content_type: 'panel_share',
      content_id: `${currentCompanyId}:${panelNum}`
    })
  }).catch(() => {});

  try {
    if (liff && liff.isApiAvailable && liff.isApiAvailable('shareTargetPicker')) {
      await liff.shareTargetPicker([{
        type: 'text',
        text: `「${dialogue}」\n\n10コマ就活で${currentCompanyId}を読んでます！`
      }]);
      return;
    }
  } catch (e) { console.warn(e); }
  showToast('シェア機能はLINE内でのみ利用できます');
}

function openYoutube(url) {
  fetch(`${API_BASE}/api/share-log`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      line_user_id: currentUserId,
      content_type: 'video_click',
      content_id: currentCompanyId
    })
  }).catch(() => {});
  try {
    if (liff && liff.openWindow) {
      liff.openWindow({ url, external: true });
      return;
    }
  } catch (e) { console.warn(e); }
  window.open(url, '_blank');
}

async function main() {
  const app = document.getElementById('app');
  const params = new URLSearchParams(location.search);
  const companyId = params.get('id');

  if (!companyId) {
    app.innerHTML = '<p class="error-text">企業IDが指定されていません</p>';
    return;
  }
  currentCompanyId = companyId;

  try {
    const profile = await initLiff();
    if (!profile) return;
    currentUserId = profile.userId;

    const res = await fetch(`${API_BASE}/api/companies/${encodeURIComponent(companyId)}?user_id=${encodeURIComponent(currentUserId)}`);
    if (res.status === 404) { app.innerHTML = '<p class="error-text">企業が見つかりません</p>'; return; }
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const company = await res.json();

    fetch(`${API_BASE}/api/log-view`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ line_user_id: currentUserId, content_type: 'company', content_id: companyId })
    }).catch(() => {});

    document.getElementById('header-title').textContent = company.name;
    document.title = `${company.name} | 10コマ就活`;
    isBookmarked = !!company.bookmarked;
    updateBookmarkUI();

    const panels = company.panels ?? [];
    const panelLikes = company.panel_likes ?? {};
    const recommends = company.recommends ?? [];

    const panelsHtml = panels.length === 0
      ? '<p class="empty-text">パネルデータはまだありません</p>'
      : panels.map(p => {
          const liked = !!panelLikes[p.panel_num];
          const bubbleClass = `speech-bubble ${esc(p.character)}`;
          return `
            <div class="panel">
              <div class="panel-num">${String(p.panel_num).padStart(2, '0')} / ${String(panels.length).padStart(2, '0')}</div>
              <div class="panel-image-wrap">
                <img src="${esc(p.image_url)}" alt="コマ${p.panel_num}" onerror="this.style.display='none'">
              </div>
              <div class="${bubbleClass}">
                <span class="char-tag ${esc(p.character)}">${esc(CHAR_LABEL[p.character] ?? p.character)}</span>
                <p class="bubble-text">${esc(p.dialogue)}</p>
              </div>
              <div class="panel-actions">
                <button class="panel-btn panel-like ${liked ? 'liked' : ''}" data-panel="${p.panel_num}" aria-label="いいね">
                  <span class="icon">${liked ? '♥' : '♡'}</span>
                  <span class="label">いいね</span>
                </button>
                <button class="panel-btn panel-share" data-panel="${p.panel_num}" data-dialogue="${esc(p.dialogue)}" aria-label="シェア">
                  <span class="icon">↗</span>
                  <span class="label">シェア</span>
                </button>
              </div>
            </div>`;
        }).join('');

    const videoHtml = company.video_url ? `
      <div class="cta-section">
        <button class="cta-youtube" data-url="${esc(company.video_url)}">
          <span class="cta-icon">▶</span>
          <span class="cta-text">
            <span class="cta-main">動画で詳しく見る</span>
            <span class="cta-sub">12分で深掘り解説</span>
          </span>
        </button>
      </div>` : '';

    const recommendsHtml = recommends.length === 0 ? '' : `
      <div class="recommend-section">
        <h2 class="recommend-title">▼ 次の企業を読む</h2>
        <div class="recommend-grid">
          ${recommends.map(r => `
            <a href="company.html?id=${encodeURIComponent(r.id)}" class="recommend-card">
              <div class="recommend-name">${esc(r.name)}</div>
              ${r.description ? `<div class="recommend-desc">${esc(r.description).slice(0, 50)}…</div>` : ''}
            </a>`).join('')}
        </div>
      </div>`;

    app.innerHTML = `
      <div class="company-detail">
        <p class="company-detail-name">${esc(company.name)}</p>
        ${company.description ? `<p class="company-detail-desc">${esc(company.description)}</p>` : ''}
      </div>
      <div class="panels-section">${panelsHtml}</div>
      ${videoHtml}
      ${recommendsHtml}
      ${buildVerificationFooter(company.last_verified_at)}`;

    // パネル単位のいいね＆シェア
    document.querySelectorAll('.panel-like').forEach(btn => {
      btn.addEventListener('click', e => {
        const panelNum = parseInt(e.currentTarget.dataset.panel, 10);
        togglePanelLike(e.currentTarget, panelNum);
      });
    });
    document.querySelectorAll('.panel-share').forEach(btn => {
      btn.addEventListener('click', e => {
        const panelNum = parseInt(e.currentTarget.dataset.panel, 10);
        const dialogue = e.currentTarget.dataset.dialogue;
        sharePanel(panelNum, dialogue);
      });
    });

    // YouTube CTA
    const youtubeBtn = document.querySelector('.cta-youtube');
    if (youtubeBtn) {
      youtubeBtn.addEventListener('click', e => {
        openYoutube(e.currentTarget.dataset.url);
      });
    }
  } catch (err) {
    app.innerHTML = `<p class="error-text">エラー: ${esc(err.message)}</p>`;
    console.error(err);
  }
}

// ヘッダーのブックマークボタンは最初から存在するので、即イベント登録
document.getElementById('btn-header-bookmark').addEventListener('click', toggleBookmark);

main();
</script>

<style>
  .btn-header-bookmark {
    background: none;
    border: none;
    cursor: pointer;
    min-width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--paper);
    -webkit-tap-highlight-color: transparent;
    padding: 0;
    transition: transform 0.15s;
  }
  .btn-header-bookmark:active {
    transform: scale(0.85);
  }
  .btn-header-bookmark.bookmarked {
    color: var(--bookmark-y);
    text-shadow: 0 0 8px rgba(243, 156, 18, 0.5);
  }
  .btn-header-bookmark:disabled {
    opacity: 0.5;
    cursor: default;
  }
</style>

</body>
</html>
