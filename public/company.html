<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>企業詳細 | トーキャリ</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Reggae+One&family=Kaisei+Decol:wght@400;500;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #003F7D;
      --navy-dark: #002D5C;
      --gold:      #D4AF37;
      --white:     #fff;
      --white-dim: rgba(255,255,255,0.75);
      --white-faint: rgba(255,255,255,0.15);
      --ink:       #1a1a1a;
      --nana-blue: #4a90d9;
      --haruki-grn:#2d8659;
      --both-purple:#7d3c98;
      --like-red:  #e63946;
      --bookmark-y:#f39c12;
    }

    html, body {
      background: var(--navy);
      min-height: 100vh;
      font-family: "Kaisei Decol", -apple-system, 'Hiragino Sans', sans-serif;
      color: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    .page-wrapper {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--navy);
    }

    /* === Header === */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navy-dark);
      display: flex;
      align-items: center;
      padding: 0 12px;
      height: 56px;
      border-bottom: 1px solid var(--white-faint);
    }

    .header-title {
      flex: 1;
      text-align: center;
      font-family: "Reggae One", sans-serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--white);
      letter-spacing: 0.08em;
    }

    .btn-back {
      background: none;
      border: 1.5px solid var(--white-faint);
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      width: 36px;
      height: 36px;
      color: var(--white);
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-header-bookmark {
      background: none;
      border: none;
      cursor: pointer;
      min-width: 36px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: var(--white-dim);
      -webkit-tap-highlight-color: transparent;
      padding: 0;
      transition: transform 0.15s;
    }

    .btn-header-bookmark:active { transform: scale(0.85); }
    .btn-header-bookmark.bookmarked { color: var(--bookmark-y); }
    .btn-header-bookmark:disabled { opacity: 0.4; cursor: default; }

    /* === Loading / Error === */
    .loading-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 240px;
      flex-direction: column;
      gap: 12px;
    }

    .loading-text {
      color: var(--white-dim);
      font-size: 14px;
      letter-spacing: 0.1em;
    }

    .loading-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      margin: 0 3px;
      animation: bounce 0.8s infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.15s; }
    .loading-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .error-text {
      color: #ff8a80;
      font-size: 14px;
      padding: 24px 16px;
      text-align: center;
      line-height: 1.6;
    }

    .empty-text {
      color: var(--white-dim);
      font-size: 14px;
      text-align: center;
      padding: 40px 16px;
    }

    /* === Company header === */
    .company-detail {
      padding: 24px 20px 20px;
      text-align: center;
      border-bottom: 1px solid var(--white-faint);
    }

    .company-detail-name {
      font-family: "Reggae One", sans-serif;
      font-size: 24px;
      color: var(--white);
      letter-spacing: 0.06em;
    }

    .company-detail-desc {
      font-size: 13px;
      color: var(--white-dim);
      line-height: 1.7;
      margin-top: 10px;
    }

    /* === Panels === */
    .panels-section {
      padding: 20px 16px 28px;
    }

    .panel {
      margin-bottom: 32px;
    }

    .panel-num {
      display: inline-block;
      font-family: "Reggae One", sans-serif;
      font-size: 12px;
      color: var(--navy);
      background: var(--white);
      padding: 3px 14px 3px 10px;
      margin-bottom: 10px;
      letter-spacing: 0.08em;
      border-radius: 2px;
      clip-path: polygon(0 0, 100% 0, calc(100% - 8px) 50%, 100% 100%, 0 100%);
    }

    .panel-image-wrap {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .panel-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #fff;
    }

    /* === Speech bubble === */
    .speech-bubble {
      position: relative;
      background: #fff;
      border-radius: 16px;
      padding: 26px 16px 12px;
      font-size: 15px;
      line-height: 1.7;
      color: var(--ink);
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }

    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -13px; left: 28px;
      border: 13px solid transparent;
      border-top-color: #fff;
      border-right-width: 0;
    }

    .speech-bubble.haruki::before { left: auto; right: 28px; border-right-width: 0; border-left-width: 0; border-top-color: #fff; border: 13px solid transparent; border-top-color: #fff; right: 28px; left: auto; }
    .speech-bubble.haruki::before { left: auto; right: 28px; width: 0; height: 0; border-top: 13px solid #fff; border-left: 13px solid transparent; border-right: 0; border-bottom: 0; }
    .speech-bubble.both::before   { left: 50%; transform: translateX(-50%); }

    .char-tag {
      position: absolute;
      top: 0; left: 14px;
      transform: translateY(-50%);
      font-family: "Kaisei Decol", sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      background: var(--nana-blue);
      border-radius: 20px;
      padding: 3px 12px;
      z-index: 2;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .char-tag.haruki  { background: var(--haruki-grn); left: auto; right: 14px; }
    .char-tag.both    { background: var(--both-purple); left: 50%; transform: translateX(-50%) translateY(-50%); }

    .bubble-text { font-size: 14px; line-height: 1.7; color: var(--ink); }

    /* === Panel actions === */
    .panel-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
      padding: 0 4px;
    }

    .panel-btn {
      background: rgba(255,255,255,0.15);
      border: 1.5px solid var(--white-faint);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
      min-height: 34px;
    }

    .panel-btn:active  { background: rgba(255,255,255,0.25); }
    .panel-btn:disabled { opacity: 0.4; cursor: default; }
    .panel-btn.liked   { background: var(--like-red); border-color: var(--like-red); }
    .panel-btn .icon   { font-size: 15px; line-height: 1; }

    /* === YouTube CTA === */
    .cta-section { padding: 0 16px 24px; }

    .cta-youtube {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid var(--white-faint);
      border-radius: 12px;
      padding: 18px 20px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s;
      width: 100%;
      text-align: left;
    }

    .cta-youtube:active { background: rgba(255,255,255,0.2); }

    .cta-icon {
      font-size: 28px;
      flex-shrink: 0;
    }

    .cta-main {
      display: block;
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
    }

    .cta-sub {
      display: block;
      font-size: 12px;
      color: var(--white-dim);
      margin-top: 3px;
    }

    /* === Recommends === */
    .recommend-section {
      padding: 20px 16px 28px;
      border-top: 1px solid var(--white-faint);
    }

    .recommend-title {
      font-family: "Reggae One", sans-serif;
      font-size: 15px;
      color: var(--white-dim);
      margin-bottom: 14px;
      letter-spacing: 0.06em;
    }

    .recommend-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .recommend-card {
      background: rgba(255,255,255,0.1);
      border: 1.5px solid var(--white-faint);
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      display: block;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }

    .recommend-card:active { background: rgba(255,255,255,0.2); }

    .recommend-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.4;
    }

    .recommend-desc {
      font-size: 11px;
      color: var(--white-dim);
      margin-top: 4px;
      line-height: 1.4;
    }

    /* === Verification footer === */
    .verification-footer {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(0,0,0,0.2);
      border-top: 1px dashed rgba(255,255,255,0.2);
      font-size: 11px;
      color: var(--white-dim);
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .badge-stale      { background: rgba(255,165,0,0.2); color: #ffa500; }
    .badge-unverified { background: rgba(255,100,100,0.2); color: #ff8080; }
    .badge-verified   { background: rgba(100,220,100,0.2); color: #90ee90; }

    /* === Toast === */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }
  </style>
</head>
<body>
<div class="page-wrapper">
  <header class="header">
    <button class="btn-back" onclick="goBack()" aria-label="戻る">←</button>
    <h1 class="header-title" id="header-title">企業詳細</h1>
    <button class="btn-header-bookmark" id="btn-header-bookmark" aria-label="お気に入り保存">
      <span id="header-bookmark-icon">☆</span>
    </button>
  </header>

  <div id="app">
    <div class="loading-wrap">
      <p class="loading-text">読み込み中</p>
      <div>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
    </div>
  </div>
  <div id="toast" class="toast"></div>
</div>

<script>
const LIFF_ID = '2010075487-89AJxZnA';
const API_BASE = 'https://10koma-shukatsu-api.oscar-dodds.workers.dev';

function goBack() {
  const params = new URLSearchParams(location.search);
  const industry = params.get('industry');
  const from     = params.get('from');
  if (industry && from) {
    location.href = `/company-list?industry=${encodeURIComponent(industry)}&from=${encodeURIComponent(from)}`;
  } else if (industry) {
    location.href = `/company-list?industry=${encodeURIComponent(industry)}`;
  } else {
    history.go(-2);
  }
}
let currentUserId = null;
let currentCompanyId = null;
let isBookmarked = false;

const CHAR_LABEL = { nana: 'ナナ', haruki: 'ハルキ', both: '二人' };

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('show'), 1800);
}

function buildVerificationFooter(lastVerifiedAt) {
  if (!lastVerifiedAt) {
    return `<div class="verification-footer"><span class="badge badge-unverified">⚠ 未検証</span></div>`;
  }
  const dateStr = String(lastVerifiedAt).slice(0, 10);
  const stale = (Date.now() - new Date(lastVerifiedAt).getTime()) > 180 * 24 * 60 * 60 * 1000;
  return `
    <div class="verification-footer">
      <span class="verification-date">最終確認日：${esc(dateStr)}</span>
      ${stale
        ? '<span class="badge badge-stale">⚠ 情報が古い可能性があります</span>'
        : '<span class="badge badge-verified">✓ 検証済み</span>'}
    </div>`;
}

async function initLiff() {
  await liff.init({ liffId: LIFF_ID });
  if (!liff.isLoggedIn()) { liff.login(); return null; }
  const profile = await liff.getProfile();
  fetch(`${API_BASE}/api/users/upsert`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      line_user_id: profile.userId,
      display_name: profile.displayName,
      picture_url: profile.pictureUrl
    })
  }).catch(() => {});
  return profile;
}

function updateBookmarkUI() {
  const btn = document.getElementById('btn-header-bookmark');
  const icon = document.getElementById('header-bookmark-icon');
  if (btn) {
    btn.classList.toggle('bookmarked', isBookmarked);
    icon.textContent = isBookmarked ? '★' : '☆';
  }
}

async function toggleBookmark() {
  if (!currentUserId) return;
  const btn = document.getElementById('btn-header-bookmark');
  btn.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/api/bookmark`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ line_user_id: currentUserId, company_id: currentCompanyId })
    });
    const { bookmarked } = await res.json();
    isBookmarked = bookmarked;
    updateBookmarkUI();
    showToast(bookmarked ? '★ お気に入りに追加しました' : '☆ お気に入りから削除しました');
  } catch (e) {
    console.error(e);
    showToast('エラーが発生しました');
  } finally {
    btn.disabled = false;
  }
}

async function togglePanelLike(btn, panelNum) {
  if (!currentUserId || btn.disabled) return;
  btn.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/api/like`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        line_user_id: currentUserId,
        content_type: 'panel',
        content_id: `${currentCompanyId}:${panelNum}`
      })
    });
    const { liked } = await res.json();
    btn.classList.toggle('liked', liked);
    btn.querySelector('.icon').textContent = liked ? '♥' : '♡';
  } catch (e) {
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

async function sharePanel(panelNum, dialogue) {
  fetch(`${API_BASE}/api/share-log`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      line_user_id: currentUserId,
      content_type: 'panel_share',
      content_id: `${currentCompanyId}:${panelNum}`
    })
  }).catch(() => {});

  try {
    if (liff && liff.isApiAvailable && liff.isApiAvailable('shareTargetPicker')) {
      await liff.shareTargetPicker([{
        type: 'text',
        text: `「${dialogue}」\n\n10コマ就活で${currentCompanyId}を読んでます！`
      }]);
      return;
    }
  } catch (e) { console.warn(e); }
  showToast('シェア機能はLINE内でのみ利用できます');
}

function openYoutube(url) {
  fetch(`${API_BASE}/api/share-log`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      line_user_id: currentUserId,
      content_type: 'video_click',
      content_id: currentCompanyId
    })
  }).catch(() => {});
  try {
    if (liff && liff.openWindow) { liff.openWindow({ url, external: true }); return; }
  } catch (e) { console.warn(e); }
  window.open(url, '_blank');
}

async function main() {
  const app = document.getElementById('app');
  const params = new URLSearchParams(location.search);
  const companyId = params.get('id');

  if (!companyId) {
    app.innerHTML = '<p class="error-text">企業IDが指定されていません</p>';
    return;
  }
  currentCompanyId = companyId;

  try {
    const profile = await initLiff();
    if (!profile) return;
    currentUserId = profile.userId;

    const res = await fetch(`${API_BASE}/api/companies/${encodeURIComponent(companyId)}?user_id=${encodeURIComponent(currentUserId)}`);
    if (res.status === 404) { app.innerHTML = '<p class="error-text">企業が見つかりません</p>'; return; }
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const company = await res.json();

    fetch(`${API_BASE}/api/log-view`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ line_user_id: currentUserId, content_type: 'company', content_id: companyId })
    }).catch(() => {});

    document.getElementById('header-title').textContent = company.name;
    document.title = `${company.name} | トーキャリ`;
    isBookmarked = !!company.bookmarked;
    updateBookmarkUI();

    const panels = company.panels ?? [];
    const panelLikes = company.panel_likes ?? {};
    const recommends = company.recommends ?? [];

    const panelsHtml = panels.length === 0
      ? '<p class="empty-text">パネルデータはまだありません</p>'
      : panels.map(p => {
          const liked = !!panelLikes[p.panel_num];
          const bubbleClass = `speech-bubble ${esc(p.character)}`;
          return `
            <div class="panel">
              <div class="panel-num">${String(p.panel_num).padStart(2, '0')} / ${String(panels.length).padStart(2, '0')}</div>
              <div class="panel-image-wrap">
                <img src="${esc(p.image_url)}" alt="コマ${p.panel_num}" onerror="this.style.display='none'">
              </div>
              <div class="${bubbleClass}">
                <span class="char-tag ${esc(p.character)}">${esc(CHAR_LABEL[p.character] ?? p.character)}</span>
                <p class="bubble-text">${esc(p.dialogue)}</p>
              </div>
              <div class="panel-actions">
                <button class="panel-btn panel-like ${liked ? 'liked' : ''}" data-panel="${p.panel_num}" aria-label="いいね">
                  <span class="icon">${liked ? '♥' : '♡'}</span>
                  <span class="label">いいね</span>
                </button>
                <button class="panel-btn panel-share" data-panel="${p.panel_num}" data-dialogue="${esc(p.dialogue)}" aria-label="シェア">
                  <span class="icon">↗</span>
                  <span class="label">シェア</span>
                </button>
              </div>
            </div>`;
        }).join('');

    const videoHtml = company.video_url ? `
      <div class="cta-section">
        <button class="cta-youtube" data-url="${esc(company.video_url)}">
          <span class="cta-icon">▶</span>
          <span class="cta-text">
            <span class="cta-main">動画で詳しく見る</span>
            <span class="cta-sub">動画で深掘り解説</span>
          </span>
        </button>
      </div>` : '';

    const recommendsHtml = recommends.length === 0 ? '' : `
      <div class="recommend-section">
        <p class="recommend-title">▼ 次の企業を読む</p>
        <div class="recommend-grid">
          ${recommends.map(r => `
            <a href="company.html?id=${encodeURIComponent(r.id)}" class="recommend-card">
              <div class="recommend-name">${esc(r.name)}</div>
              ${r.description ? `<div class="recommend-desc">${esc(r.description).slice(0, 50)}…</div>` : ''}
            </a>`).join('')}
        </div>
      </div>`;

    app.innerHTML = `
      <div class="company-detail">
        <p class="company-detail-name">${esc(company.name)}</p>
        ${company.description ? `<p class="company-detail-desc">${esc(company.description)}</p>` : ''}
      </div>
      <div class="panels-section">${panelsHtml}</div>
      ${videoHtml}
      ${recommendsHtml}
      ${buildVerificationFooter(company.last_verified_at)}`;

    document.querySelectorAll('.panel-like').forEach(btn => {
      btn.addEventListener('click', e => {
        const panelNum = parseInt(e.currentTarget.dataset.panel, 10);
        togglePanelLike(e.currentTarget, panelNum);
      });
    });
    document.querySelectorAll('.panel-share').forEach(btn => {
      btn.addEventListener('click', e => {
        const panelNum = parseInt(e.currentTarget.dataset.panel, 10);
        const dialogue = e.currentTarget.dataset.dialogue;
        sharePanel(panelNum, dialogue);
      });
    });

    const youtubeBtn = document.querySelector('.cta-youtube');
    if (youtubeBtn) {
      youtubeBtn.addEventListener('click', e => {
        openYoutube(e.currentTarget.dataset.url);
      });
    }
  } catch (err) {
    app.innerHTML = `<p class="error-text">エラー: ${esc(err.message)}</p>`;
    console.error(err);
  }
}

document.getElementById('btn-header-bookmark').addEventListener('click', toggleBookmark);

main();
</script>
</body>
</html>
