<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>企業詳細 | 10コマ就活</title>
  <link rel="stylesheet" href="shared.css">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<div class="page-wrapper">
  <header class="header">
    <button class="btn-back" onclick="history.back()" aria-label="戻る">←</button>
    <h1 class="header-title" id="header-title">企業詳細</h1>
    <div class="header-spacer"></div>
  </header>
  <div id="app">
    <div class="loading-wrap"><p class="loading-text">読み込み中...</p></div>
  </div>
</div>

<script>
const LIFF_ID = '2010075487-89AJxZnA';
const API_BASE = 'https://10koma-shukatsu-api.oscar-dodds.workers.dev';
let currentUserId = null;
let currentCompanyId = null;

const CHAR_LABEL = { nana: 'ナナ', haruki: 'ハルキ', both: '二人' };

function buildVerificationFooter(lastVerifiedAt) {
  if (!lastVerifiedAt) {
    return `<div class="verification-footer"><span class="badge badge-unverified">⚠️ 未検証</span></div>`;
  }
  const dateStr = String(lastVerifiedAt).slice(0, 10);
  const stale = (Date.now() - new Date(lastVerifiedAt).getTime()) > 180 * 24 * 60 * 60 * 1000;
  return `
    <div class="verification-footer">
      <span class="verification-date">最終確認日：${esc(dateStr)}</span>
      ${stale
        ? '<span class="badge badge-stale">⚠️ 情報が古い可能性があります</span>'
        : '<span class="badge badge-verified">✓ 検証済み</span>'}
    </div>`;
}

function esc(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function initLiff() {
  await liff.init({ liffId: LIFF_ID });
  if (!liff.isLoggedIn()) { liff.login(); return null; }
  const profile = await liff.getProfile();
  fetch(`${API_BASE}/api/users/upsert`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      line_user_id: profile.userId,
      display_name: profile.displayName,
      picture_url: profile.pictureUrl
    })
  }).catch(() => {});
  return profile;
}

async function handleLike(btn) {
  if (!currentUserId || btn.disabled) return;
  btn.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/api/like`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ line_user_id: currentUserId, content_type: 'company', content_id: currentCompanyId })
    });
    const { liked } = await res.json();
    btn.classList.toggle('liked', liked);
    btn.querySelector('.btn-icon').textContent = liked ? '♥' : '♡';
  } catch (e) {
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

async function handleBookmark(btn) {
  if (!currentUserId || btn.disabled) return;
  btn.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/api/bookmark`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ line_user_id: currentUserId, company_id: currentCompanyId })
    });
    const { bookmarked } = await res.json();
    btn.classList.toggle('bookmarked', bookmarked);
    btn.querySelector('.btn-icon').textContent = bookmarked ? '★' : '☆';
  } catch (e) {
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

async function main() {
  const app = document.getElementById('app');
  const params = new URLSearchParams(location.search);
  const companyId = params.get('id');

  if (!companyId) {
    app.innerHTML = '<p class="error-text">企業IDが指定されていません</p>';
    return;
  }
  currentCompanyId = companyId;

  try {
    const profile = await initLiff();
    if (!profile) return;
    currentUserId = profile.userId;

    const res = await fetch(`${API_BASE}/api/companies/${encodeURIComponent(companyId)}`);
    if (res.status === 404) { app.innerHTML = '<p class="error-text">企業が見つかりません</p>'; return; }
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const company = await res.json();

    // 閲覧ログ（fire-and-forget）
    fetch(`${API_BASE}/api/log-view`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ line_user_id: currentUserId, content_type: 'company', content_id: companyId })
    }).catch(() => {});

    document.getElementById('header-title').textContent = company.name;
    document.title = `${company.name} | 10コマ就活`;

    const panels = company.panels ?? [];
    const panelsHtml = panels.length === 0
      ? '<p class="empty-text">パネルデータはまだありません</p>'
      : panels.map(p => `
          <div class="panel">
            <p class="panel-num">コマ ${p.panel_num} / ${panels.length}</p>
            <div class="panel-image-wrap">
              <img src="${esc(p.image_url)}" alt="コマ${p.panel_num}" onerror="this.style.display='none'">
            </div>
            <div class="panel-dialogue">
              <span class="panel-character ${esc(p.character)}">${esc(CHAR_LABEL[p.character] ?? p.character)}</span>
              <p class="panel-text">${esc(p.dialogue)}</p>
            </div>
          </div>`).join('');

    app.innerHTML = `
      <div class="company-detail">
        <p class="company-detail-name">${esc(company.name)}</p>
        ${company.description ? `<p class="company-detail-desc">${esc(company.description)}</p>` : ''}
      </div>
      <div class="panels-section">${panelsHtml}</div>
      ${buildVerificationFooter(company.last_verified_at)}
      <div class="action-bar">
        <button class="btn-like" id="btn-like" aria-label="いいね">
          <span class="btn-icon">♡</span>
          <span class="btn-label">いいね</span>
        </button>
        <button class="btn-bookmark" id="btn-bookmark" aria-label="ブックマーク">
          <span class="btn-icon">☆</span>
          <span class="btn-label">保存</span>
        </button>
      </div>`;

    document.getElementById('btn-like').addEventListener('click', e => handleLike(e.currentTarget));
    document.getElementById('btn-bookmark').addEventListener('click', e => handleBookmark(e.currentTarget));
  } catch (err) {
    app.innerHTML = `<p class="error-text">エラー: ${esc(err.message)}</p>`;
    console.error(err);
  }
}

main();
</script>
</body>
</html>
