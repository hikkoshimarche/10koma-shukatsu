<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>業界・企業診断 | トーキャリ</title>
  <link rel="stylesheet" href="entry.css">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="config.js"></script>
  <script src="entry.js"></script>
  <style>
    .sh-play{padding:14px 16px 26px}
    .sh-prog{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .sh-bar{flex:1;height:8px;border-radius:99px;background:rgba(255,255,255,0.18);overflow:hidden}
    .sh-bar-f{height:100%;background:var(--gold);border-radius:99px;transition:width .3s}
    .sh-count{font-size:12px;font-weight:700;color:rgba(255,255,255,0.85)}
    .sh-card{background:#fff;color:var(--ink);border-radius:16px;padding:18px 16px;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
    .sh-sample{display:inline-block;font-size:10px;font-weight:700;color:#8a6d00;background:#ffe9a8;padding:2px 8px;border-radius:999px;margin-bottom:8px}
    .sh-q{font-size:17px;font-weight:700;line-height:1.55;margin-bottom:16px}
    .sh-opts{display:flex;flex-direction:column;gap:10px}
    .sh-opt{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:#f4f7fb;border:2px solid #e2e8f0;border-radius:12px;padding:14px;font-size:15px;font-weight:600;color:var(--ink);cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
    .sh-opt:active{transform:scale(0.99)}
    /* 結果 */
    .sh-res{padding:8px 16px 26px}
    .sh-disc{font-size:11.5px;color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:9px 12px;margin-bottom:14px;line-height:1.55}
    .sh-sec-t{font-size:15px;font-weight:800;color:#fff;margin:14px 2px 9px}
    .sh-sec-t .em{color:var(--gold)}
    .sh-rc{background:#fff;color:var(--ink);border-radius:16px;padding:14px;margin-bottom:11px;box-shadow:0 3px 12px rgba(0,0,0,0.16);text-decoration:none;display:block}
    .sh-rc-h{display:flex;align-items:center;gap:11px;margin-bottom:8px}
    .sh-rc-ic{width:44px;height:44px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;background:#f2f6fb;box-shadow:inset 0 0 0 2px var(--acc)}
    .sh-rc-badge{width:44px;height:44px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:"Reggae One",sans-serif;font-size:20px;color:#fff;background-color:var(--acc);background-image:linear-gradient(135deg,rgba(255,255,255,0.3),rgba(255,255,255,0) 62%)}
    .sh-rc-nm{font-size:16px;font-weight:800;line-height:1.3}
    .sh-rc-sub{font-size:11px;color:#7a8794}
    .sh-rc-rank{margin-left:auto;font-size:11px;font-weight:800;color:#fff;background:var(--acc);padding:2px 9px;border-radius:999px}
    .sh-why{border-top:1px dashed #e2e8f0;padding-top:9px;margin-top:4px}
    .sh-why-t{font-size:11px;font-weight:700;color:var(--mute,#6a7686);margin-bottom:6px}
    .sh-fact{font-size:13px;line-height:1.5;margin-bottom:5px}
    .sh-fact .src{font-size:11px;font-weight:700;color:#2f6fb0;text-decoration:none;margin-left:6px}
    .sh-fact .src::after{content:" ↗"}
    .sh-trend{display:inline-block;font-size:12px;line-height:1.5;margin-bottom:5px}
    .sh-trend .tg{font-size:10px;font-weight:700;color:#8a5a00;background:#fdeecb;padding:1px 7px;border-radius:999px;margin-left:6px}
    .sh-go{display:inline-block;margin-top:6px;font-size:12px;font-weight:700;color:var(--acc)}
    .sh-actions{display:flex;flex-direction:column;gap:10px;margin-top:16px}
    .sh-btn{padding:14px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;border:none;text-align:center;text-decoration:none}
    .sh-btn.p{background:var(--gold);color:#2a1c00}
    .sh-btn.g{background:rgba(255,255,255,0.12);color:#fff;border:1.5px solid rgba(255,255,255,0.25)}
  </style>
</head>
<body>
<div class="e-wrap">
  <header class="e-header has-back">
    <button class="e-back" id="btn-back" aria-label="戻る">‹</button>
    <p class="e-kicker">業界・企業診断</p>
    <h1 class="e-title" id="sh-title">3分であなたに合う業界は？</h1>
    <div id="guide"></div>
  </header>
  <div id="app"><div class="e-list"><div class="e-skel"></div><div class="e-skel"></div></div></div>
  <footer class="e-footer"><span class="brand-panel"><img class="brand-logo" src="/images/brand/tokyari_logo_wide.png" alt="トーキャリ"></span></footer>
</div>
<script>
const CFG=window.TOKYARI||{};
const LIFF_ID=CFG.LIFF_HUB||'2010075487-89AJxZnA';
const API_BASE=CFG.API_BASE||'https://10koma-shukatsu-api.oscar-dodds.workers.dev';
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
const app=()=>document.getElementById('app');

const IND={ 'sogo-shosha':{n:'総合商社',i:'🌐'},'finance':{n:'銀行・証券・保険',i:'🏦'},'it-ai-saas-game':{n:'IT・AI・SaaS・ゲーム',i:'💻'},
  'consulting':{n:'コンサル',i:'📈'},'manufacturer':{n:'メーカー',i:'🏭'},'ad-media':{n:'広告・メディア',i:'📣'},
  'infra-energy':{n:'インフラ・エネルギー',i:'⚡'},'food-beverage':{n:'食品・飲料',i:'🍽️'} };
const PAL=['#2f6fb0','#c0392b','#7d3c98','#16a085','#d17d00','#2d8659','#c0448a','#3b5bdb'];
function hue(id){let h=0;for(const c of String(id))h=(h*31+c.charCodeAt(0))>>>0;return PAL[h%PAL.length];}

// プレビュー用サンプル質問（本番はタブA生成の shindan_questions.json＋マッチング関数）
const SAMPLE_Q=[
  {q:'仕事で重視したいのは？',opts:[
    {t:'スケールの大きな仕事',tag:['sogo-shosha','manufacturer']},
    {t:'専門性を極める',tag:['consulting','finance']},
    {t:'新しい技術・変化',tag:['it-ai-saas-game']},
    {t:'人の生活を支える',tag:['food-beverage','infra-energy']}]},
  {q:'働き方のイメージは？',opts:[
    {t:'世界を舞台に動く',tag:['sogo-shosha']},
    {t:'数字・ロジックで攻める',tag:['finance','consulting']},
    {t:'モノづくりに関わる',tag:['manufacturer']},
    {t:'アイデアを形にする',tag:['it-ai-saas-game','ad-media']}]},
  {q:'興味のある領域は？',opts:[
    {t:'経済・グローバル',tag:['sogo-shosha','finance']},
    {t:'テクノロジー',tag:['it-ai-saas-game']},
    {t:'ものづくり・技術',tag:['manufacturer','infra-energy']},
    {t:'消費者・ブランド',tag:['food-beverage','ad-media']}]},
];
// サンプル: 業界→おすすめ企業(実id)＋根拠(数字=出典/傾向=推定)
const SAMPLE_REC={
  'sogo-shosha':[{id:'mitsui-bussan',name:'三井物産',facts:[{t:'採用実績 多数・グローバル拠点',s:'https://example.com/ir'}],trends:['若手裁量が大きいと言われる']}],
  'it-ai-saas-game':[{id:'sap-japan',name:'SAPジャパン',facts:[{t:'ESGレーティング AAA（MSCI）',s:'https://www.sap.com/japan/about/company.html'}],trends:['成長性が高い領域']}],
  'consulting':[{id:'abeam',name:'アビームコンサルティング',facts:[{t:'国内大手コンサル',s:'https://example.com'}],trends:['成長スピードが速いと言われる']}],
  'finance':[{id:'mufg',name:'三菱UFJ銀行',facts:[{t:'国内最大級のメガバンク',s:'https://example.com'}],trends:['安定基盤']}],
  'manufacturer':[{id:'sony-group',name:'ソニーグループ',facts:[{t:'エレクトロニクス／エンタメ複合',s:'https://example.com'}],trends:['多角化が進む']}],
};

let QUESTIONS=SAMPLE_Q, isSample=true, qi=0, score={};

function renderQ(){
  const q=QUESTIONS[qi];
  const pct=Math.round(qi/QUESTIONS.length*100);
  app().innerHTML=`<div class="sh-play">
    <div class="sh-prog"><div class="sh-bar"><div class="sh-bar-f" style="width:${pct}%"></div></div><span class="sh-count">Q ${qi+1} / ${QUESTIONS.length}</span></div>
    <div class="sh-card">${isSample?'<span class="sh-sample">サンプル</span><br>':''}
      <p class="sh-q">${esc(q.q)}</p>
      <div class="sh-opts">${q.opts.map((o,i)=>`<button class="sh-opt" data-i="${i}">${esc(o.t)}</button>`).join('')}</div>
    </div></div>`;
  document.querySelector('.sh-opts').addEventListener('click',e=>{
    const b=e.target.closest('.sh-opt'); if(!b) return;
    (q.opts[+b.dataset.i].tag||[]).forEach(t=>score[t]=(score[t]||0)+1);
    qi++; (qi<QUESTIONS.length)?renderQ():renderResult();
  });
}

function whyBlock(facts,trends){
  return `<div class="sh-why"><div class="sh-why-t">なぜおすすめ？</div>
    ${(facts||[]).map(f=>`<div class="sh-fact">・${esc(f.t)}${f.s?`<a class="src" href="${esc(f.s)}" target="_blank" rel="noopener">出典</a>`:''}</div>`).join('')}
    ${(trends||[]).map(t=>`<div class="sh-trend">・${esc(t)}<span class="tg">傾向（推定）</span></div>`).join('')}</div>`;
}

function renderResult(){
  document.getElementById('sh-title').textContent='診断結果';
  document.getElementById('guide').innerHTML='';
  const ranked=Object.keys(IND).map(s=>[s,score[s]||0]).sort((a,b)=>b[1]-a[1]).filter(x=>x[1]>0);
  const topInd=(ranked.length?ranked:Object.keys(IND).slice(0,3).map(s=>[s,0])).slice(0,3);
  const indCards=topInd.map(([slug],idx)=>{
    const m=IND[slug]; const facts=[{t:`業界10コマ＋クイズで学べる`,s:''}]; const trends=['あなたの回答傾向にマッチ'];
    return `<a class="sh-rc" style="--acc:${hue(slug)}" href="/company.html?industry=${encodeURIComponent(slug)}&name=${encodeURIComponent(m.n)}">
      <div class="sh-rc-h"><span class="sh-rc-ic">${m.i}</span>
        <span><span class="sh-rc-nm">${esc(m.n)}</span><span class="sh-rc-sub">業界研究へ</span></span>
        <span class="sh-rc-rank">おすすめ${idx+1}</span></div>
      ${whyBlock(facts,trends)}<span class="sh-go">業界詳細を見る ›</span></a>`;
  }).join('');
  // おすすめ企業（上位業界のサンプル企業）
  const comps=[];
  topInd.forEach(([slug])=>(SAMPLE_REC[slug]||[]).forEach(c=>comps.push({slug,...c})));
  const compCards=comps.slice(0,4).map(c=>`
    <a class="sh-rc" style="--acc:${hue(c.id)}" href="/company.html?id=${encodeURIComponent(c.id)}">
      <div class="sh-rc-h"><span class="sh-rc-badge">${esc(String(c.name||'？').charAt(0))}</span>
        <span><span class="sh-rc-nm">${esc(c.name)}</span><span class="sh-rc-sub">${esc(IND[c.slug]?.n||'')}</span></span></div>
      ${whyBlock(c.facts,c.trends)}<span class="sh-go">企業ページへ ›</span></a>`).join('');
  app().innerHTML=`<div class="sh-res">
    <div class="sh-disc">※公式公開情報と業界傾向に基づく参考提案です。${isSample?'（現在はサンプル表示）':''}</div>
    <div class="sh-sec-t">あなたにおすすめの<span class="em">業界</span></div>${indCards}
    <div class="sh-sec-t">おすすめの<span class="em">企業</span></div>${compCards||'<div class="sh-rc">準備中</div>'}
    <div class="sh-actions">
      <button class="sh-btn p" id="sh-retry">もう一度診断する</button>
      <a class="sh-btn g" href="/home.html">ホームへ戻る</a>
    </div></div>`;
  document.getElementById('sh-retry').onclick=()=>{qi=0;score={};document.getElementById('sh-title').textContent='3分であなたに合う業界は？';renderQ();};
  document.getElementById('btn-back').onclick=()=>{qi=0;score={};renderQ();};
}

async function main(){
  document.getElementById('btn-back').onclick=()=>history.length>1?history.back():location.href='/home.html';
  try{ await liff.init({liffId:LIFF_ID}); if(!liff.isLoggedIn()&&liff.isInClient()){liff.login();return;} }catch(e){}
  // タブAの質問セットがあれば読む（未接続はサンプル）
  try{ const r=await fetch('/shindan_questions.json'); if(r.ok){ const d=await r.json(); if(Array.isArray(d)&&d.length){QUESTIONS=d;isSample=false;} } }catch(e){}
  mountGuide('かんたん質問に<br>答えるだけ！');
  renderQ();
}
main();
</script>
</body>
</html>
