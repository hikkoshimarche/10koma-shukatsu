<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>業界・企業診断 | トーキャリ</title>
  <link rel="stylesheet" href="entry.css">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="config.js"></script>
  <script src="entry.js"></script>
  <style>
    .sh-play{padding:14px 16px 26px}
    .sh-prog{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .sh-bar{flex:1;height:8px;border-radius:99px;background:rgba(255,255,255,0.18);overflow:hidden}
    .sh-bar-f{height:100%;background:var(--gold);border-radius:99px;transition:width .3s}
    .sh-count{font-size:12px;font-weight:700;color:rgba(255,255,255,0.85)}
    .sh-card{background:#fff;color:var(--ink);border-radius:16px;padding:18px 16px;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
    .sh-sample{display:inline-block;font-size:10px;font-weight:700;color:#8a6d00;background:#ffe9a8;padding:2px 8px;border-radius:999px;margin-bottom:8px}
    .sh-q{font-size:17px;font-weight:700;line-height:1.55;margin-bottom:6px}
    .sh-hint{font-size:12px;color:#7a8794;margin-bottom:12px}
    .sh-opts{display:flex;flex-direction:column;gap:10px}
    .sh-opt{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:#f4f7fb;border:2px solid #e2e8f0;border-radius:12px;padding:14px;font-size:15px;font-weight:600;color:var(--ink);cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
    .sh-opt.sel{background:#e7f0fb;border-color:#2f6fb0}
    .sh-opt .ck{margin-left:auto;color:#2f6fb0;font-weight:800;opacity:0;flex-shrink:0}
    .sh-opt.sel .ck{opacity:1}
    .sh-next{width:100%;margin-top:14px;padding:14px;border:none;border-radius:12px;background:var(--gold);color:#2a1c00;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
    .sh-loading{padding:40px 16px;text-align:center;color:rgba(255,255,255,0.85)}
    /* 結果 */
    .sh-res{padding:8px 16px 26px}
    .sh-disc{font-size:11.5px;color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:10px 12px;margin-bottom:14px;line-height:1.6}
    .sh-sec-t{font-size:15px;font-weight:800;color:#fff;margin:14px 2px 9px}
    .sh-sec-t .em{color:var(--gold)}
    .sh-rc{background:#fff;color:var(--ink);border-radius:16px;padding:14px;margin-bottom:11px;box-shadow:0 3px 12px rgba(0,0,0,0.16);text-decoration:none;display:block}
    .sh-rc-h{display:flex;align-items:center;gap:11px;margin-bottom:8px}
    .sh-rc-ic{width:44px;height:44px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;background:#f2f6fb;box-shadow:inset 0 0 0 2px var(--acc)}
    .sh-rc-badge{width:44px;height:44px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:"Reggae One",sans-serif;font-size:20px;color:#fff;background-color:var(--acc);background-image:linear-gradient(135deg,rgba(255,255,255,0.3),rgba(255,255,255,0) 62%)}
    .sh-rc-nm{font-size:16px;font-weight:800;line-height:1.3}
    .sh-rc-sub{font-size:11px;color:#7a8794}
    .sh-rc-rank{margin-left:auto;font-size:11px;font-weight:800;color:#fff;background:var(--acc);padding:2px 9px;border-radius:999px}
    .sh-why{border-top:1px dashed #e2e8f0;padding-top:9px;margin-top:4px}
    .sh-why-t{font-size:11px;font-weight:700;color:#6a7686;margin-bottom:6px}
    .sh-fact{font-size:13.5px;line-height:1.5;margin-bottom:5px;font-weight:600}
    .sh-fact .src{font-size:11px;font-weight:700;color:#2f6fb0;text-decoration:none;margin-left:6px}
    .sh-fact .src::after{content:" ↗"}
    .sh-trend{font-size:12.5px;line-height:1.5;margin-bottom:5px;color:#334}
    .sh-trend .tg{font-size:10px;font-weight:700;color:#8a5a00;background:#fdeecb;padding:1px 7px;border-radius:999px;margin-left:6px}
    .sh-nosal{font-size:12px;color:#94a0ac;margin-bottom:5px}
    .sh-go{display:inline-block;margin-top:6px;font-size:12px;font-weight:700;color:var(--acc)}
    .sh-actions{display:flex;flex-direction:column;gap:10px;margin-top:16px}
    .sh-btn{padding:14px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;border:none;text-align:center;text-decoration:none}
    .sh-btn.p{background:var(--gold);color:#2a1c00}
    .sh-btn.g{background:rgba(255,255,255,0.12);color:#fff;border:1.5px solid rgba(255,255,255,0.25)}
  </style>
</head>
<body>
<div class="e-wrap">
  <header class="e-header has-back">
    <button class="e-back" id="btn-back" aria-label="戻る">‹</button>
    <p class="e-kicker">業界・企業診断</p>
    <h1 class="e-title" id="sh-title">あなたに合う業界・企業は？</h1>
    <div id="guide"></div>
  </header>
  <div id="app"><div class="e-list"><div class="e-skel"></div><div class="e-skel"></div></div></div>
  <footer class="e-footer"><span class="brand-panel"><img class="brand-logo" src="/images/brand/tokyari_logo_wide.png" alt="トーキャリ"></span></footer>
</div>
<script>
const CFG=window.TOKYARI||{};
const LIFF_ID=CFG.LIFF_HUB||'2010075487-89AJxZnA';
const API_BASE=CFG.API_BASE||'https://10koma-shukatsu-api.oscar-dodds.workers.dev';
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
const app=()=>document.getElementById('app');
const PAL=['#2f6fb0','#c0392b','#7d3c98','#16a085','#d17d00','#2d8659','#c0448a','#3b5bdb','#b8823a','#2f8fbf'];
function hue(id){let h=0;for(const c of String(id))h=(h*31+c.charCodeAt(0))>>>0;return PAL[h%PAL.length];}
// 業界名(companies.json 18)→ 業界研究16slug（詳細導線用・無ければ業界一覧へ）
const IND2SLUG={'総合商社':'sogo-shosha','専門商社':'senmon-shosha','銀行・証券・保険':'finance','IT・通信・SaaS':'it-ai-saas-game','ゲーム・エンタメ':'it-ai-saas-game','コンサル':'consulting','広告・メディア':'ad-media','インフラ・エネルギー':'infra-energy','不動産・建設':'realestate-construction','小売・流通':'retail','食品・飲料':'food-beverage','日用品・化粧品':'manufacturer','製薬・ヘルスケア':'medical-healthcare','航空・運輸・物流':'transport-logistics','自動車・モビリティ':'manufacturer','電機・精密・重工':'manufacturer','鉄鋼・素材・化学':'manufacturer','その他（外資・新興等）':'startup'};

// フォールバック(質問JSON未取得時のみ)
const FALLBACK_Q=[{id:'q_kaigai',kind:'soft',text:'海外との関わり方は？',options:[{label:'海外でバリバリ'},{label:'どちらかといえば海外'},{label:'どちらでも'},{label:'国内寄り'},{label:'国内でじっくり'}]}];
let QUESTIONS=FALLBACK_Q, qi=0, answers={}, connected=false;

function renderQ(){
  const q=QUESTIONS[qi];
  const multi=(q.kind==='tags'||q.kind==='industry');
  const cur=answers[q.id];
  const selSet=new Set(multi?(Array.isArray(cur)?cur:[]):(cur!=null?[cur]:[]));
  const pct=Math.round(qi/QUESTIONS.length*100);
  app().innerHTML=`<div class="sh-play">
    <div class="sh-prog"><div class="sh-bar"><div class="sh-bar-f" style="width:${pct}%"></div></div><span class="sh-count">Q ${qi+1} / ${QUESTIONS.length}</span></div>
    <div class="sh-card">
      <p class="sh-q">${esc(q.text)}</p>
      ${multi?'<p class="sh-hint">複数選択できます</p>':''}
      <div class="sh-opts">${q.options.map((o,i)=>`<button class="sh-opt ${selSet.has(i)?'sel':''}" data-i="${i}">${esc(o.label)}<span class="ck">✓</span></button>`).join('')}</div>
      ${multi?`<button class="sh-next" id="sh-next">次へ</button>`:''}
    </div></div>`;
  document.querySelector('.sh-opts').addEventListener('click',e=>{
    const b=e.target.closest('.sh-opt'); if(!b) return;
    const i=+b.dataset.i;
    if(multi){ selSet.has(i)?selSet.delete(i):selSet.add(i); b.classList.toggle('sel'); }
    else { answers[q.id]=i; adv(); }
  });
  if(multi) document.getElementById('sh-next').onclick=()=>{ answers[q.id]=[...selSet]; adv(); };
}
function adv(){ qi++; (qi<QUESTIONS.length)?renderQ():finish(); }

async function finish(){
  document.getElementById('sh-title').textContent='診断中…';
  document.getElementById('guide').innerHTML='';
  app().innerHTML=`<div class="sh-loading">あなたに合う業界・企業を探しています…</div>`;
  let data=null;
  try{ const r=await fetch(`${API_BASE}/api/shindan`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({answers})});
    if(r.ok) data=await r.json(); }catch(e){}
  renderResult(data);
}

function whyBlock(rat){
  if(!rat) return '';
  const rows=[];
  const f=rat.facts||{};
  if(f.avg_salary) rows.push(`<div class="sh-fact">・${esc(f.avg_salary.text)}${f.avg_salary.source?`<a class="src" href="${esc(f.avg_salary.source)}" target="_blank" rel="noopener">出典</a>`:''}${f.avg_salary.as_of?` <span style="font-size:10px;color:#94a0ac">(${esc(f.avg_salary.as_of)})</span>`:''}</div>`);
  if(f.starting_salary) rows.push(`<div class="sh-fact">・${esc(f.starting_salary.text)}${f.starting_salary.source?`<a class="src" href="${esc(f.starting_salary.source)}" target="_blank" rel="noopener">出典</a>`:''}</div>`);
  (rat.notes||[]).forEach(n=>rows.push(`<div class="sh-nosal">・${esc(n)}</div>`));
  if(rat.trend) rows.push(`<div class="sh-trend">・${esc(rat.trend)}<span class="tg">傾向（推定）</span></div>`);
  (rat.matched||[]).forEach(m=>rows.push(`<div class="sh-trend">・${esc(m)}<span class="tg">傾向</span></div>`));
  return `<div class="sh-why"><div class="sh-why-t">なぜおすすめ？</div>${rows.join('')}</div>`;
}

function renderResult(data){
  try{ localStorage.setItem('tk_shindan_done','1'); }catch(e){} // ホームの就活ロードマップ用フラグ
  // 診断結果をマイページ用に保存（fire-and-forget・失敗してもUIは壊さない）
  if(SH_USER && data && data.top_companies){
    try{ fetch(`${API_BASE}/api/shindan/save`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user_id:SH_USER, result:data})}).catch(()=>{}); }catch(e){}
  }
  document.getElementById('sh-title').textContent='診断結果';
  const isReal=!!(data&&data.top_companies);
  connected=isReal;
  const inds=(data&&data.top_industries||[]).slice(0,3);
  const comps=(data&&data.top_companies||[]).slice(0,6);
  const disc=(data&&data.disclaimer)||'この診断は公式公開情報と業界傾向に基づく参考提案です。断定・優劣付けではありません。';
  const indCards=inds.map((it,idx)=>{
    const slug=IND2SLUG[it.industry];
    const href=slug?`/company.html?industry=${encodeURIComponent(slug)}&name=${encodeURIComponent(it.industry)}`:'/gyokai.html';
    return `<a class="sh-rc" style="--acc:${hue(it.industry)}" href="${href}">
      <div class="sh-rc-h"><span class="sh-rc-ic">🏢</span>
        <span><span class="sh-rc-nm">${esc(it.industry)}</span><span class="sh-rc-sub">${slug?'業界研究へ':'業界一覧へ'}</span></span>
        <span class="sh-rc-rank">おすすめ${idx+1}</span></div>
      <span class="sh-go">${slug?'業界詳細を見る':'業界をさがす'} ›</span></a>`;
  }).join('');
  const compCards=comps.map(c=>`
    <a class="sh-rc" style="--acc:${hue(c.slug)}" href="/company.html?id=${encodeURIComponent(c.slug)}">
      <div class="sh-rc-h"><span class="sh-rc-badge">${esc(String(c.name||'？').charAt(0))}</span>
        <span><span class="sh-rc-nm">${esc(c.name)}</span><span class="sh-rc-sub">${esc(c.industry||'')}</span></span></div>
      ${whyBlock(c.rationale)}<span class="sh-go">企業ページへ ›</span></a>`).join('');
  app().innerHTML=`<div class="sh-res">
    ${isReal?'':'<div style="text-align:center;margin-bottom:8px"><span class="sh-sample">サンプル</span></div>'}
    <div class="sh-disc">※${esc(disc)}</div>
    <div class="sh-sec-t">あなたにおすすめの<span class="em">業界</span></div>${indCards||'<div class="sh-rc">—</div>'}
    <div class="sh-sec-t">おすすめの<span class="em">企業</span></div>${compCards||'<div class="sh-rc">—</div>'}
    <div class="sh-actions">
      ${comps.length>=2?`<a class="sh-btn p" href="/compare.html?ids=${encodeURIComponent(comps.slice(0,3).map(c=>c.slug).join(','))}">おすすめ社を比較する</a>`:''}
      <button class="sh-btn p" id="sh-retry">もう一度診断する</button>
      <a class="sh-btn g" href="/home.html">ホームへ戻る</a>
    </div></div>`;
  document.getElementById('sh-retry').onclick=()=>{qi=0;answers={};document.getElementById('sh-title').textContent='あなたに合う業界・企業は？';renderQ();};
  document.getElementById('btn-back').onclick=()=>{qi=0;answers={};renderQ();};
}

let SH_USER = new URLSearchParams(location.search).get('u') || null;  // ?u= はQA用オーバーライド
async function main(){
  document.getElementById('btn-back').onclick=()=>history.length>1?history.back():location.href='/home.html';
  try{
    await liff.init({liffId:LIFF_ID});
    if(!liff.isLoggedIn()&&liff.isInClient()){liff.login();return;}
    if(liff.isLoggedIn()){ try{ const p=await liff.getProfile(); SH_USER=SH_USER||p.userId; }catch(e){} }
  }catch(e){}
  try{ const r=await fetch('/shindan_questions.json'); if(r.ok){ const d=await r.json(); const qs=d.questions||d; if(Array.isArray(qs)&&qs.length){QUESTIONS=qs;} } }catch(e){}
  mountGuide('かんたん質問に<br>答えるだけ！');
  renderQ();
}
main();
</script>
</body>
</html>
