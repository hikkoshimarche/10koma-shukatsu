<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>会社をえらぶ | トーキャリ</title>
  <link rel="stylesheet" href="entry.css">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="entry.js"></script>
</head>
<body>
<div class="e-wrap">
  <header class="e-header has-back">
    <button class="e-back" id="btn-back" aria-label="戻る">‹</button>
    <p class="e-kicker">STEP 2 ／ 会社をえらぶ</p>
    <h1 class="e-title" id="page-title">会社をえらぶ</h1>
    <div id="guide"></div>
  </header>

  <div class="e-list" id="cards">
    <div class="e-skel"></div><div class="e-skel"></div><div class="e-skel"></div>
  </div>

  <footer class="e-footer">
    <span class="brand-panel"><img class="brand-logo" src="/images/brand/tokyari_logo_wide.png" alt="トーキャリ"></span>
  </footer>
</div>

<script>
const LIFF_ID = '2010075487-89AJxZnA';
const PAL = ['#2f6fb0','#c0392b','#7d3c98','#16a085','#d17d00','#2d8659','#c0448a','#3b5bdb','#b8823a','#2f8fbf'];
function hue(id){let h=0;for(const ch of String(id))h=(h*31+ch.charCodeAt(0))>>>0;return PAL[h%PAL.length];}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function contentHint(c){
  const t = ['10コマ'];
  if (c.video_url)   t.push('動画');
  if (c.kessan_url)  t.push('決算書');
  if (c.room_liff_id) t.push('AI OB訪問');
  return t.join(' ・ ');
}

async function main() {
  mountGuide('気になる会社を<br>タップ！');

  const params = new URLSearchParams(location.search);
  const industry = params.get('industry') ?? '';
  const from = params.get('from') ?? '';
  const cardsEl = document.getElementById('cards');

  document.getElementById('btn-back').addEventListener('click', () => {
    location.href = `/industry?from=${encodeURIComponent(from)}`;
  });

  if (!industry) {
    cardsEl.innerHTML = '<p class="error-text">業界が指定されていません</p>';
    return;
  }

  document.getElementById('page-title').innerHTML = `${esc(industry)}<br>の会社をえらぶ`;
  document.title = `${industry} | トーキャリ`;

  try {
    const res = await fetch('/companies.json');
    if (!res.ok) throw new Error(`fetch error ${res.status}`);
    const data = await res.json();

    const companies = data[industry];
    if (!companies || companies.length === 0) {
      cardsEl.innerHTML = '<p class="error-text">この業界の会社データがありません</p>';
      return;
    }

    cardsEl.innerHTML = companies.map(c => {
      const initial = esc(String(c.name || '？').trim().charAt(0));
      return `
        <button class="e-card" data-id="${esc(encodeURIComponent(c.id))}" style="--acc:${hue(c.id)}">
          <span class="e-badge">${initial}</span>
          <span class="e-card-body">
            <span class="e-card-label">${esc(c.name)}</span>
            <span class="e-card-sub">${contentHint(c)}</span>
          </span>
          <span class="e-card-arrow">›</span>
        </button>`;
    }).join('');

    cardsEl.addEventListener('click', e => {
      const card = e.target.closest('.e-card');
      if (!card) return;
      const id = decodeURIComponent(card.dataset.id);
      location.href = `/hub?company=${encodeURIComponent(id)}&from=${encodeURIComponent(from)}&industry=${encodeURIComponent(industry)}`;
    });
  } catch (err) {
    cardsEl.innerHTML = `<p class="error-text">エラー: ${esc(err.message)}</p>`;
    console.error(err);
  }

  try { await liff.init({ liffId: LIFF_ID }); }
  catch (e) { console.warn('LIFF init skipped:', e.message); }
}

main();
</script>
</body>
</html>
