<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>会社選択 | トーキャリ</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #003F7D;
      min-height: 100vh;
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    .page-header {
      padding: 48px 24px 24px;
      position: relative;
    }

    .btn-back {
      position: absolute;
      top: 48px;
      left: 16px;
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .page-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
      text-align: center;
    }

    .cards {
      flex: 1;
      padding: 8px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 12px;
      display: flex;
      align-items: center;
      padding: 20px 20px;
      color: #003F7D;
      cursor: pointer;
      transition: transform 0.12s, opacity 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .card:active {
      transform: scale(0.97);
      opacity: 0.85;
    }

    .card-label {
      flex: 1;
      font-size: 17px;
      font-weight: 600;
    }

    .card-arrow {
      font-size: 20px;
      opacity: 0.5;
    }

    .footer {
      padding: 20px 24px env(safe-area-inset-bottom, 16px);
      text-align: center;
      font-size: 12px;
      opacity: 0.5;
      letter-spacing: 0.1em;
    }

    .error-text {
      color: rgba(255,255,255,0.75);
      text-align: center;
      padding: 24px;
    }
  </style>
</head>
<body>

<div class="page-header">
  <button class="btn-back" id="btn-back" aria-label="戻る">←</button>
  <h1 class="page-title" id="page-title">会社を選んでください</h1>
</div>

<div class="cards" id="cards"></div>

<div class="footer">トーキャリ TALK CAREER</div>

<script>
const LIFF_ID = '2010075487-89AJxZnA';

async function main() {
  const params = new URLSearchParams(location.search);
  const industry = params.get('industry') ?? '';
  const from = params.get('from') ?? '';
  const cardsEl = document.getElementById('cards');

  document.getElementById('btn-back').addEventListener('click', () => {
    location.href = `/industry?from=${encodeURIComponent(from)}`;
  });

  if (!industry) {
    cardsEl.innerHTML = '<p class="error-text">業界が指定されていません</p>';
    return;
  }

  document.getElementById('page-title').textContent = `${industry}の会社を選んでください`;
  document.title = `${industry} | トーキャリ`;

  try {
    const res = await fetch('/companies.json');
    if (!res.ok) throw new Error(`fetch error ${res.status}`);
    const data = await res.json();

    const companies = data[industry];
    if (!companies || companies.length === 0) {
      cardsEl.innerHTML = '<p class="error-text">この業界の会社データがありません</p>';
      return;
    }

    cardsEl.innerHTML = companies.map(c => `
      <div class="card" data-id="${encodeURIComponent(c.id)}">
        <span class="card-label">${c.name}</span>
        <span class="card-arrow">›</span>
      </div>`).join('');

    cardsEl.addEventListener('click', e => {
      const card = e.target.closest('.card');
      if (!card) return;
      const id = decodeURIComponent(card.dataset.id);
      location.href = `/hub?company=${encodeURIComponent(id)}&from=${encodeURIComponent(from)}&industry=${encodeURIComponent(industry)}`;
    });
  } catch (err) {
    cardsEl.innerHTML = `<p class="error-text">エラー: ${err.message}</p>`;
    console.error(err);
  }

  try {
    await liff.init({ liffId: LIFF_ID });
  } catch (e) {
    console.warn('LIFF init failed:', e.message);
  }
}

main();
</script>
</body>
</html>
