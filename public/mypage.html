<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>マイページ | トーキャリ</title>
  <link rel="stylesheet" href="entry.css">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="config.js"></script>
  <script src="nav.js"></script>
  <script src="entry.js"></script>
  <style>
    .mp-hero{display:flex;align-items:center;gap:12px;padding:22px 18px 6px}
    .mp-hero .circ{width:52px;height:52px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,0.25);flex-shrink:0}
    .mp-hero .circ img{width:86%;height:86%;object-fit:contain;border-radius:50%}
    .mp-hero h1{font-size:20px;font-weight:800;color:#fff;line-height:1.2}
    .mp-hero p{font-size:12px;color:rgba(255,255,255,0.78);margin-top:2px}

    .mp-sec{padding:14px 16px 2px}
    .mp-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:9px}
    /* 見出しは背景(紺グラデ)に依存せず両語が読めるよう、濃い紺の四方ハロー(擬似アウトライン)で白語を締める */
    .mp-t{font-size:15px;font-weight:800;color:#fff;
      text-shadow:0 1px 3px rgba(0,8,26,0.95), 0 -1px 2px rgba(0,8,26,0.8), 1px 0 2px rgba(0,8,26,0.8), -1px 0 2px rgba(0,8,26,0.8)}
    .mp-t .em{color:var(--gold)}
    .mp-more{font-size:12px;font-weight:700;color:rgba(255,255,255,0.8);text-decoration:none}

    .mp-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
    .mp-mini{flex:0 0 auto;width:132px;background:#fff;color:var(--ink);border-radius:14px;padding:12px;text-decoration:none;box-shadow:0 3px 10px rgba(0,0,0,0.16)}
    .mp-mini .badge{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:"Reggae One",sans-serif;font-size:19px;color:#fff;margin-bottom:8px;background-color:var(--acc);background-image:linear-gradient(135deg,rgba(255,255,255,0.3),rgba(255,255,255,0) 62%)}
    .mp-mini .nm{font-size:13.5px;font-weight:700;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .mp-mini .sub{font-size:11px;color:#8792a3;margin-top:3px}

    .mp-resume{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#12457f,#0a2f5c);border:1.5px solid rgba(231,184,75,0.5);border-radius:16px;padding:13px 15px;color:#fff;text-decoration:none;box-shadow:0 6px 18px rgba(3,20,44,0.4);margin-top:10px}
    .mp-resume .ic{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold-deep));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .mp-resume .tx b{font-size:14.5px}.mp-resume .tx span{display:block;font-size:11.5px;color:rgba(255,255,255,0.82);margin-top:2px}
    .mp-resume .arrow{margin-left:auto;color:var(--gold);font-weight:700;font-size:20px}

    /* お気に入り */
    .mp-fav{display:flex;flex-direction:column;gap:10px}
    .mp-fav-card{display:flex;align-items:center;gap:12px;background:#fff;color:var(--ink);border-radius:14px;padding:12px 13px;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,0.14)}
    .mp-fav-card .star{color:var(--gold);font-size:18px;flex-shrink:0}
    .mp-fav-card .fi{flex:1;min-width:0}
    .mp-fav-card .fn{font-size:15px;font-weight:700;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .mp-fav-card .fd{font-size:11px;color:#7a8794;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .mp-fav-card .fa{color:#c3ccd6;font-size:18px;font-weight:700;flex-shrink:0}

    /* 成績 */
    .mp-card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 3px 12px rgba(0,0,0,0.16);color:var(--ink)}
    .mp-stats{display:flex;gap:10px}
    .mp-stat{flex:1;text-align:center;background:#f4f7fb;border-radius:12px;padding:11px 6px}
    .mp-stat .v{font-size:22px;font-weight:800;color:var(--navy);line-height:1.1}
    .mp-stat .v small{font-size:12px;font-weight:700}
    .mp-stat .l{font-size:10.5px;color:#7a8794;margin-top:3px}
    .mp-scores{margin-top:11px;display:flex;flex-direction:column;gap:7px}
    .mp-score-row{display:flex;align-items:center;gap:10px;font-size:13px}
    .mp-score-row .sn{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .mp-score-row .bar{flex:1;height:7px;border-radius:99px;background:#eef2f7;overflow:hidden;min-width:40px}
    .mp-score-row .bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold-deep))}
    .mp-score-row .sp{font-weight:800;color:var(--navy);width:38px;text-align:right;flex-shrink:0}

    /* 診断 */
    .mp-chip{display:inline-block;font-size:12px;font-weight:700;color:#fff;background:var(--navy);border-radius:999px;padding:4px 11px;margin:0 6px 6px 0}
    .mp-diag-co{font-size:13px;color:var(--ink);line-height:1.7}
    .mp-diag-co b{font-weight:700}
    .mp-diag-date{font-size:11px;color:#94a0ac;margin-top:8px}
    .mp-btn{display:block;text-align:center;margin-top:11px;background:var(--navy);color:#fff;text-decoration:none;border-radius:12px;padding:12px;font-size:14px;font-weight:800}

    /* 空状態 */
    .mp-empty{background:rgba(255,255,255,0.06);border:1px dashed rgba(255,255,255,0.22);border-radius:14px;padding:16px;text-align:center;color:rgba(255,255,255,0.82)}
    .mp-empty p{font-size:13px;line-height:1.6;margin-bottom:10px}
    .mp-empty a{display:inline-block;background:var(--gold);color:#3a2c05;text-decoration:none;padding:9px 18px;border-radius:999px;font-size:13px;font-weight:800}
    .mp-empty-all{padding:44px 22px;text-align:center}
    .mp-empty-all .ei{font-size:44px;margin-bottom:10px}
    .mp-empty-all .et{font-size:17px;font-weight:800;color:#fff;margin-bottom:6px}
    .mp-empty-all .es{font-size:13px;color:rgba(255,255,255,0.8);line-height:1.6;margin-bottom:16px}
    .mp-empty-all a{display:inline-block;background:var(--gold);color:#3a2c05;text-decoration:none;padding:12px 24px;border-radius:999px;font-size:14px;font-weight:800}
    .mp-load{text-align:center;color:rgba(255,255,255,0.7);padding:50px 0}

    /* v1.5: レベル＆称号 */
    .lv-card{background:linear-gradient(135deg,#12457f,#0a2f5c);border:1.5px solid rgba(231,184,75,0.45);border-radius:16px;padding:15px;box-shadow:0 6px 18px rgba(3,20,44,0.4)}
    .lv-top{display:flex;align-items:center;gap:12px}
    .lv-badge-ic{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--gold-deep));display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
    .lv-name{font-size:17px;font-weight:800;color:#fff}
    .lv-sub{font-size:11px;color:rgba(255,255,255,0.75);margin-top:2px}
    .lv-xp{margin-left:auto;text-align:right;color:var(--gold);font-weight:800;font-size:15px}.lv-xp small{color:rgba(255,255,255,0.6);font-weight:600;font-size:10px;display:block}
    .lv-bar{height:8px;border-radius:99px;background:rgba(255,255,255,0.14);overflow:hidden;margin:11px 0 4px}
    .lv-bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold-deep))}
    .lv-next{font-size:10.5px;color:rgba(255,255,255,0.7);text-align:right}
    .lv-badges{display:flex;gap:8px;overflow-x:auto;margin-top:11px;padding-bottom:3px;-webkit-overflow-scrolling:touch}
    .lv-b{flex:0 0 auto;width:74px;text-align:center;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:11px;padding:9px 5px}
    .lv-b.on{background:rgba(231,184,75,0.16);border-color:rgba(231,184,75,0.55)}
    .lv-b .bi{font-size:20px;filter:grayscale(1);opacity:0.5}
    .lv-b.on .bi{filter:none;opacity:1}
    .lv-b .bl{font-size:9.5px;font-weight:700;color:rgba(255,255,255,0.7);line-height:1.2;margin-top:4px}
    .lv-b.on .bl{color:#fff}
    .lv-b .bd{font-size:9px;color:rgba(255,255,255,0.55);margin-top:2px}

    /* v1.5: スタンプラリー */
    .rl-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .rl-cell{background:#fff;border-radius:12px;padding:11px 12px;text-decoration:none;color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,0.14)}
    .rl-cell.done{background:linear-gradient(135deg,#fff,#fff7e6);box-shadow:0 2px 10px rgba(231,184,75,0.3)}
    .rl-nm{font-size:13px;font-weight:800;display:flex;align-items:center;gap:5px}
    .rl-nm .st{font-size:14px}
    .rl-cnt{font-size:11px;color:#7a8794;margin-top:4px}
    .rl-cnt b{color:var(--navy);font-weight:800}
    .rl-bar{height:5px;border-radius:99px;background:#eef2f7;overflow:hidden;margin-top:6px}
    .rl-bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold-deep))}
    .rl-cell.unexp{opacity:0.92}
    .rl-cell.unexp .rl-cnt{color:#a7b0bb}

    /* v1.5: 次に見るべき3社 */
    .n3-card{display:flex;align-items:center;gap:11px;background:#fff;border-radius:14px;padding:12px 13px;text-decoration:none;color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,0.14);margin-bottom:9px}
    .n3-badge{width:40px;height:40px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:"Reggae One",sans-serif;font-size:19px;color:#fff;background-color:var(--acc);background-image:linear-gradient(135deg,rgba(255,255,255,0.3),rgba(255,255,255,0) 62%)}
    .n3-info{flex:1;min-width:0}.n3-nm{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.n3-sub{font-size:11px;color:#7a8794;margin-top:1px}
    .n3-match{flex-shrink:0;font-size:11px;font-weight:800;color:#fff;background:var(--navy);border-radius:999px;padding:3px 9px}
    .n3-arrow{color:#c3ccd6;font-size:18px;font-weight:700;flex-shrink:0}

    /* v1.5: 更新フィード */
    .fd-item{display:flex;align-items:center;gap:11px;background:#fff;border-radius:12px;padding:11px 13px;text-decoration:none;color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,0.14);margin-bottom:8px}
    .fd-ic{width:36px;height:36px;border-radius:10px;background:#eef3f9;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .fd-b{flex:1;min-width:0}.fd-t{font-size:13.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.fd-d{font-size:11px;color:#7a8794;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .fd-date{font-size:10.5px;color:#94a0ac;flex-shrink:0}
    .fd-sub{font-size:11px;color:rgba(255,255,255,0.6);padding:2px 2px 8px}

    /* v1.6: ニュースやさしい表示（タグ＋一言ガイド＋用語辞書） */
    .nw-item{background:#fff;border-radius:12px;padding:12px 13px;box-shadow:0 2px 8px rgba(0,0,0,0.14);margin-bottom:8px}
    .nw-top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
    .nw-tag{font-size:10.5px;font-weight:800;color:#fff;padding:2px 9px;border-radius:999px;flex-shrink:0}
    .nw-tag.t-kessan{background:#c0392b}.nw-tag.t-product{background:#1f8a4c}.nw-tag.t-hire{background:#d17d00}
    .nw-tag.t-ma{background:#7d3c98}.nw-tag.t-hr{background:#2f6fb0}.nw-tag.t-info{background:#64748b}
    .nw-date{font-size:10.5px;color:#94a0ac;margin-left:auto;flex-shrink:0}
    .nw-new{font-size:9px;font-weight:900;color:#fff;background:#e6394f;padding:2px 7px;border-radius:999px;flex-shrink:0;letter-spacing:0.05em;box-shadow:0 1px 5px rgba(230,57,79,0.55)}
    /* 新着ジャンプカード(最上部・通知で来た人をニュースへ誘導) */
    .mp-newsjump{display:flex;align-items:center;gap:9px;margin:10px 16px 2px;padding:14px 16px;background:linear-gradient(135deg,#e6394f,#b8283c);border-radius:14px;color:#fff;text-decoration:none;font-size:14px;font-weight:800;box-shadow:0 6px 18px rgba(230,57,79,0.42)}
    .mp-newsjump .nj-ic{font-size:20px;flex-shrink:0}
    .mp-newsjump b{margin-left:auto;font-size:13px;white-space:nowrap}
    .nw-title{font-size:13.5px;font-weight:700;line-height:1.55;color:var(--ink)}
    /* v1.6強化: タップでアコーディオン展開 */
    .nw-head{cursor:pointer;-webkit-tap-highlight-color:transparent}
    .nw-chev{font-size:10px;color:#b3bdc8;flex-shrink:0;transition:transform .2s}
    .nw-item.open .nw-chev{transform:rotate(180deg)}
    .nw-exp{display:none;margin-top:9px}
    .nw-item.open .nw-exp{display:block}
    .nw-summary{font-size:12.5px;color:var(--ink);line-height:1.6;background:#eef4fb;border-radius:8px;padding:9px 11px}
    .nw-slabel{display:block;font-size:10.5px;font-weight:800;color:#2f6fb0;margin-bottom:3px}
    .nw-soon{color:#8a94a0;font-style:italic}
    .nw-guide{font-size:11.5px;color:#5a6675;line-height:1.55;margin-top:6px;background:#f4f7fb;border-radius:8px;padding:6px 9px}
    .nw-guide .gi{margin-right:3px}
    .nw-foot{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
    .nw-name{font-size:11px;color:#7a8794;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .nw-link{font-size:11.5px;font-weight:700;color:var(--nana,#2f6fb0);text-decoration:none;flex-shrink:0;margin-left:10px}
    .nw-link::after{content:" ↗"}
    .gl{border-bottom:1.5px dotted #2f6fb0;cursor:pointer;-webkit-tap-highlight-color:transparent}
    /* 用語ポップ */
    .gl-pop{position:fixed;z-index:240;max-width:280px;background:#0e2a4d;color:#fff;border-radius:12px;padding:11px 13px;box-shadow:0 8px 26px rgba(0,0,0,0.4);font-size:12.5px;line-height:1.6}
    .gl-pop .gt{font-weight:800;color:var(--gold,#e7b84b);display:block;margin-bottom:3px;font-size:13px}
    .gl-pop .gd{color:#eaf1fa}
    .gl-pop::after{content:"";position:absolute;width:12px;height:12px;background:inherit;transform:rotate(45deg)}
    .gl-pop.below::after{top:-6px;left:var(--ax,20px)}
    .gl-pop.above::after{bottom:-6px;left:var(--ax,20px)}

    /* 初回プロフィール登録モーダル */
    .pm-overlay{position:fixed;inset:0;background:rgba(6,20,40,0.74);z-index:200;display:flex;align-items:flex-end;justify-content:center}
    .pm-card{background:#fff;color:var(--ink);width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom,0px));max-height:94vh;overflow-y:auto}
    .pm-h1{font-size:12.5px;font-weight:800;color:var(--navy);text-align:center}
    .pm-h2{font-size:18px;font-weight:800;text-align:center;margin:7px 0 5px;line-height:1.35}
    .pm-lead{font-size:12.5px;color:#5a6675;line-height:1.65;text-align:center;margin-bottom:14px}
    .pm-q{font-size:14px;font-weight:800;margin:12px 0 8px}
    .pm-opts{display:flex;flex-direction:column;gap:9px}
    .pm-opt{display:flex;align-items:center;gap:11px;border:2px solid #e2e8f0;border-radius:12px;padding:13px 14px;font-size:15px;font-weight:700;cursor:pointer;background:#fff;text-align:left;width:100%;font-family:inherit;color:var(--ink)}
    .pm-opt.on{border-color:var(--navy);background:#eef4fb}
    .pm-opt .rd{width:20px;height:20px;border-radius:50%;border:2px solid #cbd5e1;flex-shrink:0}
    .pm-opt.on .rd{border-color:var(--navy);background:var(--navy);box-shadow:inset 0 0 0 3px #fff}
    .pm-field{margin-top:12px}
    .pm-label{font-size:12px;font-weight:800;color:#5a6675;margin-bottom:5px;display:block}
    .pm-input,.pm-select{width:100%;border:2px solid #e2e8f0;border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit;color:var(--ink);background:#fff}
    .pm-sugg{border:1px solid #e2e8f0;border-radius:10px;margin-top:5px;max-height:190px;overflow-y:auto;background:#fff}
    .pm-sugg div{padding:11px 13px;border-bottom:1px solid #f1f4f8;font-size:14px;cursor:pointer}
    .pm-sugg div:active{background:#f4f7fb}
    .pm-note{background:#f6f8fb;border-radius:12px;padding:12px 13px;margin-top:16px;font-size:11.5px;color:#5a6675;line-height:1.75}
    .pm-note b{color:var(--ink)}
    .pm-consent{display:flex;align-items:flex-start;gap:10px;margin-top:14px;font-size:13.5px;font-weight:700;line-height:1.5;cursor:pointer;color:var(--ink)}
    .pm-consent input{width:20px;height:20px;margin-top:1px;flex-shrink:0}
    .pm-submit{width:100%;margin-top:16px;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:800;background:var(--gold);color:#3a2c05;cursor:pointer;font-family:inherit}
    .pm-submit:disabled{background:#e2e8f0;color:#9aa5b1;cursor:default}
    .pm-del{display:block;text-align:center;margin-top:12px;color:#c0392b;font-size:12.5px;font-weight:700;background:none;border:none;cursor:pointer;width:100%;font-family:inherit}
    .pm-edit{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.22);border-radius:999px;padding:5px 12px;cursor:pointer;font-family:inherit}
  </style>
</head>
<body>
<div class="e-wrap">
  <header class="e-header">
    <div class="mp-hero">
      <span class="circ"><img src="/images/brand/tokyari_logo_mark.jpg" alt="トーキャリ"></span>
      <div><h1>マイページ</h1><p id="mp-greet">📓 あなたの就活記録 — 足あと・お気に入り・成績・診断・ニュース</p></div>
    </div>
  </header>
  <div id="mp"><div class="mp-load">読み込み中…</div></div>
  <footer class="e-footer"><span class="brand-panel"><img class="brand-logo" src="/images/brand/tokyari_logo_wide.png" alt="トーキャリ"></span></footer>
</div>
<script>
const CFG=window.TOKYARI||{};
const LIFF_ID=CFG.LIFF_HUB||'2010075487-89AJxZnA';
const API_BASE=CFG.API_BASE||'https://10koma-shukatsu-api.oscar-dodds.workers.dev';
let userId=new URLSearchParams(location.search).get('u')||'guest-preview';
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
const PAL=['#2f6fb0','#c0392b','#7d3c98','#16a085','#d17d00','#2d8659','#c0448a','#3b5bdb','#b8823a','#2f8fbf'];
function hue(id){let h=0;for(const c of String(id))h=(h*31+c.charCodeAt(0))>>>0;return PAL[h%PAL.length];}
const mp=()=>document.getElementById('mp');

function secContinue(d){
  const rec=d.continue.recent||[], rz=d.continue.quiz_resume;
  if(!rec.length && !rz){
    return `<div class="mp-sec"><div class="mp-h"><span class="mp-t">続き<span class="em">から</span></span></div>
      <div class="mp-empty"><p>まだ足あとがありません。<br>気になる企業から見てみよう。</p><a href="/industry">企業研究へ →</a></div></div>`;
  }
  const cards=rec.map(c=>`<a class="mp-mini" href="/company.html?id=${encodeURIComponent(c.id)}&from=mypage">
      <span class="badge" style="--acc:${hue(c.id)}">${esc(String(c.name||'？').charAt(0))}</span>
      <span class="nm">${esc(c.name)}</span><span class="sub">最近見た企業</span></a>`).join('');
  const resume=rz?`<a class="mp-resume" href="/quiz.html?company=${encodeURIComponent(rz.set_id)}&name=${encodeURIComponent(rz.name)}&from=mypage">

// 用語ミニ辞書（静的JSON・中立/一般知識のみ）。GALL=lookup, GSORTED=最長一致用。
let GALL=[], GSORTED=[];
async function loadGlossary(){
  try{
    const r=await fetch('/terms_glossary.json'); if(!r.ok) return;
    const j=await r.json();
    GALL=(j.terms||[]).map(x=>({t:x.t,d:x.d,e:esc(x.t)}));
    GSORTED=GALL.map((x,i)=>({...x,i})).sort((a,b)=>b.e.length-a.e.length);
  }catch(e){ GALL=[]; GSORTED=[]; }
}
// 見出し内の用語に点線下線を付与（見出し文言は改変しない・エスケープ済みHTMLを返す）
function annotateGlossary(title){
  const s=esc(title);
  if(!GSORTED.length) return s;
  let out='', i=0;
  while(i<s.length){
    let hit=null;
    for(const g of GSORTED){ if(g.e && s.startsWith(g.e, i)){ hit=g; break; } }
    if(hit){ out+=`<span class="gl" data-i="${hit.i}">${hit.e}</span>`; i+=hit.e.length; }
    else { out+=s[i]; i++; }
  }
  return out;
}
function showGlossaryPop(el, item){
  let pop=document.getElementById('gl-pop');
  if(!pop){ pop=document.createElement('div'); pop.id='gl-pop'; document.body.appendChild(pop); }
  pop.innerHTML=`<span class="gt">${esc(item.t)}</span><span class="gd">${esc(item.d)}</span>`;
  pop.style.visibility='hidden'; pop.style.display='block';
  const pw=Math.min(280, window.innerWidth-24); pop.style.maxWidth=pw+'px';
  const r=el.getBoundingClientRect();
  let left=Math.max(12, Math.min(r.left + r.width/2 - pw/2, window.innerWidth-pw-12));
  const ph=pop.offsetHeight;
  let top, cls;
  if(r.top - ph - 10 > 8){ top=r.top - ph - 10; cls='above'; } else { top=r.bottom + 10; cls='below'; }
  pop.className='gl-pop '+cls;
  pop.style.left=left+'px'; pop.style.top=top+'px';
  const ax=Math.max(10, Math.min(r.left + r.width/2 - left - 6, pw-22));
  pop.style.setProperty('--ax', ax+'px');
  pop.style.visibility='visible';
}
function hideGlossaryPop(){ const p=document.getElementById('gl-pop'); if(p) p.style.display='none'; }
document.addEventListener('click', e=>{
  const g=e.target.closest && e.target.closest('.gl');
  if(g){ e.preventDefault(); e.stopPropagation(); const i=+g.dataset.i; if(GALL[i]) showGlossaryPop(g, GALL[i]); return; }
  // ニュースカードのアコーディオン開閉（用語タップは上で return 済み・公式リンクは nw-exp 内で別要素）
  const head=e.target.closest && e.target.closest('.nw-head');
  if(head){ const it=head.closest('.nw-item'); if(it) it.classList.toggle('open'); hideGlossaryPop(); return; }
  if(!(e.target.closest && e.target.closest('#gl-pop'))) hideGlossaryPop();
});
window.addEventListener('scroll', hideGlossaryPop, true);

// v1.5: 更新フィード
// 取得(fetched_at)から7日以内=新着。fetched_atはUTC "YYYY-MM-DD HH:MM:SS"。
function nwIsNew(fetched){
  if(!fetched) return false;
  const t=Date.parse(String(fetched).replace(' ','T')+'Z');
  if(isNaN(t)) return false;
  return (Date.now()-t) <= 7*86400000 && (Date.now()-t) >= -86400000;
}
function newsNewCompanies(d){
  const off=(d.feed&&d.feed.official)||[]; const s=new Set();
  off.forEach(o=>{ if(nwIsNew(o.fetched_at)) s.add(o.company_id); });
  return s.size;
}
function secNewsJump(d){
  const n=newsNewCompanies(d); if(!n) return '';

      <div class="pm-note"><b>入力内容について</b><br>
        ・入力いただいた大学・学部・卒業年度は、あなたに合ったおすすめ企業・コンテンツの表示に使います。<br>
        ・今後、あなたのことを「ぜひ会いたい」と思った企業から、直接スカウト（オファー）が届く機能を準備しています。その際、大学・学部・卒業年度を参加企業にお伝えすることがあります。<br>
        ・氏名・住所・電話番号などは取得しません。入力内容はマイページからいつでも変更・削除できます。</div>
      <label class="pm-consent"><input type="checkbox" id="pm-consent" ${st.consent?'checked':''}>上記に同意して、自分に合った情報を受け取る</label>
      <button class="pm-submit" id="pm-submit">はじめる →</button>
      ${mode==='edit'?'<button class="pm-del" id="pm-del">この情報を削除する（初回登録に戻る）</button>':''}
    </div>`;
    host.querySelectorAll('.pm-opt').forEach(b=>b.onclick=()=>{ st.type=b.dataset.t; st.university='';st.faculty='';st.grad=''; draw(); });
    const uni=host.querySelector('#pm-uni'), sugg=host.querySelector('#pm-sugg');
    if(uni) uni.addEventListener('input',()=>{ const q=uni.value.trim(); st.university=''; refresh();
      if(!q){ sugg.style.display='none'; return; }
      const hits=UNIV.filter(u=>u.includes(q)).slice(0,20);
      sugg.style.display=hits.length?'block':'none';
      sugg.innerHTML=hits.map(u=>`<div data-u="${esc(u)}">${esc(u)}</div>`).join('');
      sugg.querySelectorAll('div').forEach(d=>{ const pick=e=>{ e.preventDefault(); st.university=d.dataset.u; uni.value=d.dataset.u; sugg.style.display='none'; refresh(); }; d.addEventListener('pointerdown',pick); d.addEventListener('click',pick); });
    });
    const fac=host.querySelector('#pm-fac'); if(fac) fac.onchange=()=>{ st.faculty=fac.value; refresh(); };
    const grad=host.querySelector('#pm-grad'); if(grad) grad.onchange=()=>{ st.grad=grad.value; refresh(); };
    host.querySelector('#pm-consent').onchange=e=>{ st.consent=e.target.checked; refresh(); };
    host.querySelector('#pm-submit').onclick=async()=>{
      if(!valid()) return;
      const body={ user_id:userId, user_type:st.type, university:st.university||null, faculty:st.faculty||null, grad_year:st.grad||null, consented:true, consent_version:CONSENT_VERSION };
      try{ await fetch(`${API_BASE}/api/profile`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); }catch(e){}
      PROFILE={ user_type:st.type, university:body.university, faculty:body.faculty, grad_year:body.grad_year }; CAN_EDIT=true;
      host.remove(); startMypage();
    };
    const del=host.querySelector('#pm-del'); if(del) del.onclick=async()=>{
      try{ await fetch(`${API_BASE}/api/profile/delete`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId})}); }catch(e){}
      PROFILE=null; CAN_EDIT=false; host.remove(); openProfileModal('register');  // 削除→初回扱い
    };
    refresh();
  }
  draw();
}

async function startMypage(){
  const gp=loadGlossary();   // 用語辞書を並行ロード(フィード注釈に必要)
  let d=null;
  try{ const r=await fetch(`${API_BASE}/api/mypage?userId=${encodeURIComponent(userId)}`); if(r.ok) d=await r.json(); }catch(e){}
  if(!d) d={continue:{recent:[],quiz_resume:null},bookmarks:[],quiz_stats:{companies:0,accuracy:null,answered:0,recent_scores:[]},shindan:null};
  try{ await gp; }catch(e){}
  render(d);
}

async function main(){
  try{
    await liff.init({liffId:LIFF_ID});
    if(!liff.isLoggedIn()&&liff.isInClient()){liff.login();return;}
    if(liff.isLoggedIn()){ try{ const p=await liff.getProfile(); if(!new URLSearchParams(location.search).get('u')) userId=p.userId; if(p.displayName) document.getElementById('mp-greet').textContent=`📓 ${p.displayName}さんの就活記録 — 足あと・お気に入り・成績・診断`; }catch(e){} }
  }catch(e){ console.warn('LIFF skipped (preview):', e&&e.message); }
  // LIFF外/ゲスト(userId取れない)はモーダルを出さず従来ゲスト表示
  const isReal = userId && userId!=='guest-preview';
  if(isReal){
    let prof=null;
    try{ const r=await fetch(`${API_BASE}/api/profile?userId=${encodeURIComponent(userId)}`); if(r.ok) prof=await r.json(); }catch(e){}
    if(prof && !prof.registered){ openProfileModal('register'); return; }  // 登録完了まで本体を表示しない
    if(prof && prof.registered){ PROFILE=prof.profile; CAN_EDIT=true; }
  }
  startMypage();
}
main();
</script>
</body>
</html>
