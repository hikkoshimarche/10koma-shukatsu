<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>業界研究 | トーキャリ</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="config.js"></script>
  <script src="nav.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{ --ink:#2a2113; --mute:#8a7a5a; --gold:#c8912a; --gold-d:#a5741a; --cream:#fbf4e4; }
    /* 業界研究=学ぶ教材 / 温かいクリーム＆ゴールドのアクセント(企業研究の青と明確に差別化) */
    body{font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;color:var(--ink);
      background:linear-gradient(180deg,#6b4f16 0%,#5a4212 190px,var(--cream) 190px,var(--cream) 100%);min-height:100vh;-webkit-font-smoothing:antialiased}
    .wrap{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:40px}
    .backbar{padding:10px 16px 0}.backbar a{color:rgba(255,255,255,0.92);text-decoration:none;font-size:13px;font-weight:700}
    .hd{padding:14px 16px 14px;color:#fff}
    .hd .role{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.3);border-radius:999px;padding:3px 11px}
    .hd h1{font-size:23px;font-weight:800;margin:9px 0 6px}
    .hd .roles{font-size:12px;line-height:1.6;background:rgba(0,0,0,0.16);border-radius:10px;padding:9px 12px}
    .hd .roles b{color:#ffe6a8}
    .list{padding:6px 16px 0}
    .gk-card{background:#fff;border-radius:16px;box-shadow:0 3px 12px rgba(120,90,20,0.14);margin-bottom:12px;overflow:hidden;border-left:5px solid var(--acc,#c8912a)}
    .gk-main{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:none;border:none;padding:14px 15px 12px;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
    .gk-ic{width:46px;height:46px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--acc,#c8912a);color:#fff}
    .gk-body{flex:1;min-width:0}
    .gk-label{font-size:17px;font-weight:800;display:block}
    .gk-sub{font-size:11.5px;color:var(--mute);margin-top:3px;display:block}
    .gk-go{margin-left:auto;flex-shrink:0;font-size:12px;font-weight:800;color:#fff;background:var(--acc,#c8912a);border-radius:999px;padding:5px 12px}
    .gk-go{transition:transform .2s}
    .gk-card.open .gk-go{transform:rotate(90deg)}
    /* 業界ハブ(展開式): タップ→即10コマをやめ、コンテンツを選ばせる */
    .gk-hub{display:none;padding:4px 13px 13px;border-top:1px dashed #eadfc6;background:#fdfaf1}
    .gk-card.open .gk-hub{display:block}
    .gk-tiles{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:11px 0 4px}
    .gk-tile{display:flex;flex-direction:column;gap:3px;padding:12px 12px;border-radius:12px;text-decoration:none;
      background:#fff;border:1.5px solid #efe4c9;color:var(--ink);-webkit-tap-highlight-color:transparent}
    .gk-tile:active{background:#fbf3df}
    .gk-tile .tic{font-size:20px;line-height:1}
    .gk-tile .tl{font-size:13.5px;font-weight:800}
    .gk-tile .ts{font-size:10.5px;color:var(--mute);line-height:1.4}
    .gk-tile.soon{opacity:0.62;pointer-events:none;background:#f6f1e4;border-style:dashed}
    .gk-tile .soon-b{align-self:flex-start;font-size:9px;font-weight:800;color:#8a6d00;background:#ffe9a8;border-radius:999px;padding:1px 7px;margin-top:2px}
    .gk-find{display:flex;align-items:center;gap:6px;border-top:1px dashed #eadfc6;padding:11px 4px 3px;text-decoration:none;color:var(--gold-d);font-size:13px;font-weight:800;background:transparent}
    .gk-find .fa{margin-left:auto;font-weight:800}
    /* この業界の選考スケジュール(未来日付集約・項目ゼロは非表示) */
    .gk-sched{margin:6px 0 2px}
    .gk-sched-t{font-size:12px;font-weight:800;color:var(--gold-d);margin:8px 0 7px}
    .gk-sched-i{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #efe4c9;border-radius:11px;padding:9px 11px;margin-bottom:7px;text-decoration:none;color:var(--ink)}
    .gk-sched-i:active{background:#fbf3df}
    .gk-grad{flex-shrink:0;font-size:10px;font-weight:800;color:#3a2c05;background:var(--gold);border-radius:999px;padding:2px 8px}
    .gk-sched-b{flex:1;min-width:0}
    .gk-sched-l{display:block;font-size:12.5px;font-weight:700;line-height:1.45}
    .gk-sched-m{display:block;font-size:11px;color:var(--mute);margin-top:2px}
    .gk-sched-a{flex-shrink:0;color:#c9b78a;font-weight:800}
    .foot{text-align:center;padding:18px 0 8px}.foot img{height:30px}
    .loading{text-align:center;color:var(--mute);padding:40px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="backbar"><a href="#" data-tkback="/home.html">‹ 戻る</a></div>
  <div class="hd">
    <span class="role">📚 業界研究</span>
    <h1>業界のしくみを学ぶ</h1>
    <div class="roles"><b>業界研究</b>＝業界のしくみを学ぶ教材　／　<b>企業研究</b>＝会社を探す道具</div>
  </div>
  <div class="list" id="list"><div class="loading">読み込み中…</div></div>
  <div class="foot"><img src="/images/brand/tokyari_logo_wide.png" alt="トーキャリ"></div>
</div>
<script>
const CFG=window.TOKYARI||{};
const LIFF_ID=CFG.LIFF_HUB||'2010075487-89AJxZnA';
const API_BASE=CFG.API_BASE||'https://10koma-shukatsu-api.oscar-dodds.workers.dev';
// この業界の選考スケジュール(未来日付集約)。項目ゼロは非表示。カード展開時に遅延ロード。
async function loadSchedule(card){
  const el=card.querySelector('.gk-sched'); if(!el||el.dataset.loaded==='1') return;
  el.dataset.loaded='1';
  let items=[];
  try{ const r=await fetch(`${API_BASE}/api/industry-selection-schedule?gyokai=${encodeURIComponent(el.dataset.slug)}`); if(r.ok) items=await r.json(); }catch(e){}
  if(!Array.isArray(items)||!items.length){ el.style.display='none'; return; }  // 項目ゼロ=非表示
  el.innerHTML=`<div class="gk-sched-t">📅 この業界の選考スケジュール</div>`+items.map(it=>`
    <a class="gk-sched-i" href="/company.html?id=${encodeURIComponent(it.company_id)}&from=gyokai">
      ${it.grad_year?`<span class="gk-grad">${esc(it.grad_year)}</span>`:''}
      <span class="gk-sched-b"><span class="gk-sched-l">${esc(it.label)}</span><span class="gk-sched-m">${esc(it.name)}${it.date?' ・ 📅 '+esc(it.date):''}</span></span>
      <span class="gk-sched-a">›</span></a>`).join('');
  el.style.display='block';
}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// 業界10コマの16業界。学ぶ導線=業界モードへ。「企業を探す」=企業一覧(?ind=)へ相互接続(名称一致する業界のみフィルタ、他は一覧トップ)。
const INDUSTRIES=[
  {slug:'sogo-shosha',name:'総合商社',icon:'🌐',acc:'#2f6fb0',find:'総合商社'},
  {slug:'senmon-shosha',name:'専門商社',icon:'📦',acc:'#b8823a',find:'専門商社'},
  {slug:'finance',name:'銀行・証券・保険',icon:'🏦',acc:'#1f6f54',find:'銀行・証券・保険'},
  {slug:'it-ai-saas-game',name:'IT・AI・SaaS・ゲーム',icon:'💻',acc:'#3b5bdb',find:'IT・通信・SaaS'},
  {slug:'consulting',name:'コンサル',icon:'📈',acc:'#2c6fa8',find:'コンサル'},
  {slug:'manufacturer',name:'メーカー',icon:'🏭',acc:'#4a6b8a',find:''},
  {slug:'ad-media',name:'広告・メディア',icon:'📣',acc:'#e0913a',find:'広告・メディア'},
  {slug:'infra-energy',name:'インフラ・エネルギー',icon:'⚡',acc:'#d17d00',find:'インフラ・エネルギー'},
  {slug:'realestate-construction',name:'不動産・建設',icon:'🏗️',acc:'#9a6a2f',find:'不動産・建設'},
  {slug:'retail',name:'小売・流通',icon:'🛍️',acc:'#c0448a',find:'小売・流通'},
  {slug:'food-beverage',name:'食品・飲料',icon:'🍽️',acc:'#d1495b',find:'食品・飲料'},
  {slug:'medical-healthcare',name:'医療・ヘルスケア',icon:'💊',acc:'#16a085',find:'製薬・ヘルスケア'},
  {slug:'transport-logistics',name:'航空・運輸・物流',icon:'✈️',acc:'#2f8fbf',find:'航空・運輸・物流'},
  {slug:'education-hr',name:'教育・人材',icon:'🎓',acc:'#7d3c98',find:''},
  {slug:'startup',name:'スタートアップ',icon:'🚀',acc:'#c0392b',find:''},
  {slug:'deeptech-space-ai',name:'ディープテック・宇宙・AI',icon:'🛰️',acc:'#3a9d6b',find:''},
];
function render(){
  document.getElementById('list').innerHTML=INDUSTRIES.map(ind=>{
    const s=encodeURIComponent(ind.slug), n=encodeURIComponent(ind.name);
    const find=`/industry.html?from=gyokai${ind.find?('&ind='+encodeURIComponent(ind.find)):''}`;
    return `
    <div class="gk-card" data-slug="${esc(ind.slug)}" style="--acc:${ind.acc}">
      <button class="gk-main" aria-expanded="false">
        <span class="gk-ic">${ind.icon}</span>
        <span class="gk-body"><span class="gk-label">${esc(ind.name)}</span>
          <span class="gk-sub">コンテンツを選ぶ：10コマ / クイズ / 動画 / ニュース</span></span>
        <span class="gk-go">›</span>
      </button>
      <div class="gk-hub">
        <div class="gk-tiles">
          <a class="gk-tile" href="/company.html?industry=${s}&name=${n}&from=gyokai"><span class="tic">📖</span><span class="tl">業界10コマ</span><span class="ts">しくみを学ぶ</span></a>
          <a class="gk-tile" href="/quiz.html?industry=${s}&name=${n}&from=gyokai"><span class="tic">🧠</span><span class="tl">業界クイズ</span><span class="ts">理解度チェック</span></a>
          <div class="gk-tile soon"><span class="tic">🎬</span><span class="tl">業界動画</span><span class="soon-b">準備中</span></div>
          <div class="gk-tile soon"><span class="tic">📰</span><span class="tl">業界ニュース</span><span class="soon-b">準備中</span></div>
        </div>
        <div class="gk-sched" data-slug="${esc(ind.slug)}" data-loaded="0" style="display:none"></div>
        <a class="gk-find" href="${find}">🔎 この業界の企業を探す（企業一覧）<span class="fa">›</span></a>
      </div>
    </div>`;
  }).join('');
  // アコーディオン: タップで開閉(1つずつ)。タップ→即10コマは廃止し、コンテンツを選ばせる。
  document.querySelectorAll('.gk-card .gk-main').forEach(b=>b.onclick=()=>{
    const card=b.closest('.gk-card'); const isOpen=card.classList.contains('open');
    document.querySelectorAll('.gk-card.open').forEach(c=>{ c.classList.remove('open'); const m=c.querySelector('.gk-main'); if(m)m.setAttribute('aria-expanded','false'); });
    if(!isOpen){ card.classList.add('open'); b.setAttribute('aria-expanded','true'); loadSchedule(card); card.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  });
}
async function main(){
  try{ localStorage.setItem('tk_gyokai_seen','1'); }catch(e){}
  render();
  // ?open=<slug>: 企業ページ等から「この業界を知る」で来たとき、その業界ハブを自動展開
  try{
    const openSlug=new URLSearchParams(location.search).get('open');
    if(openSlug){
      const card=document.querySelector(`.gk-card[data-slug="${CSS.escape(openSlug)}"]`);
      if(card){ card.classList.add('open'); const m=card.querySelector('.gk-main'); if(m)m.setAttribute('aria-expanded','true');
        loadSchedule(card); setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'center'}),120); }
    }
  }catch(e){}
  try{ await liff.init({liffId:LIFF_ID}); if(!liff.isLoggedIn()&&liff.isInClient()){liff.login();return;} }catch(e){}
}
main();
</script>
</body>
</html>
