<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ホーム | トーキャリ</title>
  <link rel="stylesheet" href="entry.css">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="config.js"></script>
  <script src="entry.js"></script>
  <style>
    .home-hero { display:flex; flex-direction:column; align-items:center; padding:26px 18px 6px; }
    .home-circle {
      width:96px; height:96px; border-radius:50%; background:#fff;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 5px 18px rgba(0,0,0,0.28); margin-bottom:6px;
    }
    .home-circle img { width:88%; height:88%; object-fit:contain; border-radius:50%; }

    .home-sec { padding:16px 16px 2px; }
    .home-sec-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:9px; }
    .home-sec-title { font-size:15px; font-weight:700; color:#fff; }
    .home-sec-title .em { color:var(--gold); }
    .home-sec-more { font-size:12px; font-weight:700; color:rgba(255,255,255,0.8); text-decoration:none; }

    /* 続きから: 横スクロール */
    .home-row { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; }
    .home-mini {
      flex:0 0 auto; width:130px; background:#fff; color:var(--ink); border-radius:14px;
      padding:12px; text-decoration:none; box-shadow:0 3px 10px rgba(0,0,0,0.16);
    }
    .home-mini .badge {
      width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center;
      font-family:"Reggae One",sans-serif; font-size:19px; color:#fff; margin-bottom:8px;
      background-color:var(--acc); background-image:linear-gradient(135deg,rgba(255,255,255,0.3),rgba(255,255,255,0) 62%);
    }
    .home-mini .nm { font-size:13.5px; font-weight:700; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .home-mini .sub { font-size:11px; color:#8792a3; margin-top:3px; }

    /* 復習バナー */
    .home-review {
      display:flex; align-items:center; gap:12px; background:linear-gradient(135deg,#12457f,#0a2f5c);
      border:1.5px solid rgba(231,184,75,0.5); border-radius:16px; padding:14px 16px;
      color:#fff; text-decoration:none; box-shadow:0 6px 18px rgba(3,20,44,0.4);
    }
    .home-review .ic { width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold-deep));
      display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0; }
    .home-review .tx b { font-size:15px; } .home-review .tx span { display:block; font-size:12px; color:rgba(255,255,255,0.82); margin-top:2px; }
    .home-review .arrow { margin-left:auto; color:var(--gold); font-weight:700; font-size:20px; }

    /* エントリーカード(企業研究/業界研究/クイズ) */
    .home-entries { display:flex; flex-direction:column; gap:11px; padding:6px 16px 8px; }
    .home-entry {
      display:flex; align-items:center; gap:14px; width:100%; text-align:left;
      background:#fff; color:var(--ink); border:none; border-radius:16px; padding:15px 16px;
      cursor:pointer; font-family:inherit; box-shadow:0 3px 12px rgba(0,0,0,0.16);
      -webkit-tap-highlight-color:transparent; text-decoration:none;
    }
    .home-entry .eic { width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:25px;flex-shrink:0; background:#eef3f9; }
    .home-entry .el { font-size:16px; font-weight:700; } .home-entry .es { font-size:12px; color:#6a7686; margin-top:2px; }
    .home-entry .ea { margin-left:auto; color:#c3ccd6; font-size:20px; font-weight:700; }

    /* 検索 */
    .home-search { padding:2px 16px 6px; }
    .home-search-box { display:flex; align-items:center; gap:8px; background:#fff; border-radius:14px; padding:11px 14px; box-shadow:0 3px 12px rgba(0,0,0,0.18); }
    .home-search-ic { font-size:16px; opacity:0.6; flex-shrink:0; }
    #search-input { flex:1; border:none; outline:none; font-size:16px; font-family:inherit; color:var(--ink); background:transparent; min-width:0; }
    #search-input::placeholder { color:#9aa5b1; }
    .home-search-clear { border:none; background:#eef2f7; color:#66707c; width:24px; height:24px; border-radius:50%; font-size:16px; line-height:1; cursor:pointer; flex-shrink:0; }
    .search-results { margin-top:8px; display:flex; flex-direction:column; gap:8px; }
    .sr-item {
      display:flex; align-items:center; gap:12px; background:#fff; color:var(--ink); border-radius:12px;
      padding:11px 13px; text-decoration:none; box-shadow:0 2px 8px rgba(0,0,0,0.14);
    }
    .sr-badge { width:38px; height:38px; border-radius:11px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
      font-family:"Reggae One",sans-serif; font-size:18px; color:#fff;
      background-color:var(--acc); background-image:linear-gradient(135deg,rgba(255,255,255,0.3),rgba(255,255,255,0) 62%); }
    .sr-icon { width:38px; height:38px; border-radius:11px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:20px; background:#f2f6fb; box-shadow:inset 0 0 0 2px var(--acc); }
    .sr-body { flex:1; min-width:0; }
    .sr-name { font-size:15px; font-weight:700; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .sr-sub { font-size:11px; color:#7a8794; margin-top:1px; }
    .sr-arrow { color:#c3ccd6; font-size:18px; font-weight:700; flex-shrink:0; }
    .sr-empty { background:#fff; border-radius:12px; padding:18px 16px; text-align:center; color:var(--ink); box-shadow:0 2px 8px rgba(0,0,0,0.14); }
    .sr-empty p { font-size:14px; margin-bottom:12px; color:#556; }
    .sr-empty a { display:inline-block; background:var(--navy); color:#fff; text-decoration:none; padding:10px 20px; border-radius:999px; font-size:13px; font-weight:700; }

    /* 就活の現在地 (ロードマップ) */
    .rm-wrap { background:#fff; border-radius:16px; padding:14px 12px 12px; box-shadow:0 3px 12px rgba(0,0,0,0.16); }
    .rm-strip { display:flex; align-items:flex-start; justify-content:center; gap:1px; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; }
    .rm-step { flex:0 0 auto; width:58px; text-align:center; }
    .rm-ic { width:42px; height:42px; margin:0 auto 5px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:19px; background:#eef2f7; color:#9aa5b1; border:2px solid #e2e8f0; }
    .rm-l { font-size:10.5px; font-weight:700; color:#9aa5b1; line-height:1.25; display:block; }
    .rm-step.done .rm-ic { background:#e7f4ec; color:#2f8a54; border-color:#bfe3cd; }
    .rm-step.done .rm-l { color:#2f8a54; }
    .rm-step.current .rm-ic { background:linear-gradient(135deg,var(--gold),var(--gold-deep)); color:#3a2c05; border-color:var(--gold); box-shadow:0 0 0 3px rgba(224,165,42,0.28); }
    .rm-step.current .rm-l { color:var(--ink); }
    .rm-sep { align-self:flex-start; color:#c3ccd6; font-weight:700; font-size:13px; flex:0 0 auto; padding-top:12px; }
    .rm-cta { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:11px; background:var(--navy); color:#fff; text-decoration:none; border-radius:12px; padding:12px 15px; }
    .rm-cta span { font-size:12px; color:rgba(255,255,255,0.85); min-width:0; }
    .rm-cta b { font-size:14px; font-weight:800; white-space:nowrap; }
  </style>
</head>
<body>
<div class="e-wrap">
  <header class="e-header">
    <div class="home-hero">
      <span class="home-circle"><img src="/images/brand/tokyari_logo_mark.jpg" alt="トーキャリ"></span>
      <div id="guide"></div>
    </div>
  </header>

  <div class="home-search">
    <div class="home-search-box">
      <span class="home-search-ic">🔍</span>
      <input id="search-input" type="text" inputmode="search" autocomplete="off" placeholder="会社名・業界名でさがす">
      <button id="search-clear" class="home-search-clear" aria-label="クリア" style="display:none">×</button>
    </div>
    <div id="search-results" class="search-results"></div>
  </div>

  <div id="roadmap" class="home-sec" style="display:none"></div>
  <div id="continue" class="home-sec" style="display:none"></div>
  <div id="review" class="home-sec" style="display:none"></div>
  <div id="favorites" class="home-sec" style="display:none"></div>

  <div class="home-sec"><div class="home-sec-head"><span class="home-sec-title">コンテンツから<span class="em">えらぶ</span></span></div></div>
  <div class="home-entries" id="entries"></div>

  <div id="notice" class="home-sec" style="display:none"></div>

  <footer class="e-footer">
    <span class="brand-panel"><img class="brand-logo" src="/images/brand/tokyari_logo_wide.png" alt="トーキャリ"></span>
  </footer>
</div>

<script>
const CFG      = window.TOKYARI || {};
const LIFF_ID  = CFG.LIFF_HUB || '2010075487-89AJxZnA';
const API_BASE = CFG.API_BASE  || 'https://10koma-shukatsu-api.oscar-dodds.workers.dev';
let lineUserId = null, displayName = '';

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
const PAL=['#2f6fb0','#c0392b','#7d3c98','#16a085','#d17d00','#2d8659','#c0448a','#3b5bdb','#b8823a','#2f8fbf'];
function hue(id){let h=0;for(const c of String(id))h=(h*31+c.charCodeAt(0))>>>0;return PAL[h%PAL.length];}

// ⑤ コンテンツ入口（常時表示）
function renderEntries(){
  const items=[
    {href:'/industry',   ic:'🏢', l:'企業研究',   s:'業界→会社を10コマ＋AI OB訪問'},
    {href:'/gyokai',     ic:'🌐', l:'業界研究',   s:'業界を丸ごと10コマ＋クイズ'},
    {href:'/quiz.html',  ic:'🧠', l:'理解度クイズ', s:'会社別・業界別・復習で腕試し'},
    {href:'/compare.html', ic:'⚖️', l:'企業比較',  s:'2〜3社を一次情報で横並び'},
  ];
  document.getElementById('entries').innerHTML = items.map(i=>`
    <a class="home-entry" href="${i.href}">
      <span class="eic">${i.ic}</span>
      <span style="flex:1;min-width:0"><span class="el">${i.l}</span><span class="es">${i.s}</span></span>
      <span class="ea">›</span></a>`).join('');
}

// ① 就活の現在地（既存API=view_logs流用 + 各機能利用フラグ。新規生成なし・常時表示）
async function renderRoadmap(){
  const steps=[
    {ic:'🧭', l:'自己分析',   href:'/shindan.html', cta:'相性診断をする'},
    {ic:'🌐', l:'業界研究',   href:'/gyokai',       cta:'業界研究へ'},
    {ic:'🏢', l:'企業研究',   href:'/industry',     cta:'企業研究へ'},
    {ic:'🧠', l:'理解度',     href:'/quiz.html',    cta:'クイズに挑戦'},
    {ic:'📝', l:'選考対策',   href:'/es_guide.html', cta:'選考対策を見る'},
  ];
  const flag=k=>{ try{ return localStorage.getItem(k)==='1'; }catch(e){ return false; } };
  let viewedCompany=false;
  try{
    const r=await fetch(`${API_BASE}/api/recent-companies?user_id=${encodeURIComponent(lineUserId)}&limit=1`);
    const l=r.ok?await r.json():[]; viewedCompany=Array.isArray(l)&&l.length>0;
  }catch(e){}
  const done=[ flag('tk_shindan_done'), flag('tk_gyokai_seen'), viewedCompany, flag('tk_quiz_answered'), flag('tk_esguide_seen')||flag('tk_omamori_used') ];
  const allDone=done.every(Boolean);
  let cur=done.findIndex(d=>!d); if(cur<0) cur=steps.length-1;  // 全ステップ済→最後(選考対策)を現在地
  const strip=steps.map((s,i)=>{
    const cls=done[i]?'done':(i===cur?'current':'todo');
    return `<div class="rm-step ${cls}"><span class="rm-ic">${done[i]?'✓':s.ic}</span><span class="rm-l">${s.l}</span></div>`;
  }).join('<span class="rm-sep">›</span>');
  const t=steps[cur];
  const lead = allDone ? 'ひと通りOK！本番前の対策も' : (done.some(Boolean) ? '次はここから' : 'まずは自己分析から');
  const el=document.getElementById('roadmap');
  el.innerHTML=`<div class="home-sec-head"><span class="home-sec-title">就活の<span class="em">現在地</span></span></div>
    <div class="rm-wrap"><div class="rm-strip">${strip}</div>
      <a class="rm-cta" href="${t.href}"><span>${esc(lead)}</span><b>${esc(t.cta)} ›</b></a></div>`;
  el.style.display='';
}

// ② 続きから
async function renderContinue(){
  try{
    const r=await fetch(`${API_BASE}/api/recent-companies?user_id=${encodeURIComponent(lineUserId)}&limit=6`);
    const list=r.ok?await r.json():[];
    if(!list.length) return;
    const el=document.getElementById('continue');
    el.innerHTML=`<div class="home-sec-head"><span class="home-sec-title">続きから<span class="em">見る</span></span></div>
      <div class="home-row">${list.map(c=>`
        <a class="home-mini" href="/company.html?id=${encodeURIComponent(c.id)}">
          <span class="badge" style="--acc:${hue(c.id)}">${esc(String(c.name||'？').charAt(0))}</span>
          <span class="nm">${esc(c.name)}</span><span class="sub">最近見た企業</span></a>`).join('')}</div>`;
    el.style.display='';
  }catch(e){}
}

// ③ あなたの復習（間違いがあれば）
async function renderReview(){
  try{
    const r=await fetch(`${API_BASE}/api/quiz/review?user_id=${encodeURIComponent(lineUserId)}&mode=recent`);
    const list=r.ok?await r.json():[];
    if(!list.length) return;
    const el=document.getElementById('review');
    el.innerHTML=`<a class="home-review" href="/quiz.html#review">
      <span class="ic">🎯</span>
      <span class="tx"><b>あなたの復習</b><span>間違えた問題を${list.length}問おさらい</span></span>
      <span class="arrow">›</span></a>`;
    el.style.display='';
  }catch(e){}
}

// ④ お気に入り
async function renderFavorites(){
  try{
    const r=await fetch(`${API_BASE}/api/bookmarks?user_id=${encodeURIComponent(lineUserId)}`);
    const list=r.ok?await r.json():[];
    if(!list.length) return;
    const el=document.getElementById('favorites');
    el.innerHTML=`<div class="home-sec-head"><span class="home-sec-title">お気に入り<span class="em">の企業</span></span>
        <a class="home-sec-more" href="/bookmarks.html">すべて見る (${list.length}) ›</a></div>
      <div class="home-row">${list.slice(0,6).map(c=>`
        <a class="home-mini" href="/company.html?id=${encodeURIComponent(c.id)}">
          <span class="badge" style="--acc:${hue(c.id)}">${esc(String(c.name||'？').charAt(0))}</span>
          <span class="nm">${esc(c.name)}</span><span class="sub">★ 保存済み</span></a>`).join('')}</div>`;
    el.style.display='';
  }catch(e){}
}

// === 横断検索（クライアントサイド: companies.json + search_aliases.json + 16業界） ===
const GYOKAI = [
  {slug:'sogo-shosha',name:'総合商社',icon:'🌐',al:['そうごうしょうしゃ','しょうしゃ']},
  {slug:'senmon-shosha',name:'専門商社',icon:'📦',al:['せんもんしょうしゃ','しょうしゃ']},
  {slug:'finance',name:'銀行・証券・保険',icon:'🏦',al:['ぎんこう','しょうけん','ほけん','きんゆう']},
  {slug:'it-ai-saas-game',name:'IT・AI・SaaS・ゲーム',icon:'💻',al:['あいてぃー','げーむ','えーあい','さーす']},
  {slug:'consulting',name:'コンサル',icon:'📈',al:['こんさる','こんさるてぃんぐ']},
  {slug:'manufacturer',name:'メーカー',icon:'🏭',al:['めーかー','せいぞう']},
  {slug:'ad-media',name:'広告・メディア',icon:'📣',al:['こうこく','めでぃあ']},
  {slug:'infra-energy',name:'インフラ・エネルギー',icon:'⚡',al:['いんふら','えねるぎー','でんりょく','がす']},
  {slug:'realestate-construction',name:'不動産・建設',icon:'🏗️',al:['ふどうさん','けんせつ','でべろっぱー']},
  {slug:'retail',name:'小売・流通',icon:'🛍️',al:['こうり','りゅうつう']},
  {slug:'food-beverage',name:'食品・飲料',icon:'🍽️',al:['しょくひん','いんりょう']},
  {slug:'medical-healthcare',name:'医療・ヘルスケア',icon:'💊',al:['いりょう','へるすけあ','せいやく']},
  {slug:'transport-logistics',name:'航空・運輸・物流',icon:'✈️',al:['こうくう','うんゆ','ぶつりゅう','てつどう']},
  {slug:'education-hr',name:'教育・人材',icon:'🎓',al:['きょういく','じんざい']},
  {slug:'startup',name:'スタートアップ',icon:'🚀',al:['すたーとあっぷ','べんちゃー']},
  {slug:'deeptech-space-ai',name:'ディープテック・宇宙・AI',icon:'🛰️',al:['でぃーぷてっく','うちゅう','えーあい']},
];
let SEARCH_IDX = null;
function normJ(s){
  return String(s||'').toLowerCase()
    .replace(/[ァ-ヶ]/g, c=>String.fromCharCode(c.charCodeAt(0)-0x60))       // カタカナ→ひらがな
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)) // 全角英数→半角
    .replace(/[\s・･。、，,.／/（）()\[\]「」【】\-‐－—~〜'`"&＆]/g,'');
}
async function buildIndex(){
  if (SEARCH_IDX) return SEARCH_IDX;
  const [comp, aliases] = await Promise.all([
    fetch('/companies.json').then(r=>r.json()),
    fetch('/search_aliases.json').then(r=>r.ok?r.json():({})).catch(()=>({})),
  ]);
  const items = [];
  for (const g of GYOKAI) items.push({type:'industry', id:g.slug, name:g.name, icon:g.icon, key:normJ([g.name,g.slug,...(g.al||[])].join(' '))});
  for (const ind of Object.keys(comp)) {
    for (const c of comp[ind]) {
      if (String(c.id).startsWith('industry_10koma__')) continue;
      items.push({type:'company', id:c.id, name:c.name, industry:ind, key:normJ([c.name, c.id, c.id.replace(/-/g,' '), ...(aliases[c.id]||[])].join(' '))});
    }
  }
  SEARCH_IDX = items; return items;
}
function renderSearchResults(q){
  const box = document.getElementById('search-results');
  const nq = normJ(q);
  if (!nq) { box.innerHTML = ''; return; }
  const hits = (SEARCH_IDX||[]).filter(it => it.key.includes(nq));
  hits.sort((a,b)=> a.type===b.type ? 0 : (a.type==='industry'?-1:1));
  const top = hits.slice(0,12);
  if (!top.length) {
    box.innerHTML = `<div class="sr-empty"><p>「${esc(q)}」は見つかりませんでした</p><a href="/gyokai.html">業界一覧からさがす →</a></div>`;
    return;
  }
  box.innerHTML = top.map(it => it.type==='industry'
    ? `<a class="sr-item" style="--acc:#2f6fb0" href="/company.html?industry=${encodeURIComponent(it.id)}&name=${encodeURIComponent(it.name)}">
         <span class="sr-icon">${it.icon}</span>
         <span class="sr-body"><span class="sr-name">${esc(it.name)}</span><span class="sr-sub">業界研究</span></span>
         <span class="sr-arrow">›</span></a>`
    : `<a class="sr-item" style="--acc:${hue(it.id)}" href="/company.html?id=${encodeURIComponent(it.id)}">
         <span class="sr-badge">${esc(String(it.name||'？').charAt(0))}</span>
         <span class="sr-body"><span class="sr-name">${esc(it.name)}</span><span class="sr-sub">${esc(it.industry)}</span></span>
         <span class="sr-arrow">›</span></a>`
  ).join('');
}
async function initSearch(){
  const input = document.getElementById('search-input');
  const clear = document.getElementById('search-clear');
  if (!input) return;
  await buildIndex();
  input.addEventListener('input', ()=>{
    clear.style.display = input.value ? '' : 'none';
    renderSearchResults(input.value.trim());
  });
  clear.addEventListener('click', ()=>{ input.value=''; clear.style.display='none'; renderSearchResults(''); input.focus(); });
}

async function main(){
  renderEntries();
  initSearch();
  const params=new URLSearchParams(location.search);
  lineUserId = params.get('u') || 'guest-preview';   // ?u= はQA用オーバーライド
  try{
    await liff.init({liffId:LIFF_ID});
    if(liff.isLoggedIn()){ const p=await liff.getProfile(); lineUserId=params.get('u')||p.userId; displayName=p.displayName||''; }
    else if(liff.isInClient()){ liff.login(); return; }
  }catch(e){ console.warn('LIFF skipped (preview):', e && e.message); }

  mountGuide(displayName ? `こんにちは、${esc(displayName)}さん！<br>今日はどこから見る？` : 'ようこそ！<br>今日はどこから見る？');
